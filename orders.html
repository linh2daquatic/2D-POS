<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đơn hàng — 2D Aquatic POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(10,22,40,0.5); z-index:100; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.open { display:flex; }
.modal-box { background:#fff; border-radius:14px; width:100%; max-width:640px; max-height:90vh; overflow-y:auto; }
.modal-box.small { max-width:400px; }
.modal-header { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:#fff; z-index:2; }
.modal-header h3 { font-family:var(--font-display); font-size:18px; }
.modal-body { padding:20px 22px; }
.modal-close { cursor:pointer; font-size:20px; color:var(--text-mute); }
.row-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.type-toggle { display:flex; gap:8px; margin-bottom:14px; }
.type-btn { flex:1; padding:10px; text-align:center; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-weight:600; font-size:13.5px; color:var(--text-mute); }
.type-btn.active.retail { border-color:var(--teal-deep); color:var(--teal-deep); background:#ecfdf5; }
.type-btn.active.wholesale { border-color:#4338ca; color:#4338ca; background:#eef2ff; }
.autocomplete-wrap { position:relative; }
.autocomplete-list { position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid var(--border); border-radius:8px; max-height:220px; overflow-y:auto; box-shadow:var(--shadow); z-index:10; margin-top:4px; display:none; }
.autocomplete-list.open { display:block; }
.autocomplete-item { padding:10px 12px; cursor:pointer; font-size:13.5px; border-bottom:1px solid var(--border); }
.autocomplete-item:last-child { border-bottom:none; }
.autocomplete-item:hover { background:#f8fafc; }
.autocomplete-item .sub { font-size:11.5px; color:var(--text-mute); }
.cart-table th, .cart-table td { padding:8px 10px; font-size:13px; }
.cart-qty-input { width:70px; padding:6px 8px; }
.cart-price-input { width:110px; padding:6px 8px; }
.remove-x { color:var(--danger); cursor:pointer; font-weight:700; }
.summary-row { display:flex; justify-content:space-between; padding:6px 0; font-size:14px; }
.summary-row.total { font-weight:700; font-size:17px; border-top:1px solid var(--border); margin-top:8px; padding-top:12px; }
.selected-customer-tag { display:flex; align-items:center; justify-content:space-between; padding:9px 12px; border:1px solid var(--border); border-radius:8px; background:#f8fafc; font-size:13.5px; }
</style>
</head>
<body>

<script src="js/supabase-client.js"></script>
<script src="js/layout.js"></script>
<script>
let CURRENT_PROFILE = null;
let ALL_PRODUCTS = [];
let ALL_CUSTOMERS = [];
let CART = [];
let ORDER_TYPE = "retail";
let SELECTED_CUSTOMER = null;

(async () => {
  const auth = await requireAuth();
  if (!auth) return;
  CURRENT_PROFILE = auth.profile;

  renderLayout({
    activePage: "orders",
    profile: CURRENT_PROFILE,
    title: "Đơn hàng",
    subtitle: "Tạo đơn bán và xem lịch sử đơn hàng"
  });

  document.getElementById("pageContent").innerHTML = `
    <div class="flex" style="justify-content:space-between; margin-bottom:16px;">
      <div></div>
      <button class="btn btn-primary" id="newOrderBtn">+ Tạo đơn hàng</button>
    </div>
    <div class="panel">
      <div class="panel-header"><h2>Danh sách đơn hàng</h2></div>
      <div class="panel-body" id="orderListWrap">
        <div class="empty-state"><div class="icon">⏳</div>Đang tải...</div>
      </div>
    </div>

    ${orderModalHtml()}
  `;

  await Promise.all([loadProducts(), loadCustomers(), loadOrders()]);
  bindOrderModalEvents();

  document.getElementById("newOrderBtn").addEventListener("click", openOrderModal);
})();

function orderModalHtml() {
  return `
  <div class="modal-overlay" id="orderModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Tạo đơn hàng mới</h3>
        <span class="modal-close" id="closeOrderModal">✕</span>
      </div>
      <div class="modal-body">
        <div class="type-toggle">
          <div class="type-btn retail active" id="typeRetailBtn">Bán lẻ</div>
          <div class="type-btn wholesale" id="typeWholesaleBtn">Bán buôn</div>
        </div>

        <div class="field">
          <label>Khách hàng</label>
          <div id="customerPickerWrap">
            <div class="autocomplete-wrap">
              <input id="customerSearch" placeholder="Tìm khách hàng hoặc để trống = Khách lẻ...">
              <div class="autocomplete-list" id="customerList"></div>
            </div>
          </div>
        </div>

        <div class="field">
          <label>Thêm sản phẩm</label>
          <div class="autocomplete-wrap">
            <input id="productSearch" placeholder="Tìm sản phẩm theo tên hoặc SKU...">
            <div class="autocomplete-list" id="productList"></div>
          </div>
        </div>

        <table class="cart-table" style="margin-top:10px;">
          <thead><tr><th>Sản phẩm</th><th>SL</th><th>Đơn giá</th><th>Thành tiền</th><th></th></tr></thead>
          <tbody id="cartBody"><tr><td colspan="5" class="text-mute" style="text-align:center; padding:16px;">Chưa có sản phẩm nào trong đơn</td></tr></tbody>
        </table>

        <div style="margin-top:16px;">
          <div class="summary-row"><span>Tổng tiền</span><span id="sumTotal">0₫</span></div>
          <div class="field" style="margin-top:10px;">
            <label>Khách đã thanh toán</label>
            <input id="paidAmount" type="number" step="any" value="0">
          </div>
          <div class="summary-row total"><span>Còn nợ</span><span id="sumDebt">0₫</span></div>
        </div>

        <div class="flex gap-8" style="margin-top:18px; justify-content:flex-end;">
          <button type="button" class="btn btn-secondary" id="cancelOrderBtn">Hủy</button>
          <button type="button" class="btn btn-primary" id="submitOrderBtn">Tạo đơn hàng</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="quickCustomerModal">
    <div class="modal-box small">
      <div class="modal-header"><h3>Thêm khách hàng nhanh</h3><span class="modal-close" id="closeQuickCustomer">✕</span></div>
      <div class="modal-body">
        <div class="field"><label>Tên khách hàng *</label><input id="qc_name" required></div>
        <div class="field"><label>Số điện thoại</label><input id="qc_phone"></div>
        <div class="flex gap-8" style="margin-top:16px; justify-content:flex-end;">
          <button type="button" class="btn btn-secondary" id="qcCancelBtn">Hủy</button>
          <button type="button" class="btn btn-primary" id="qcSaveBtn">Lưu & chọn</button>
        </div>
      </div>
    </div>
  </div>
  `;
}

async function loadProducts() {
  const { data } = await sb.from("products").select("*").order("name");
  ALL_PRODUCTS = data || [];
}
async function loadCustomers() {
  const { data } = await sb.from("customers").select("*").order("name");
  ALL_CUSTOMERS = data || [];
}

async function loadOrders() {
  const { data, error } = await sb
    .from("orders")
    .select("id, order_code, type, total_amount, paid_amount, status, created_at, customers(name)")
    .order("created_at", { ascending: false })
    .limit(50);

  const wrap = document.getElementById("orderListWrap");
  if (error) { wrap.innerHTML = `<div class="empty-state">Lỗi tải đơn hàng: ${error.message}</div>`; return; }
  if (!data || data.length === 0) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">🧾</div>Chưa có đơn hàng nào.</div>`;
    return;
  }
  wrap.innerHTML = `<table><thead><tr>
      <th>Mã đơn</th><th>Ngày</th><th>Khách hàng</th><th>Loại</th><th>Tổng tiền</th><th>Đã trả</th><th>Trạng thái</th>
    </tr></thead><tbody>
    ${data.map(o => {
      const debt = Number(o.total_amount) - Number(o.paid_amount);
      return `<tr>
        <td>${o.order_code}</td>
        <td>${formatDate(o.created_at)}</td>
        <td>${o.customers?.name || "Khách lẻ"}</td>
        <td><span class="badge ${o.type}">${o.type === 'wholesale' ? 'Bán buôn' : 'Bán lẻ'}</span></td>
        <td>${formatVND(o.total_amount)}</td>
        <td>${formatVND(o.paid_amount)}</td>
        <td><span class="badge ${debt > 0 ? 'debt' : 'paid'}">${debt > 0 ? 'Còn nợ ' + formatVND(debt) : 'Đã thanh toán'}</span></td>
      </tr>`;
    }).join("")}
  </tbody></table>`;
}

function openOrderModal() {
  CART = [];
  SELECTED_CUSTOMER = null;
  ORDER_TYPE = "retail";
  document.getElementById("typeRetailBtn").classList.add("active");
  document.getElementById("typeWholesaleBtn").classList.remove("active");
  document.getElementById("customerSearch").value = "";
  document.getElementById("productSearch").value = "";
  document.getElementById("paidAmount").value = 0;
  renderCustomerPicker();
  renderCart();
  document.getElementById("orderModal").classList.add("open");
}

function bindOrderModalEvents() {
  document.getElementById("closeOrderModal").addEventListener("click", () => document.getElementById("orderModal").classList.remove("open"));
  document.getElementById("cancelOrderBtn").addEventListener("click", () => document.getElementById("orderModal").classList.remove("open"));

  document.getElementById("typeRetailBtn").addEventListener("click", () => setOrderType("retail"));
  document.getElementById("typeWholesaleBtn").addEventListener("click", () => setOrderType("wholesale"));

  const custInput = document.getElementById("customerSearch");
  custInput.addEventListener("input", () => renderCustomerList(custInput.value));
  custInput.addEventListener("focus", () => renderCustomerList(custInput.value));
  document.addEventListener("click", (e) => {
    if (!e.target.closest("#customerPickerWrap")) document.getElementById("customerList").classList.remove("open");
    if (!e.target.closest(".autocomplete-wrap")) document.getElementById("productList")?.classList.remove("open");
  });

  const prodInput = document.getElementById("productSearch");
  prodInput.addEventListener("input", () => renderProductList(prodInput.value));
  prodInput.addEventListener("focus", () => renderProductList(prodInput.value));

  document.getElementById("paidAmount").addEventListener("input", updateSummary);
  document.getElementById("submitOrderBtn").addEventListener("click", submitOrder);

  document.getElementById("closeQuickCustomer").addEventListener("click", () => document.getElementById("quickCustomerModal").classList.remove("open"));
  document.getElementById("qcCancelBtn").addEventListener("click", () => document.getElementById("quickCustomerModal").classList.remove("open"));
  document.getElementById("qcSaveBtn").addEventListener("click", saveQuickCustomer);
}

function setOrderType(type) {
  ORDER_TYPE = type;
  document.getElementById("typeRetailBtn").classList.toggle("active", type === "retail");
  document.getElementById("typeWholesaleBtn").classList.toggle("active", type === "wholesale");
  // Cập nhật lại đơn giá mặc định cho các sản phẩm đã có trong giỏ
  CART.forEach(item => {
    const p = ALL_PRODUCTS.find(x => x.id === item.product_id);
    if (p) item.unit_price = type === "wholesale" ? Number(p.wholesale_price) : Number(p.retail_price);
  });
  renderCart();
}

function renderCustomerPicker() {
  const wrap = document.getElementById("customerPickerWrap");
  if (SELECTED_CUSTOMER) {
    wrap.innerHTML = `<div class="selected-customer-tag">
      <span>👤 ${SELECTED_CUSTOMER.name} ${SELECTED_CUSTOMER.phone ? '· ' + SELECTED_CUSTOMER.phone : ''}</span>
      <span class="remove-x" id="clearCustomerBtn">Bỏ chọn ✕</span>
    </div>`;
    document.getElementById("clearCustomerBtn").addEventListener("click", () => {
      SELECTED_CUSTOMER = null;
      renderCustomerPicker();
    });
  } else {
    wrap.innerHTML = `<div class="autocomplete-wrap">
      <input id="customerSearch" placeholder="Tìm khách hàng hoặc để trống = Khách lẻ...">
      <div class="autocomplete-list" id="customerList"></div>
    </div>`;
    const custInput = document.getElementById("customerSearch");
    custInput.addEventListener("input", () => renderCustomerList(custInput.value));
    custInput.addEventListener("focus", () => renderCustomerList(custInput.value));
  }
}

function renderCustomerList(filter) {
  const list = document.getElementById("customerList");
  if (!list) return;
  const f = (filter || "").trim().toLowerCase();
  const matches = ALL_CUSTOMERS.filter(c => !f || c.name.toLowerCase().includes(f) || (c.phone || "").includes(f));

  list.innerHTML = matches.slice(0, 8).map(c =>
    `<div class="autocomplete-item" data-id="${c.id}">${c.name} <span class="sub">${c.phone || ''} · ${c.type === 'wholesale' ? 'Buôn' : 'Lẻ'}</span></div>`
  ).join("") + `<div class="autocomplete-item" style="color:var(--teal-deep); font-weight:600;" id="quickAddCustomerItem">+ Thêm khách hàng mới "${filter || ''}"</div>`;

  list.classList.add("open");

  list.querySelectorAll(".autocomplete-item[data-id]").forEach(el => {
    el.addEventListener("click", () => {
      SELECTED_CUSTOMER = ALL_CUSTOMERS.find(c => c.id === el.dataset.id);
      renderCustomerPicker();
      list.classList.remove("open");
    });
  });
  document.getElementById("quickAddCustomerItem").addEventListener("click", () => {
    document.getElementById("qc_name").value = filter || "";
    document.getElementById("qc_phone").value = "";
    document.getElementById("quickCustomerModal").classList.add("open");
    list.classList.remove("open");
  });
}

async function saveQuickCustomer() {
  const name = document.getElementById("qc_name").value.trim();
  if (!name) { alert("Vui lòng nhập tên khách hàng."); return; }
  const phone = document.getElementById("qc_phone").value.trim() || null;

  const { data, error } = await sb.from("customers").insert({
    name, phone, type: ORDER_TYPE
  }).select().single();

  if (error) { alert("Lỗi khi thêm khách hàng: " + error.message); return; }

  ALL_CUSTOMERS.push(data);
  SELECTED_CUSTOMER = data;
  renderCustomerPicker();
  document.getElementById("quickCustomerModal").classList.remove("open");
}

function renderProductList(filter) {
  const list = document.getElementById("productList");
  const f = (filter || "").trim().toLowerCase();
  if (!f) { list.classList.remove("open"); return; }
  const matches = ALL_PRODUCTS.filter(p => p.name.toLowerCase().includes(f) || (p.sku || "").toLowerCase().includes(f));

  if (matches.length === 0) {
    list.innerHTML = `<div class="autocomplete-item text-mute">Không tìm thấy sản phẩm.</div>`;
  } else {
    list.innerHTML = matches.slice(0, 8).map(p =>
      `<div class="autocomplete-item" data-id="${p.id}">${p.name} <span class="sub">Tồn: ${p.quantity} ${p.unit || ''} · ${formatVND(ORDER_TYPE === 'wholesale' ? p.wholesale_price : p.retail_price)}</span></div>`
    ).join("");
    list.querySelectorAll(".autocomplete-item[data-id]").forEach(el => {
      el.addEventListener("click", () => {
        addToCart(el.dataset.id);
        document.getElementById("productSearch").value = "";
        list.classList.remove("open");
      });
    });
  }
  list.classList.add("open");
}

function addToCart(productId) {
  const p = ALL_PRODUCTS.find(x => x.id === productId);
  if (!p) return;
  const existing = CART.find(i => i.product_id === productId);
  if (existing) {
    existing.quantity += 1;
  } else {
    CART.push({
      product_id: p.id,
      name: p.name,
      unit: p.unit,
      max_qty: p.quantity,
      quantity: 1,
      unit_price: ORDER_TYPE === "wholesale" ? Number(p.wholesale_price) : Number(p.retail_price)
    });
  }
  renderCart();
}

function renderCart() {
  const body = document.getElementById("cartBody");
  if (CART.length === 0) {
    body.innerHTML = `<tr><td colspan="5" class="text-mute" style="text-align:center; padding:16px;">Chưa có sản phẩm nào trong đơn</td></tr>`;
  } else {
    body.innerHTML = CART.map((item, idx) => `
      <tr>
        <td>${item.name}</td>
        <td><input type="number" class="cart-qty-input" min="1" value="${item.quantity}" data-idx="${idx}" data-field="quantity"></td>
        <td><input type="number" class="cart-price-input" min="0" value="${item.unit_price}" data-idx="${idx}" data-field="unit_price"></td>
        <td>${formatVND(item.quantity * item.unit_price)}</td>
        <td><span class="remove-x" data-idx="${idx}">✕</span></td>
      </tr>
    `).join("");

    body.querySelectorAll("input[data-field]").forEach(el => {
      el.addEventListener("input", () => {
        const idx = Number(el.dataset.idx);
        const field = el.dataset.field;
        CART[idx][field] = Number(el.value || 0);
        renderCart();
      });
    });
    body.querySelectorAll(".remove-x").forEach(el => {
      el.addEventListener("click", () => {
        CART.splice(Number(el.dataset.idx), 1);
        renderCart();
      });
    });
  }
  updateSummary();
}

function updateSummary() {
  const total = CART.reduce((s, i) => s + (i.quantity * i.unit_price), 0);
  const paid = Number(document.getElementById("paidAmount").value || 0);
  const debt = Math.max(total - paid, 0);
  document.getElementById("sumTotal").textContent = formatVND(total);
  document.getElementById("sumDebt").textContent = formatVND(debt);
}

async function submitOrder() {
  if (CART.length === 0) { alert("Vui lòng thêm ít nhất 1 sản phẩm vào đơn hàng."); return; }

  // Kiểm tra tồn kho đủ không
  for (const item of CART) {
    const p = ALL_PRODUCTS.find(x => x.id === item.product_id);
    if (p && item.quantity > Number(p.quantity)) {
      alert(`Sản phẩm "${item.name}" chỉ còn ${p.quantity} ${p.unit || ''} trong kho, không đủ để bán ${item.quantity}.`);
      return;
    }
  }

  const submitBtn = document.getElementById("submitOrderBtn");
  submitBtn.disabled = true;
  submitBtn.textContent = "Đang tạo đơn...";

  const total = CART.reduce((s, i) => s + (i.quantity * i.unit_price), 0);
  const paid = Number(document.getElementById("paidAmount").value || 0);
  const orderCode = "DH" + Date.now().toString().slice(-8);

  const { data: order, error: orderErr } = await sb.from("orders").insert({
    order_code: orderCode,
    customer_id: SELECTED_CUSTOMER?.id || null,
    type: ORDER_TYPE,
    status: "completed",
    total_amount: total,
    paid_amount: paid,
    created_by: CURRENT_PROFILE.id
  }).select().single();

  if (orderErr) {
    alert("Lỗi khi tạo đơn hàng: " + orderErr.message);
    submitBtn.disabled = false;
    submitBtn.textContent = "Tạo đơn hàng";
    return;
  }

  const itemRows = CART.map(i => ({
    order_id: order.id, product_id: i.product_id, quantity: i.quantity, unit_price: i.unit_price
  }));
  await sb.from("order_items").insert(itemRows);

  // Trừ kho + ghi log
  for (const item of CART) {
    const p = ALL_PRODUCTS.find(x => x.id === item.product_id);
    const newQty = Number(p.quantity) - item.quantity;
    await sb.from("products").update({ quantity: newQty }).eq("id", item.product_id);
    await sb.from("inventory_log").insert({
      product_id: item.product_id, change_qty: -item.quantity, reason: "sale",
      reference_id: order.id, created_by: CURRENT_PROFILE.id
    });
  }

  // Ghi nhận thanh toán ban đầu (nếu có)
  if (paid > 0 && SELECTED_CUSTOMER) {
    await sb.from("customer_payments").insert({
      customer_id: SELECTED_CUSTOMER.id, order_id: order.id, amount: paid,
      method: "cash", note: "Thanh toán lúc tạo đơn", created_by: CURRENT_PROFILE.id
    });
  }

  submitBtn.disabled = false;
  submitBtn.textContent = "Tạo đơn hàng";
  document.getElementById("orderModal").classList.remove("open");

  await Promise.all([loadProducts(), loadOrders()]);
  alert(`Đã tạo đơn hàng ${orderCode} thành công!`);
}
</script>
</body>
</html>
