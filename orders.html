<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bán hàng — 2D Aquatic POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(10,22,40,0.5); z-index:300; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.open { display:flex; }
.modal-box { background:#fff; border-radius:14px; width:100%; max-width:400px; max-height:88vh; overflow-y:auto; }
.modal-header { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.modal-header h3 { font-family:var(--font-display); font-size:18px; }
.modal-body { padding:20px 22px; }
.modal-close { cursor:pointer; font-size:20px; color:var(--text-mute); }
.type-toggle { display:flex; gap:6px; max-width:320px; margin-bottom:18px; }
.type-btn { flex:1; padding:10px; text-align:center; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-weight:600; font-size:13.5px; color:var(--text-mute); background:#fff; }
.type-btn.active.retail { border-color:var(--teal-deep); color:var(--teal-deep); background:#ecfdf5; }
.type-btn.active.wholesale { border-color:#4338ca; color:#4338ca; background:#eef2ff; }

/* Desktop: 2 cột ngang — sản phẩm bên trái, đơn hàng/khách hàng bên phải.
   Mobile: tự động xuống 1 cột dọc (xem media query bên dưới). */
.pos-layout {
  display: grid;
  grid-template-columns: 1fr 420px;
  gap: 20px;
  align-items: start;
}
.pos-col-right { position: sticky; top: 78px; }

@media (max-width: 1000px) {
  .pos-layout { grid-template-columns: 1fr; }
  .pos-col-right { position: static; }
}

.chip-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; overflow-x:auto; padding-bottom:2px; }
.chip { padding:8px 16px; border-radius:20px; font-size:13px; border:1px solid var(--border); cursor:pointer; background:#fff; color:var(--text-mute); white-space:nowrap; flex-shrink:0; }
.chip.active { background:var(--ink); color:#fff; border-color:var(--ink); }
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
}
.product-card {
  border: 1.5px solid var(--border); border-radius: 10px; padding: 12px;
  cursor: pointer; background: #fff; position: relative; transition: border-color .12s, transform .08s;
  user-select: none;
}
.product-card:hover { border-color: var(--teal); }
.product-card:active { transform: scale(0.97); }
.product-card.out-of-stock { opacity: 0.4; cursor: not-allowed; }
.product-card .pname { font-weight: 600; font-size: 13px; line-height: 1.3; margin-bottom: 6px; min-height: 34px; }
.product-card .pprice { color: var(--teal-deep); font-weight: 700; font-size: 14px; }
.product-card .pstock { font-size: 11px; color: var(--text-mute); margin-top: 3px; }
.product-card .cart-badge {
  position: absolute; top: -8px; right: -8px; background: var(--coral); color: #fff;
  border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center;
  justify-content: center; font-size: 12px; font-weight: 700; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}
.cart-line { display: flex; align-items: center; gap: 10px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.cart-line:last-child { border-bottom: none; }
.cart-line .cl-info { flex: 1; min-width: 0; }
.cart-line .cl-name { font-size: 13.5px; font-weight: 600; }
.cart-line .cl-price { font-size: 12px; color: var(--text-mute); }
.cart-line .cl-price-edit { cursor: pointer; text-decoration: underline dotted; }
.cart-line .cl-price-edit:hover { color: var(--teal-deep); }
.cart-line .cl-stepper { display: flex; align-items: center; gap: 8px; }
.cl-stepper button { width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: #fff; cursor: pointer; font-weight: 700; color: var(--ink); }
.cl-stepper span { min-width: 20px; text-align: center; font-size: 13.5px; font-weight: 600; }
.cart-line .cl-remove { color: var(--danger); cursor: pointer; font-size: 17px; padding: 0 4px; }
.discount-row { display:flex; gap:8px; margin-top:6px; align-items:center; }
.discount-type-toggle { display:flex; border:1.5px solid var(--border); border-radius:8px; overflow:hidden; flex-shrink:0; }
.discount-type-btn { padding:9px 12px; font-size:13px; font-weight:700; cursor:pointer; color:var(--text-mute); background:#fff; }
.discount-type-btn.active { background:var(--ink); color:#fff; }
#discountValue { flex:1; max-width:160px; }
.pay-quick-row { display:flex; gap:8px; margin-top:8px; max-width:420px; }
.pay-quick-btn { flex:1; padding:11px 8px; text-align:center; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-weight:600; font-size:13px; color:var(--text-mute); background:#fff; }
.pay-quick-btn.active.cash { border-color:var(--teal-deep); color:var(--teal-deep); background:#ecfdf5; }
.pay-quick-btn.active.transfer { border-color:#4338ca; color:#4338ca; background:#eef2ff; }
.pay-custom-link { font-size:12px; color:var(--text-mute); text-decoration:underline; cursor:pointer; margin-top:8px; display:inline-block; }
.summary-row { display:flex; justify-content:space-between; padding:6px 0; font-size:14px; max-width:420px; }
.summary-row.total { font-weight:700; font-size:16px; border-top:1px solid var(--border); margin-top:6px; padding-top:12px; }
.autocomplete-wrap { position:relative; max-width:420px; }
.autocomplete-list { position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid var(--border); border-radius:8px; max-height:220px; overflow-y:auto; box-shadow:var(--shadow); z-index:10; margin-top:4px; display:none; }
.autocomplete-list.open { display:block; }
.autocomplete-item { padding:10px 12px; cursor:pointer; font-size:13.5px; border-bottom:1px solid var(--border); }
.autocomplete-item:last-child { border-bottom:none; }
.autocomplete-item:hover { background:#f8fafc; }
.autocomplete-item .sub { font-size:11.5px; color:var(--text-mute); }
.selected-customer-tag { display:flex; align-items:center; gap:8px; padding:10px 14px; border:1px solid var(--border); border-radius:8px; background:#f8fafc; font-size:13.5px; max-width:420px; }
.remove-x { color:var(--danger); cursor:pointer; font-weight:700; margin-left:auto; }
.add-toast {
  position: fixed; top: 18px; left: 50%; transform: translateX(-50%) translateY(-20px);
  background: var(--ink); color: #fff; padding: 10px 18px; border-radius:30px; font-size:13.5px;
  font-weight:600; z-index:400; opacity:0; pointer-events:none; transition: opacity .18s, transform .18s;
  display:flex; align-items:center; gap:8px; box-shadow:0 8px 24px rgba(0,0,0,0.25); white-space:nowrap;
}
.add-toast.show { opacity:1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<script src="js/supabase-client.js"></script>
<script src="js/layout.js"></script>
<script>
let CURRENT_PROFILE = null;
let ALL_PRODUCTS = [];
let ALL_CUSTOMERS = [];
let CART = [];
let ORDER_TYPE = "retail";
let SELECTED_CUSTOMER = null;
let ACTIVE_CATEGORY = "";
let PAY_MODE = "quick";
let PAY_METHOD = "cash";
let DISCOUNT_TYPE = "percent";

(async () => {
  const auth = await requireAuth();
  if (!auth) return;
  CURRENT_PROFILE = auth.profile;

  renderLayout({
    activePage: "orders",
    profile: CURRENT_PROFILE,
    title: "Bán hàng",
    subtitle: "Chọn sản phẩm và tạo đơn hàng"
  });

  document.getElementById("pageContent").innerHTML = `
    <div class="pos-layout">
      <div class="pos-col-left">
        <div class="panel">
          <div class="panel-header flex" style="justify-content:space-between;">
            <h2>Chọn sản phẩm</h2>
            <span class="badge" id="priceTypeBadge" style="background:#ecfdf5; color:var(--teal-deep);">Giá bán lẻ</span>
          </div>
          <div class="panel-body">
            <input class="search-bar" id="productSearch" placeholder="🔍 Tìm sản phẩm theo tên hoặc SKU..." style="max-width:100%; margin-bottom:14px;">
            <div class="chip-row" id="categoryChips"></div>
            <div class="product-grid" id="productGrid"></div>
          </div>
        </div>
      </div>

      <div class="pos-col-right">
        <div class="panel">
          <div class="panel-header flex" style="justify-content:space-between;">
            <h2>Đơn hàng</h2>
            <span class="btn btn-secondary btn-mini" id="clearCartBtn">Xóa tất cả</span>
          </div>
          <div class="panel-body">
            <div id="cartItems"></div>

            <div class="summary-row"><span>Tạm tính</span><span id="sumSubtotal">0₫</span></div>

            <div class="discount-row">
              <div class="discount-type-toggle">
                <div class="discount-type-btn active" id="discPercentBtn">%</div>
                <div class="discount-type-btn" id="discAmountBtn">₫</div>
              </div>
              <input id="discountValue" type="number" step="any" value="0" placeholder="Giảm giá">
            </div>
            <div class="summary-row" id="discountRow" style="display:none;"><span>Giảm giá</span><span id="sumDiscount">-0₫</span></div>

            <div class="summary-row total"><span>Tổng tiền</span><span id="sumTotal">0₫</span></div>

            <div style="margin-top:14px;">
              <label style="display:block; font-size:12.5px; font-weight:600; color:var(--text-mute); margin-bottom:6px;">Thanh toán</label>
              <div class="pay-quick-row" id="payQuickRow">
                <div class="pay-quick-btn cash active" id="quickCashBtn">💵 Tiền mặt<br><span style="font-weight:400; font-size:11px;">(thanh toán đủ)</span></div>
                <div class="pay-quick-btn transfer" id="quickTransferBtn">🏦 Chuyển khoản<br><span style="font-weight:400; font-size:11px;">(thanh toán đủ)</span></div>
              </div>
              <span class="pay-custom-link" id="toggleCustomPay">Khách trả một phần / chia 2 hình thức →</span>

              <div id="customPayFields" style="display:none; max-width:420px;">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px;">
                  <div class="field" style="margin-bottom:0;"><label>Tiền mặt</label><input id="payCash" type="number" step="any" value="0"></div>
                  <div class="field" style="margin-bottom:0;"><label>Chuyển khoản</label><input id="payTransfer" type="number" step="any" value="0"></div>
                </div>
                <span class="pay-custom-link" id="toggleQuickPay">← Quay lại thanh toán đủ</span>
              </div>
            </div>

            <div class="summary-row total"><span>Còn nợ</span><span id="sumDebt">0₫</span></div>
            <button class="btn btn-primary" id="submitOrderBtn" style="width:100%; max-width:420px; justify-content:center; padding:13px; margin-top:14px;">Tạo đơn hàng</button>
          </div>
        </div>

        <div class="panel">
          <div class="panel-header"><h2>Thông tin khách hàng</h2></div>
          <div class="panel-body" id="customerPickerWrap"></div>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="quickCustomerModal">
      <div class="modal-box">
        <div class="modal-header"><h3>Thêm khách hàng nhanh</h3><span class="modal-close" id="closeQuickCustomer">✕</span></div>
        <div class="modal-body">
          <div class="field"><label>Tên khách hàng *</label><input id="qc_name" required></div>
          <div class="field"><label>Số điện thoại</label><input id="qc_phone"></div>
          <div class="field"><label>Địa chỉ</label><input id="qc_address"></div>
          <div class="flex gap-8" style="margin-top:16px; justify-content:flex-end;">
            <button type="button" class="btn btn-secondary" id="qcCancelBtn">Hủy</button>
            <button type="button" class="btn btn-primary" id="qcSaveBtn">Lưu & chọn</button>
          </div>
        </div>
      </div>
    </div>

    <div class="add-toast" id="addToast"></div>
  `;

  await Promise.all([loadProducts(), loadCustomers()]);
  bindEvents();
  resetOrderState();
})();

async function loadProducts() {
  const { data } = await sb.from("products").select("*").order("name");
  ALL_PRODUCTS = data || [];
}
async function loadCustomers() {
  const { data } = await sb.from("customers").select("*").order("name");
  ALL_CUSTOMERS = data || [];
}

function resetOrderState() {
  CART = [];
  SELECTED_CUSTOMER = null;
  ORDER_TYPE = "retail";
  ACTIVE_CATEGORY = "";
  PAY_MODE = "quick";
  PAY_METHOD = "cash";
  DISCOUNT_TYPE = "percent";

  document.getElementById("productSearch").value = "";
  document.getElementById("discountValue").value = 0;
  document.getElementById("discPercentBtn").classList.add("active");
  document.getElementById("discAmountBtn").classList.remove("active");
  document.getElementById("payQuickRow").style.display = "flex";
  document.getElementById("customPayFields").style.display = "none";
  document.getElementById("toggleCustomPay").style.display = "inline-block";
  document.getElementById("quickCashBtn").classList.add("active");
  document.getElementById("quickTransferBtn").classList.remove("active");

  renderCustomerPicker();
  renderCategoryChips();
  renderProductGrid("");
  renderCart();
}

function bindEvents() {
  const prodInput = document.getElementById("productSearch");
  prodInput.addEventListener("input", () => renderProductGrid(prodInput.value));

  document.getElementById("clearCartBtn").addEventListener("click", () => {
    if (CART.length === 0) return;
    if (window.confirm("Xóa toàn bộ sản phẩm trong đơn hàng?")) { CART = []; renderProductGrid(document.getElementById("productSearch").value); renderCart(); }
  });

  document.getElementById("discPercentBtn").addEventListener("click", () => setDiscountType("percent"));
  document.getElementById("discAmountBtn").addEventListener("click", () => setDiscountType("amount"));
  document.getElementById("discountValue").addEventListener("input", updateSummary);

  document.getElementById("quickCashBtn").addEventListener("click", () => setPayMethod("cash"));
  document.getElementById("quickTransferBtn").addEventListener("click", () => setPayMethod("transfer"));
  document.getElementById("toggleCustomPay").addEventListener("click", () => {
    PAY_MODE = "custom";
    document.getElementById("payQuickRow").style.display = "none";
    document.getElementById("toggleCustomPay").style.display = "none";
    document.getElementById("customPayFields").style.display = "block";
    document.getElementById("payCash").value = 0;
    document.getElementById("payTransfer").value = 0;
    updateSummary();
  });
  document.getElementById("toggleQuickPay").addEventListener("click", () => {
    PAY_MODE = "quick";
    document.getElementById("payQuickRow").style.display = "flex";
    document.getElementById("toggleCustomPay").style.display = "inline-block";
    document.getElementById("customPayFields").style.display = "none";
    updateSummary();
  });
  document.getElementById("payCash").addEventListener("input", updateSummary);
  document.getElementById("payTransfer").addEventListener("input", updateSummary);
  document.getElementById("submitOrderBtn").addEventListener("click", submitOrder);

  document.getElementById("closeQuickCustomer").addEventListener("click", () => document.getElementById("quickCustomerModal").classList.remove("open"));
  document.getElementById("qcCancelBtn").addEventListener("click", () => document.getElementById("quickCustomerModal").classList.remove("open"));
  document.getElementById("qcSaveBtn").addEventListener("click", saveQuickCustomer);
}

function setOrderType(type) {
  ORDER_TYPE = type;
  const badge = document.getElementById("priceTypeBadge");
  if (badge) {
    badge.textContent = type === "wholesale" ? "Giá bán buôn" : "Giá bán lẻ";
    badge.style.background = type === "wholesale" ? "#eef2ff" : "#ecfdf5";
    badge.style.color = type === "wholesale" ? "#4338ca" : "var(--teal-deep)";
  }
  CART.forEach(item => {
    const p = ALL_PRODUCTS.find(x => x.id === item.product_id);
    if (p) item.unit_price = type === "wholesale" ? Number(p.wholesale_price) : Number(p.retail_price);
  });
  renderProductGrid(document.getElementById("productSearch").value);
  renderCart();
}

function setDiscountType(type) {
  DISCOUNT_TYPE = type;
  document.getElementById("discPercentBtn").classList.toggle("active", type === "percent");
  document.getElementById("discAmountBtn").classList.toggle("active", type === "amount");
  updateSummary();
}

function setPayMethod(method) {
  PAY_METHOD = method;
  document.getElementById("quickCashBtn").classList.toggle("active", method === "cash");
  document.getElementById("quickTransferBtn").classList.toggle("active", method === "transfer");
  updateSummary();
}

function calcDiscount(subtotal) {
  const val = Number(document.getElementById("discountValue").value || 0);
  if (val <= 0) return 0;
  let discount = DISCOUNT_TYPE === "percent" ? subtotal * (val / 100) : val;
  return Math.min(discount, subtotal);
}

/* ---------- Khách hàng ---------- */
function renderCustomerPicker() {
  const wrap = document.getElementById("customerPickerWrap");
  if (SELECTED_CUSTOMER) {
    wrap.innerHTML = `<div class="selected-customer-tag">
      👤 ${SELECTED_CUSTOMER.name} ${SELECTED_CUSTOMER.phone ? '· ' + SELECTED_CUSTOMER.phone : ''} ${SELECTED_CUSTOMER.address ? '· 📍 ' + SELECTED_CUSTOMER.address : ''}
      <span class="remove-x" id="clearCustomerBtn">Bỏ chọn ✕</span>
    </div>`;
    document.getElementById("clearCustomerBtn").addEventListener("click", () => {
      SELECTED_CUSTOMER = null;
      setOrderType("retail");
      renderCustomerPicker();
    });
  } else {
    wrap.innerHTML = `<div class="autocomplete-wrap">
      <input id="customerSearch" placeholder="Khách lẻ — gõ SĐT rồi Enter, hoặc tìm theo tên...">
      <div class="autocomplete-list" id="customerList"></div>
    </div>`;
    const custInput = document.getElementById("customerSearch");
    custInput.addEventListener("input", () => renderCustomerList(custInput.value));
    custInput.addEventListener("focus", () => renderCustomerList(custInput.value));
    custInput.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      e.preventDefault();
      const val = custInput.value.trim();
      if (!val) return;
      const exactPhone = ALL_CUSTOMERS.find(c => c.phone && c.phone.replace(/\s/g, "") === val.replace(/\s/g, ""));
      if (exactPhone) { SELECTED_CUSTOMER = exactPhone; setOrderType(exactPhone.type); renderCustomerPicker(); return; }
      const f = val.toLowerCase();
      const matches = ALL_CUSTOMERS.filter(c => c.name.toLowerCase().includes(f) || (c.phone || "").includes(f));
      if (matches.length === 1) {
        SELECTED_CUSTOMER = matches[0];
        setOrderType(matches[0].type);
        renderCustomerPicker();
      } else {
        document.getElementById("qc_name").value = "";
        document.getElementById("qc_phone").value = /^[0-9+\s]+$/.test(val) ? val : "";
        document.getElementById("qc_address").value = "";
        document.getElementById("quickCustomerModal").classList.add("open");
      }
    });
    document.addEventListener("click", (e) => {
      if (!e.target.closest("#customerPickerWrap")) document.getElementById("customerList")?.classList.remove("open");
    });
  }
}

function renderCustomerList(filter) {
  const list = document.getElementById("customerList");
  if (!list) return;
  const f = (filter || "").trim().toLowerCase();
  const matches = ALL_CUSTOMERS.filter(c => !f || c.name.toLowerCase().includes(f) || (c.phone || "").includes(f));

  list.innerHTML = matches.slice(0, 8).map(c =>
    `<div class="autocomplete-item" data-id="${c.id}">${c.name} <span class="sub">${c.phone || ''} · ${c.type === 'wholesale' ? 'Buôn' : 'Lẻ'}${c.address ? ' · ' + c.address : ''}</span></div>`
  ).join("") + `<div class="autocomplete-item" style="color:var(--teal-deep); font-weight:600;" id="quickAddCustomerItem">+ Thêm khách hàng mới ${filter ? '"' + filter + '"' : ''}</div>`;

  list.classList.add("open");

  list.querySelectorAll(".autocomplete-item[data-id]").forEach(el => {
    el.addEventListener("click", () => {
      SELECTED_CUSTOMER = ALL_CUSTOMERS.find(c => c.id === el.dataset.id);
      setOrderType(SELECTED_CUSTOMER.type);
      renderCustomerPicker();
    });
  });
  document.getElementById("quickAddCustomerItem").addEventListener("click", () => {
    document.getElementById("qc_name").value = filter || "";
    document.getElementById("qc_phone").value = "";
    document.getElementById("qc_address").value = "";
    document.getElementById("quickCustomerModal").classList.add("open");
    list.classList.remove("open");
  });
}

async function saveQuickCustomer() {
  const name = document.getElementById("qc_name").value.trim();
  if (!name) { alert("Vui lòng nhập tên khách hàng."); return; }
  const phone = document.getElementById("qc_phone").value.trim() || null;
  const address = document.getElementById("qc_address").value.trim() || null;

  const { data, error } = await sb.from("customers").insert({ name, phone, address, type: ORDER_TYPE }).select().single();
  if (error) { alert("Lỗi khi thêm khách hàng: " + error.message); return; }

  ALL_CUSTOMERS.push(data);
  SELECTED_CUSTOMER = data;
  setOrderType(data.type);
  renderCustomerPicker();
  document.getElementById("quickCustomerModal").classList.remove("open");
}

/* ---------- Danh mục + Lưới sản phẩm ---------- */
function renderCategoryChips() {
  const cats = [...new Set(ALL_PRODUCTS.map(p => p.category).filter(Boolean))];
  const wrap = document.getElementById("categoryChips");
  if (cats.length === 0) { wrap.innerHTML = ""; return; }
  wrap.innerHTML = [`<div class="chip ${ACTIVE_CATEGORY === '' ? 'active' : ''}" data-cat="">Tất cả</div>`]
    .concat(cats.map(c => `<div class="chip ${ACTIVE_CATEGORY === c ? 'active' : ''}" data-cat="${c}">${c}</div>`)).join("");
  wrap.querySelectorAll(".chip").forEach(el => {
    el.addEventListener("click", () => {
      ACTIVE_CATEGORY = el.dataset.cat;
      renderCategoryChips();
      renderProductGrid(document.getElementById("productSearch").value);
    });
  });
}

function renderProductGrid(filter) {
  const grid = document.getElementById("productGrid");
  const f = (filter || "").trim().toLowerCase();
  let list = ALL_PRODUCTS.filter(p => !f || p.name.toLowerCase().includes(f) || (p.sku || "").toLowerCase().includes(f));
  if (ACTIVE_CATEGORY) list = list.filter(p => p.category === ACTIVE_CATEGORY);

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">📦</div>Không tìm thấy sản phẩm.</div>`;
    return;
  }

  grid.innerHTML = list.map(p => {
    const inCart = CART.find(i => i.product_id === p.id);
    const price = ORDER_TYPE === "wholesale" ? p.wholesale_price : p.retail_price;
    const outOfStock = Number(p.quantity) <= 0;
    return `<div class="product-card ${outOfStock ? 'out-of-stock' : ''}" data-id="${p.id}">
      ${inCart ? `<div class="cart-badge">${inCart.quantity}</div>` : ""}
      <div class="pname">${p.name}</div>
      <div class="pprice">${formatVND(price)}</div>
      <div class="pstock">${outOfStock ? 'Hết hàng' : 'Tồn: ' + p.quantity + ' ' + (p.unit || '')}</div>
    </div>`;
  }).join("");

  grid.querySelectorAll(".product-card:not(.out-of-stock)").forEach(el => {
    el.addEventListener("click", () => addToCart(el.dataset.id));
  });
}

function addToCart(productId) {
  const p = ALL_PRODUCTS.find(x => x.id === productId);
  if (!p) return;
  const existing = CART.find(i => i.product_id === productId);
  if (existing) {
    if (existing.quantity >= Number(p.quantity)) { alert(`Chỉ còn ${p.quantity} ${p.unit || ''} trong kho.`); return; }
    existing.quantity += 1;
    showAddToast(p.name, existing.quantity);
  } else {
    CART.push({
      product_id: p.id, name: p.name, unit: p.unit, max_qty: Number(p.quantity),
      quantity: 1, unit_price: ORDER_TYPE === "wholesale" ? Number(p.wholesale_price) : Number(p.retail_price)
    });
    showAddToast(p.name, 1);
  }
  renderProductGrid(document.getElementById("productSearch").value);
  renderCart();
  document.getElementById("cartItems").scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function changeQty(productId, delta) {
  const item = CART.find(i => i.product_id === productId);
  if (!item) return;
  const newQty = item.quantity + delta;
  if (newQty <= 0) {
    CART = CART.filter(i => i.product_id !== productId);
  } else if (newQty > item.max_qty) {
    alert(`Chỉ còn ${item.max_qty} ${item.unit || ''} trong kho.`);
    return;
  } else {
    item.quantity = newQty;
  }
  renderProductGrid(document.getElementById("productSearch").value);
  renderCart();
}

function editItemPrice(productId) {
  const item = CART.find(i => i.product_id === productId);
  if (!item) return;
  const input = window.prompt(`Sửa giá bán cho "${item.name}"\nGiá hiện tại: ${formatVND(item.unit_price)}\n\nNhập giá bán mới:`, item.unit_price);
  if (input === null) return;
  const newPrice = Number(input);
  if (isNaN(newPrice) || newPrice < 0) { alert("Giá không hợp lệ."); return; }
  item.unit_price = newPrice;
  renderCart();
}

let toastTimer = null;
function showAddToast(name, qty) {
  const toast = document.getElementById("addToast");
  toast.textContent = `✓ Đã thêm ${name}${qty > 1 ? ' ×' + qty : ''}`;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 1100);
}

/* ---------- Giỏ hàng / Tổng kết ---------- */
function renderCart() {
  const wrap = document.getElementById("cartItems");
  if (CART.length === 0) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">🛒</div>Chưa có sản phẩm nào<br>Bấm vào sản phẩm phía trên để thêm</div>`;
  } else {
    wrap.innerHTML = CART.map(item => `
      <div class="cart-line">
        <div class="cl-info">
          <div class="cl-name">${item.name}</div>
          <div class="cl-price cl-price-edit" data-id="${item.product_id}">✎ ${formatVND(item.unit_price)} / ${item.unit || 'cái'}</div>
        </div>
        <div class="cl-stepper">
          <button data-id="${item.product_id}" data-d="-1">−</button>
          <span>${item.quantity}</span>
          <button data-id="${item.product_id}" data-d="1">+</button>
        </div>
        <span class="cl-remove" data-id="${item.product_id}">✕</span>
      </div>
    `).join("");
    wrap.querySelectorAll(".cl-stepper button").forEach(btn => {
      btn.addEventListener("click", () => changeQty(btn.dataset.id, Number(btn.dataset.d)));
    });
    wrap.querySelectorAll(".cl-remove").forEach(btn => {
      btn.addEventListener("click", () => { CART = CART.filter(i => i.product_id !== btn.dataset.id); renderProductGrid(document.getElementById("productSearch").value); renderCart(); });
    });
    wrap.querySelectorAll(".cl-price-edit").forEach(el => {
      el.addEventListener("click", () => editItemPrice(el.dataset.id));
    });
  }
  updateSummary();
}

function updateSummary() {
  const subtotal = CART.reduce((s, i) => s + (i.quantity * i.unit_price), 0);
  const discount = calcDiscount(subtotal);
  const total = subtotal - discount;

  let cash, transfer;
  if (PAY_MODE === "quick") {
    cash = PAY_METHOD === "cash" ? total : 0;
    transfer = PAY_METHOD === "transfer" ? total : 0;
  } else {
    cash = Number(document.getElementById("payCash").value || 0);
    transfer = Number(document.getElementById("payTransfer").value || 0);
  }
  const paid = cash + transfer;
  const debt = Math.max(total - paid, 0);

  document.getElementById("sumSubtotal").textContent = formatVND(subtotal);
  document.getElementById("discountRow").style.display = discount > 0 ? "flex" : "none";
  document.getElementById("sumDiscount").textContent = "-" + formatVND(discount);
  document.getElementById("sumTotal").textContent = formatVND(total);
  document.getElementById("sumDebt").textContent = formatVND(debt);
}

/* ---------- Tạo đơn ---------- */
async function submitOrder() {
  if (CART.length === 0) { alert("Vui lòng thêm ít nhất 1 sản phẩm vào đơn hàng."); return; }

  for (const item of CART) {
    const p = ALL_PRODUCTS.find(x => x.id === item.product_id);
    if (p && item.quantity > Number(p.quantity)) {
      alert(`Sản phẩm "${item.name}" chỉ còn ${p.quantity} ${p.unit || ''} trong kho.`);
      return;
    }
  }

  const submitBtn = document.getElementById("submitOrderBtn");
  submitBtn.disabled = true;
  submitBtn.textContent = "Đang tạo đơn...";

  const subtotal = CART.reduce((s, i) => s + (i.quantity * i.unit_price), 0);
  const discountAmount = calcDiscount(subtotal);
  const discountValue = Number(document.getElementById("discountValue").value || 0);
  const total = subtotal - discountAmount;
  let cash, transfer;
  if (PAY_MODE === "quick") {
    cash = PAY_METHOD === "cash" ? total : 0;
    transfer = PAY_METHOD === "transfer" ? total : 0;
  } else {
    cash = Number(document.getElementById("payCash").value || 0);
    transfer = Number(document.getElementById("payTransfer").value || 0);
  }
  const paid = cash + transfer;
  const orderCode = "DH" + Date.now().toString().slice(-8);

  const { data: order, error: orderErr } = await sb.from("orders").insert({
    order_code: orderCode,
    customer_id: SELECTED_CUSTOMER?.id || null,
    type: ORDER_TYPE,
    status: "completed",
    total_amount: total,
    paid_amount: paid,
    discount_type: discountAmount > 0 ? DISCOUNT_TYPE : null,
    discount_value: discountAmount > 0 ? discountValue : 0,
    discount_amount: discountAmount,
    created_by: CURRENT_PROFILE.id
  }).select().single();

  if (orderErr) {
    alert("Lỗi khi tạo đơn hàng: " + orderErr.message);
    submitBtn.disabled = false;
    submitBtn.textContent = "Tạo đơn hàng";
    return;
  }

  const itemRows = CART.map(i => ({ order_id: order.id, product_id: i.product_id, quantity: i.quantity, unit_price: i.unit_price }));
  await sb.from("order_items").insert(itemRows);

  for (const item of CART) {
    const p = ALL_PRODUCTS.find(x => x.id === item.product_id);
    const newQty = Number(p.quantity) - item.quantity;
    await sb.from("products").update({ quantity: newQty }).eq("id", item.product_id);
    await sb.from("inventory_log").insert({
      product_id: item.product_id, change_qty: -item.quantity, reason: "sale",
      reference_id: order.id, created_by: CURRENT_PROFILE.id
    });
  }

  if (cash > 0) {
    await sb.from("customer_payments").insert({
      customer_id: SELECTED_CUSTOMER?.id || null, order_id: order.id, amount: cash,
      method: "cash", note: "Thanh toán lúc tạo đơn", created_by: CURRENT_PROFILE.id
    });
    await sb.from("cash_transactions").insert({
      type: "income", method: "cash", category: "Bán hàng", amount: cash,
      note: `Thu tiền mặt đơn ${orderCode}`, created_by: CURRENT_PROFILE.id
    });
  }
  if (transfer > 0) {
    await sb.from("customer_payments").insert({
      customer_id: SELECTED_CUSTOMER?.id || null, order_id: order.id, amount: transfer,
      method: "transfer", note: "Thanh toán lúc tạo đơn", created_by: CURRENT_PROFILE.id
    });
    await sb.from("cash_transactions").insert({
      type: "income", method: "transfer", category: "Bán hàng", amount: transfer,
      note: `Thu chuyển khoản đơn ${orderCode}`, created_by: CURRENT_PROFILE.id
    });
  }

  submitBtn.disabled = false;
  submitBtn.textContent = "Tạo đơn hàng";

  await loadProducts();
  resetOrderState();
  alert(`Đã tạo đơn hàng ${orderCode} thành công!`);
}
</script>
