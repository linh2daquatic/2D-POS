<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — 2D Aquatic POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<script src="js/supabase-client.js"></script>
<script src="js/layout.js"></script>
<script>
(async () => {
  const auth = await requireAuth();
  if (!auth) return;
  const { profile } = auth;
  const isOwner = profile.role === "owner";

  renderLayout({
    activePage: "dashboard",
    profile,
    title: "Dashboard",
    subtitle: "Tổng quan hoạt động kinh doanh hôm nay"
  });

  const content = document.getElementById("pageContent");
  content.innerHTML = `<div class="stat-grid" id="statGrid"></div>
    <div class="panel">
      <div class="panel-header"><h2>Doanh thu 7 ngày gần nhất</h2></div>
      <div class="panel-body" id="chartBody">
        <div class="empty-state"><div class="icon">⏳</div>Đang tải...</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header"><h2>Sản phẩm sắp hết hàng</h2></div>
      <div class="panel-body" id="lowStockBody">
        <div class="empty-state"><div class="icon">⏳</div>Đang tải...</div>
      </div>
    </div>
    ${isOwner ? `
    <div class="panel">
      <div class="panel-header"><h2>Doanh số theo nhân viên (tháng này)</h2></div>
      <div class="panel-body" id="staffStatsBody">
        <div class="empty-state"><div class="icon">⏳</div>Đang tải...</div>
      </div>
    </div>` : ""}
    <div class="panel">
      <div class="panel-header"><h2>Đơn hàng gần đây</h2></div>
      <div class="panel-body" id="recentOrdersBody">
        <div class="empty-state"><div class="icon">⏳</div>Đang tải...</div>
      </div>
    </div>`;

  loadDashboard(isOwner);
})();

async function loadDashboard(isOwner) {
  const statGrid = document.getElementById("statGrid");
  const todayStart = new Date();
  todayStart.setHours(0,0,0,0);

  // Doanh thu + đơn hàng hôm nay
  const { data: todayOrders } = await sb
    .from("orders")
    .select("total_amount, paid_amount, status, created_at")
    .gte("created_at", todayStart.toISOString())
    .eq("status", "completed");

  const revenueToday = (todayOrders || []).reduce((s, o) => s + Number(o.total_amount || 0), 0);
  const ordersToday = (todayOrders || []).length;

  // Tổng công nợ khách hàng (toàn bộ, chưa lọc theo ngày)
  const { data: allOrders } = await sb
    .from("orders")
    .select("total_amount, paid_amount")
    .eq("status", "completed");
  const totalCustomerDebt = (allOrders || []).reduce((s, o) => s + (Number(o.total_amount||0) - Number(o.paid_amount||0)), 0);

  // Doanh thu tháng này
  const monthStart = new Date(); monthStart.setDate(1); monthStart.setHours(0,0,0,0);
  const { data: monthOrders } = await sb
    .from("orders")
    .select("total_amount, created_at")
    .eq("status", "completed")
    .gte("created_at", monthStart.toISOString());
  const revenueMonth = (monthOrders || []).reduce((s, o) => s + Number(o.total_amount || 0), 0);

  // Dữ liệu biểu đồ 7 ngày gần nhất
  const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 6); sevenDaysAgo.setHours(0,0,0,0);
  const { data: weekOrders } = await sb
    .from("orders")
    .select("total_amount, created_at")
    .eq("status", "completed")
    .gte("created_at", sevenDaysAgo.toISOString());

  const dayBuckets = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i); d.setHours(0,0,0,0);
    dayBuckets.push({ date: d, label: d.toLocaleDateString("vi-VN", { weekday: "short" }), total: 0 });
  }
  (weekOrders || []).forEach(o => {
    const od = new Date(o.created_at); od.setHours(0,0,0,0);
    const bucket = dayBuckets.find(b => b.date.getTime() === od.getTime());
    if (bucket) bucket.total += Number(o.total_amount || 0);
  });

  // Sản phẩm sắp hết hàng
  const { data: products } = await sb
    .from("products")
    .select("id, name, quantity, low_stock_threshold, unit")
    .order("quantity", { ascending: true });
  const lowStock = (products || []).filter(p => Number(p.quantity) <= Number(p.low_stock_threshold));

  let cards = `
    <div class="stat-card accent">
      <div class="label">Doanh thu hôm nay</div>
      <div class="value">${formatVND(revenueToday)}</div>
    </div>
    <div class="stat-card accent">
      <div class="label">Doanh thu tháng này</div>
      <div class="value">${formatVND(revenueMonth)}</div>
    </div>
    <div class="stat-card">
      <div class="label">Đơn hàng hôm nay</div>
      <div class="value">${ordersToday}</div>
    </div>
    <div class="stat-card ${totalCustomerDebt > 0 ? 'warn' : ''}">
      <div class="label">Công nợ khách hàng</div>
      <div class="value">${formatVND(totalCustomerDebt)}</div>
    </div>
    <div class="stat-card ${lowStock.length > 0 ? 'danger-card' : ''}">
      <div class="label">Sản phẩm sắp hết</div>
      <div class="value">${lowStock.length}</div>
    </div>`;

  if (isOwner) {
    const { data: pos } = await sb.from("purchase_orders").select("total_amount, paid_amount").eq("status","completed");
    const supplierDebt = (pos || []).reduce((s,o) => s + (Number(o.total_amount||0)-Number(o.paid_amount||0)), 0);

    const { data: cashTx } = await sb.from("cash_transactions").select("type, amount, method");
    const cashBalance = (cashTx || []).filter(t => (t.method || "cash") === "cash").reduce((s,t) => s + (t.type === "income" ? Number(t.amount) : -Number(t.amount)), 0);

    // Lãi gộp tháng này = doanh thu - giá vốn (dựa trên giá vốn hiện tại của sản phẩm)
    const { data: monthItems } = await sb
      .from("order_items")
      .select("quantity, unit_price, orders!inner(created_at,status), products(cost_price)")
      .eq("orders.status", "completed")
      .gte("orders.created_at", monthStart.toISOString());

    let monthCost = 0, monthItemRevenue = 0;
    (monthItems || []).forEach(i => {
      monthItemRevenue += Number(i.quantity) * Number(i.unit_price);
      monthCost += Number(i.quantity) * Number(i.products?.cost_price || 0);
    });
    const profitMonth = monthItemRevenue - monthCost;

    // Doanh số theo từng nhân viên (tháng này) — tách riêng sinh vật (Cá/San hô) để tính lương %
    // Tính theo GIÁ TRỊ THỰC TẾ khách thanh toán: dùng giá đã sửa (order_items.unit_price) và
    // phân bổ phần giảm giá của đơn theo đúng tỷ lệ sinh vật/còn lại trong đơn đó.
    const { data: staffOrders } = await sb
      .from("orders")
      .select("id, total_amount, created_by")
      .eq("status", "completed")
      .gte("created_at", monthStart.toISOString());
    const { data: allProfiles } = await sb.from("profiles").select("id, full_name, role");

    const orderIds = (staffOrders || []).map(o => o.id);
    let staffItems = [];
    if (orderIds.length > 0) {
      const { data } = await sb
        .from("order_items")
        .select("order_id, quantity, unit_price, products(category)")
        .in("order_id", orderIds);
      staffItems = data || [];
    }

    const isLivestockCategory = (cat) => {
      const c = (cat || "").trim().toLowerCase();
      return c === "cá" || c === "ca" || c === "san hô" || c === "san ho";
    };

    // Gộp giá trị gốc (trước giảm giá) theo từng đơn, tách sinh vật / còn lại
    const orderBreakdown = {}; // order_id -> { subtotal, livestockSubtotal }
    staffItems.forEach(i => {
      if (!orderBreakdown[i.order_id]) orderBreakdown[i.order_id] = { subtotal: 0, livestockSubtotal: 0 };
      const lineTotal = Number(i.quantity) * Number(i.unit_price);
      orderBreakdown[i.order_id].subtotal += lineTotal;
      if (isLivestockCategory(i.products?.category)) {
        orderBreakdown[i.order_id].livestockSubtotal += lineTotal;
      }
    });

    const byStaff = {};
    (staffOrders || []).forEach(o => {
      const key = o.created_by || "unknown";
      if (!byStaff[key]) byStaff[key] = { orderCount: 0, revenue: 0, livestockRevenue: 0, otherRevenue: 0 };
      byStaff[key].orderCount += 1;
      byStaff[key].revenue += Number(o.total_amount || 0);

      const bd = orderBreakdown[o.id];
      const actualTotal = Number(o.total_amount || 0); // đã trừ giảm giá — giá trị thực tế khách trả
      let livestockShare = 0;
      if (bd && bd.subtotal > 0) livestockShare = bd.livestockSubtotal / bd.subtotal;
      byStaff[key].livestockRevenue += actualTotal * livestockShare;
      byStaff[key].otherRevenue += actualTotal * (1 - livestockShare);
    });

    window.__STAFF_STATS__ = Object.keys(byStaff).map(uid => {
      const profile = (allProfiles || []).find(p => p.id === uid);
      return {
        name: profile?.full_name || "Không rõ",
        role: profile?.role || "staff",
        orderCount: byStaff[uid].orderCount,
        revenue: byStaff[uid].revenue,
        livestockRevenue: byStaff[uid].livestockRevenue,
        otherRevenue: byStaff[uid].otherRevenue
      };
    }).sort((a, b) => b.revenue - a.revenue);

    cards += `
      <div class="stat-card ${supplierDebt > 0 ? 'warn' : ''}">
        <div class="label">Công nợ nhà cung cấp</div>
        <div class="value">${formatVND(supplierDebt)}</div>
      </div>
      <div class="stat-card accent">
        <div class="label">Quỹ tiền mặt</div>
        <div class="value">${formatVND(cashBalance)}</div>
      </div>
      <div class="stat-card ${profitMonth >= 0 ? 'accent' : 'danger-card'}">
        <div class="label">Lãi gộp tháng này</div>
        <div class="value">${formatVND(profitMonth)}</div>
        <div class="delta text-mute" style="font-size:11px;">*Ước tính theo giá vốn hiện tại</div>
      </div>`;
  }

  statGrid.innerHTML = cards;

  if (isOwner) {
    const staffBody = document.getElementById("staffStatsBody");
    const stats = window.__STAFF_STATS__ || [];
    if (stats.length === 0) {
      staffBody.innerHTML = `<div class="empty-state"><div class="icon">👤</div>Chưa có đơn hàng nào trong tháng này.</div>`;
    } else {
      const maxRevenue = Math.max(...stats.map(s => s.revenue), 1);
      staffBody.innerHTML = `<table><thead><tr><th>Nhân viên</th><th>Vai trò</th><th>Số đơn</th><th>🐠 DT sinh vật (Cá/San hô)</th><th>DT còn lại</th><th>Tổng doanh thu</th></tr></thead><tbody>
        ${stats.map(s => `<tr>
          <td>${s.name}${s.revenue === maxRevenue && s.revenue > 0 ? ' <span class="vip-tag" style="font-size:11px; background:#fff7ed; color:#c2410c; padding:2px 8px; border-radius:10px; margin-left:6px; font-weight:600;">🏆 Top</span>' : ''}</td>
          <td>${s.role === 'owner' ? 'Chủ' : 'Nhân viên'}</td>
          <td>${s.orderCount}</td>
          <td style="color:var(--teal-deep); font-weight:600;">${formatVND(s.livestockRevenue)}</td>
          <td>${formatVND(s.otherRevenue)}</td>
          <td style="font-weight:600;">${formatVND(s.revenue)}</td>
        </tr>`).join("")}
      </tbody></table>
      <p class="text-mute" style="font-size:11.5px; margin-top:10px;">*Doanh thu sinh vật/còn lại tính theo giá trị THỰC TẾ khách thanh toán (đã trừ giảm giá, theo giá bán đã sửa nếu có), phân bổ giảm giá theo đúng tỷ lệ trong từng đơn.</p>`;
    }
  }

  // Biểu đồ doanh thu 7 ngày
  const chartBody = document.getElementById("chartBody");
  const maxDay = Math.max(...dayBuckets.map(b => b.total), 1);
  chartBody.innerHTML = `<div style="display:flex; align-items:flex-end; gap:10px; height:160px; padding-top:10px;">
    ${dayBuckets.map(b => {
      const heightPct = Math.max((b.total / maxDay) * 100, b.total > 0 ? 4 : 0);
      return `<div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
        <div style="font-size:11px; color:var(--text-mute); margin-bottom:4px;">${b.total > 0 ? formatVND(b.total).replace('₫','') : ''}</div>
        <div style="width:100%; max-width:36px; height:${heightPct}%; background:${b.total > 0 ? 'var(--teal-deep)' : 'var(--border)'}; border-radius:5px 5px 0 0; min-height:2px;"></div>
        <div style="font-size:11.5px; color:var(--text-mute); margin-top:6px; text-transform:capitalize;">${b.label}</div>
      </div>`;
    }).join("")}
  </div>`;

  // Bảng tồn kho thấp
  const lowStockBody = document.getElementById("lowStockBody");
  if (lowStock.length === 0) {
    lowStockBody.innerHTML = `<div class="empty-state"><div class="icon">✅</div>Chưa có sản phẩm nào sắp hết hàng.</div>`;
  } else {
    lowStockBody.innerHTML = `<table><thead><tr><th>Sản phẩm</th><th>Tồn kho</th><th>Ngưỡng cảnh báo</th></tr></thead><tbody>
      ${lowStock.map(p => `<tr><td>${p.name}</td><td>${p.quantity} ${p.unit||''}</td><td>${p.low_stock_threshold}</td></tr>`).join("")}
    </tbody></table>`;
  }

  // Đơn hàng gần đây
  const { data: recent } = await sb
    .from("orders")
    .select("order_code, type, total_amount, paid_amount, status, created_at, customers(name)")
    .order("created_at", { ascending: false })
    .limit(8);

  const recentBody = document.getElementById("recentOrdersBody");
  if (!recent || recent.length === 0) {
    recentBody.innerHTML = `<div class="empty-state"><div class="icon">🧾</div>Chưa có đơn hàng nào. <br>Hãy tạo đơn hàng đầu tiên ở mục "Đơn hàng".</div>`;
  } else {
    recentBody.innerHTML = `<table><thead><tr><th>Mã đơn</th><th>Khách hàng</th><th>Loại</th><th>Tổng tiền</th><th>Trạng thái</th></tr></thead><tbody>
      ${recent.map(o => {
        const debt = Number(o.total_amount) - Number(o.paid_amount);
        return `<tr>
          <td>${o.order_code}</td>
          <td>${o.customers?.name || "Khách lẻ"}</td>
          <td><span class="badge ${o.type}">${o.type === 'wholesale' ? 'Bán buôn' : 'Bán lẻ'}</span></td>
          <td>${formatVND(o.total_amount)}</td>
          <td><span class="badge ${debt > 0 ? 'debt' : 'paid'}">${debt > 0 ? 'Còn nợ ' + formatVND(debt) : 'Đã thanh toán'}</span></td>
        </tr>`;
      }).join("")}
    </tbody></table>`;
  }
}
</script>
</body>
</html>
