<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — 2D Aquatic POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
.show-more-row {
  text-align:center; padding:12px; margin-top:10px; border:1px dashed var(--border); border-radius:10px;
  color:var(--text-mute); font-size:13px; font-weight:600; cursor:pointer; background:#fff;
}
.show-more-row:hover { border-color:var(--teal); color:var(--teal-deep); }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<script src="js/supabase-client.js"></script>
<script src="js/layout.js"></script>
<script>
(async () => {
  const auth = await requireAuth();
  if (!auth) return;
  const { profile } = auth;
  const isOwner = profile.role === "owner";

  renderLayout({
    activePage: "dashboard",
    profile,
    title: "Dashboard",
    subtitle: "Tổng quan hoạt động kinh doanh hôm nay"
  });

  const content = document.getElementById("pageContent");
  content.innerHTML = `
    <div class="flex gap-8" style="align-items:flex-end; margin-bottom:14px; flex-wrap:wrap;">
      <div class="field" style="margin-bottom:0; max-width:220px;">
        <label>Xem dữ liệu theo tháng</label>
        <select id="monthPicker"></select>
      </div>
    </div>
    <div class="stat-grid" id="statGrid"></div>
    <div class="panel">
      <div class="panel-header"><h2>Doanh thu 7 ngày gần nhất</h2></div>
      <div class="panel-body" id="chartBody">
        <div class="empty-state"><div class="icon">⏳</div>Đang tải...</div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-header"><h2>Sản phẩm sắp hết hàng</h2></div>
      <div class="panel-body" id="lowStockBody">
        <div class="empty-state"><div class="icon">⏳</div>Đang tải...</div>
      </div>
    </div>
    ${isOwner ? `
    <div class="panel">
      <div class="panel-header"><h2 id="staffStatsTitle">Doanh số theo nhân viên (tháng này)</h2></div>
      <div class="panel-body" id="staffStatsBody">
        <div class="empty-state"><div class="icon">⏳</div>Đang tải...</div>
      </div>
    </div>
    <div class="panel" id="expenseDetailPanel" style="display:none;">
      <div class="panel-header"><h2>Chi tiết chi phí</h2></div>
      <div class="panel-body" id="expenseDetailBody"></div>
    </div>` : ""}
    <div class="panel">
      <div class="panel-header"><h2 id="recentOrdersTitle">Đơn hàng gần đây</h2></div>
      <div class="panel-body" id="recentOrdersBody">
        <div class="empty-state"><div class="icon">⏳</div>Đang tải...</div>
      </div>
    </div>`;

  buildMonthPicker();
  document.getElementById("monthPicker").addEventListener("change", (e) => {
    const [y, m] = e.target.value.split("-").map(Number);
    loadDashboard(isOwner, new Date(y, m - 1, 1));
  });

  loadDashboard(isOwner, null);
})();

function buildMonthPicker() {
  const sel = document.getElementById("monthPicker");
  const now = new Date();
  let options = "";
  for (let i = 0; i < 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const val = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
    const label = i === 0 ? `Tháng này (${d.getMonth() + 1}/${d.getFullYear()})` : `Tháng ${d.getMonth() + 1}/${d.getFullYear()}`;
    options += `<option value="${val}">${label}</option>`;
  }
  sel.innerHTML = options;
}

function classifyVariableCostGroup(category) {
  const c = (category || "").trim().toLowerCase();
  if (c === "cá" || c === "ca") return "🐟 Cá";
  if (c === "san hô" || c === "san ho") return "🪸 San hô";
  if (c.includes("hoá chất") || c.includes("hoa chat") || c.includes("vi sinh") || c.includes("muối") || c.includes("muoi")) return "🧪 Vi sinh & Hóa chất";
  if (c.includes("đóng gói") || c.includes("dong goi") || c.includes("vận chuyển") || c.includes("van chuyen") || c.includes("bao bì") || c.includes("bao bi")) return "📦 Đóng gói & Vận chuyển";
  return "Khác";
}

async function loadDashboard(isOwner, selectedMonth) {
  const statGrid = document.getElementById("statGrid");
  const todayStart = new Date();
  todayStart.setHours(0,0,0,0);
  const now = new Date();

  // Doanh thu + đơn hàng hôm nay (luôn là ngày thực tế hiện tại, không đổi theo bộ lọc tháng)
  const { data: todayOrders } = await sb
    .from("orders")
    .select("total_amount, paid_amount, status, created_at")
    .gte("created_at", todayStart.toISOString())
    .eq("status", "completed");

  const revenueToday = (todayOrders || []).reduce((s, o) => s + Number(o.total_amount || 0), 0);
  const ordersToday = (todayOrders || []).length;

  // Tổng công nợ khách hàng (toàn bộ, chưa lọc theo ngày)
  const { data: allOrders } = await sb
    .from("orders")
    .select("total_amount, paid_amount")
    .eq("status", "completed");
  const totalCustomerDebt = (allOrders || []).reduce((s, o) => s + (Number(o.total_amount||0) - Number(o.paid_amount||0)), 0);

  // Tháng đang xem — mặc định tháng hiện tại nếu không chọn
  const monthStart = selectedMonth ? new Date(selectedMonth) : new Date(now.getFullYear(), now.getMonth(), 1);
  monthStart.setHours(0,0,0,0);
  const monthEnd = new Date(monthStart.getFullYear(), monthStart.getMonth() + 1, 0, 23, 59, 59);
  const isCurrentMonth = monthStart.getFullYear() === now.getFullYear() && monthStart.getMonth() === now.getMonth();
  const monthLabel = isCurrentMonth ? "tháng này" : `tháng ${monthStart.getMonth() + 1}/${monthStart.getFullYear()}`;

  const { data: monthOrders } = await sb
    .from("orders")
    .select("total_amount, created_at")
    .eq("status", "completed")
    .gte("created_at", monthStart.toISOString())
    .lte("created_at", monthEnd.toISOString());
  const revenueMonth = (monthOrders || []).reduce((s, o) => s + Number(o.total_amount || 0), 0);

  // Dữ liệu biểu đồ 7 ngày gần nhất
  const sevenDaysAgo = new Date(); sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 6); sevenDaysAgo.setHours(0,0,0,0);
  const { data: weekOrders } = await sb
    .from("orders")
    .select("total_amount, created_at")
    .eq("status", "completed")
    .gte("created_at", sevenDaysAgo.toISOString());

  const dayBuckets = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i); d.setHours(0,0,0,0);
    dayBuckets.push({ date: d, label: d.toLocaleDateString("vi-VN", { weekday: "short" }), total: 0 });
  }
  (weekOrders || []).forEach(o => {
    const od = new Date(o.created_at); od.setHours(0,0,0,0);
    const bucket = dayBuckets.find(b => b.date.getTime() === od.getTime());
    if (bucket) bucket.total += Number(o.total_amount || 0);
  });

  // Sản phẩm sắp hết hàng (không tính cá, san hô — số lượng nhóm này dao động liên tục, không cần cảnh báo)
  const { data: products } = await sb
    .from("products")
    .select("id, name, quantity, low_stock_threshold, unit, category")
    .order("quantity", { ascending: true });
  const lowStock = (products || []).filter(p => Number(p.quantity) <= Number(p.low_stock_threshold) && !isLivestockCategory(p.category));

  let cards = `
    <div class="stat-card accent">
      <div class="label">Doanh thu hôm nay</div>
      <div class="value">${formatVND(revenueToday)}</div>
    </div>
    <div class="stat-card accent">
      <div class="label">Doanh thu ${monthLabel}</div>
      <div class="value">${formatVND(revenueMonth)}</div>
    </div>
    <div class="stat-card">
      <div class="label">Đơn hàng hôm nay</div>
      <div class="value">${ordersToday}</div>
    </div>
    <div class="stat-card ${totalCustomerDebt > 0 ? 'warn' : ''}">
      <div class="label">Công nợ khách hàng</div>
      <div class="value">${formatVND(totalCustomerDebt)}</div>
    </div>
    <div class="stat-card ${lowStock.length > 0 ? 'danger-card' : ''}">
      <div class="label">Sản phẩm sắp hết</div>
      <div class="value">${lowStock.length}</div>
    </div>`;

  if (isOwner) {
    const { data: pos } = await sb.from("purchase_orders").select("total_amount, paid_amount").eq("status","completed");
    const supplierDebt = (pos || []).reduce((s,o) => s + (Number(o.total_amount||0)-Number(o.paid_amount||0)), 0);

    const { data: cashTx } = await sb.from("cash_transactions").select("type, amount, method");
    const cashBalance = (cashTx || []).filter(t => (t.method || "cash") === "cash").reduce((s,t) => s + (t.type === "income" ? Number(t.amount) : -Number(t.amount)), 0);

    // Lãi gộp tháng này = doanh thu - giá vốn ĐÃ CHỐT tại thời điểm bán (không đổi dù sau này sửa giá vốn trong Kho hàng)
    const { data: monthItems } = await sb
      .from("order_items")
      .select("quantity, unit_price, cost_price_at_sale, orders!inner(created_at,status)")
      .eq("orders.status", "completed")
      .gte("orders.created_at", monthStart.toISOString())
      .lte("orders.created_at", monthEnd.toISOString());

    let monthCost = 0, monthItemRevenue = 0;
    (monthItems || []).forEach(i => {
      monthItemRevenue += Number(i.quantity) * Number(i.unit_price);
      monthCost += Number(i.quantity) * Number(i.cost_price_at_sale || 0);
    });
    const profitMonth = monthItemRevenue - monthCost;

    // ============================================================
    // CHI PHÍ THÁNG NÀY = Chi phí cố định + Chi phí biến đổi
    // ============================================================
    // Chi phí cố định = các khoản "Chi" do người dùng tự ghi ở Quỹ tiền mặt (điện nước, lương, thuê nhà...)
    // LOẠI TRỪ: "Hủy đơn hàng" (chỉ là bút toán đảo ngược khi hủy đơn, không phải chi phí thật),
    // "Nhập hàng"/"Trả nợ NCC" (là giá vốn hàng hóa, đã tính trong Lãi gộp rồi, không tính lại ở đây),
    // "Điều chỉnh kiểm quỹ" (chỉ là sửa sai số đếm tiền, không phải chi phí)
    const SYSTEM_EXPENSE_CATEGORIES = ["Hủy đơn hàng", "Nhập hàng", "Trả nợ NCC", "Điều chỉnh kiểm quỹ"];
    const { data: expenseTx } = await sb
      .from("cash_transactions")
      .select("category, amount, note, created_at")
      .eq("type", "expense")
      .gte("created_at", monthStart.toISOString())
      .lte("created_at", monthEnd.toISOString());
    const fixedExpenses = (expenseTx || []).filter(t => !SYSTEM_EXPENSE_CATEGORIES.includes(t.category));
    const fixedCostTotal = fixedExpenses.reduce((s, t) => s + Number(t.amount), 0);
    const fixedByCategory = {};
    fixedExpenses.forEach(t => { fixedByCategory[t.category || "Khác"] = (fixedByCategory[t.category || "Khác"] || 0) + Number(t.amount); });

    // Chi phí biến đổi = giá vốn của các đơn bán 0đ (hao hụt/dùng nội bộ ghi qua Bán hàng)
    // + các khoản ghi qua nút "Hao hụt" nhanh ở Kho hàng
    const { data: zeroOrders } = await sb
      .from("orders")
      .select("id, order_code, created_at")
      .eq("status", "completed")
      .eq("total_amount", 0)
      .gte("created_at", monthStart.toISOString())
      .lte("created_at", monthEnd.toISOString());
    const zeroOrderIds = (zeroOrders || []).map(o => o.id);
    let zeroOrderItems = [];
    if (zeroOrderIds.length > 0) {
      const { data } = await sb.from("order_items").select("order_id, quantity, cost_price_at_sale, products(name, category)").in("order_id", zeroOrderIds);
      zeroOrderItems = data || [];
    }
    const zeroOrderCost = zeroOrderItems.reduce((s, i) => s + Number(i.quantity) * Number(i.cost_price_at_sale || 0), 0);

    const { data: writeOffs } = await sb
      .from("stock_adjustments")
      .select("quantity, reason, cost_value, note, created_at, products(name, unit, category)")
      .gte("created_at", monthStart.toISOString())
      .lte("created_at", monthEnd.toISOString())
      .order("created_at", { ascending: false });
    const writeOffTotal = (writeOffs || []).reduce((s, w) => s + Number(w.cost_value || 0), 0);

    const variableCostTotal = zeroOrderCost + writeOffTotal;
    const totalOperatingCost = fixedCostTotal + variableCostTotal;

    // Phân loại chi phí biến đổi theo nhóm hàng hóa (Cá / San hô / Vi sinh & Hóa chất / Đóng gói & Vận chuyển / Khác)
    const variableByGroup = {};
    zeroOrderItems.forEach(i => {
      const g = classifyVariableCostGroup(i.products?.category);
      variableByGroup[g] = (variableByGroup[g] || 0) + Number(i.quantity) * Number(i.cost_price_at_sale || 0);
    });
    (writeOffs || []).forEach(w => {
      const g = classifyVariableCostGroup(w.products?.category);
      variableByGroup[g] = (variableByGroup[g] || 0) + Number(w.cost_value || 0);
    });

    // Doanh số theo từng nhân viên (tháng này) — tách riêng sinh vật (Cá/San hô) để tính lương %
    // Tính theo GIÁ TRỊ THỰC TẾ khách thanh toán: dùng giá đã sửa (order_items.unit_price) và
    // phân bổ phần giảm giá của đơn theo đúng tỷ lệ sinh vật/còn lại trong đơn đó.
    const { data: staffOrders } = await sb
      .from("orders")
      .select("id, total_amount, created_by")
      .eq("status", "completed")
      .gte("created_at", monthStart.toISOString())
      .lte("created_at", monthEnd.toISOString());
    const { data: allProfiles } = await sb.from("profiles").select("id, full_name, role");

    const orderIds = (staffOrders || []).map(o => o.id);
    let staffItems = [];
    if (orderIds.length > 0) {
      const { data } = await sb
        .from("order_items")
        .select("order_id, quantity, unit_price, products(category)")
        .in("order_id", orderIds);
      staffItems = data || [];
    }

    const isLivestockCategory = (cat) => {
      const c = (cat || "").trim().toLowerCase();
      return c === "cá" || c === "ca" || c === "san hô" || c === "san ho";
    };

    // Gộp giá trị gốc (trước giảm giá) theo từng đơn, tách sinh vật / còn lại
    const orderBreakdown = {}; // order_id -> { subtotal, livestockSubtotal }
    staffItems.forEach(i => {
      if (!orderBreakdown[i.order_id]) orderBreakdown[i.order_id] = { subtotal: 0, livestockSubtotal: 0 };
      const lineTotal = Number(i.quantity) * Number(i.unit_price);
      orderBreakdown[i.order_id].subtotal += lineTotal;
      if (isLivestockCategory(i.products?.category)) {
        orderBreakdown[i.order_id].livestockSubtotal += lineTotal;
      }
    });

    const byStaff = {};
    (staffOrders || []).forEach(o => {
      const key = o.created_by || "unknown";
      if (!byStaff[key]) byStaff[key] = { orderCount: 0, revenue: 0, livestockRevenue: 0, otherRevenue: 0 };
      byStaff[key].orderCount += 1;
      byStaff[key].revenue += Number(o.total_amount || 0);

      const bd = orderBreakdown[o.id];
      const actualTotal = Number(o.total_amount || 0); // đã trừ giảm giá — giá trị thực tế khách trả
      let livestockShare = 0;
      if (bd && bd.subtotal > 0) livestockShare = bd.livestockSubtotal / bd.subtotal;
      byStaff[key].livestockRevenue += actualTotal * livestockShare;
      byStaff[key].otherRevenue += actualTotal * (1 - livestockShare);
    });

    window.__STAFF_STATS__ = Object.keys(byStaff).map(uid => {
      const profile = (allProfiles || []).find(p => p.id === uid);
      return {
        name: profile?.full_name || "Không rõ",
        role: profile?.role || "staff",
        orderCount: byStaff[uid].orderCount,
        revenue: byStaff[uid].revenue,
        livestockRevenue: byStaff[uid].livestockRevenue,
        otherRevenue: byStaff[uid].otherRevenue
      };
    }).sort((a, b) => b.revenue - a.revenue);

    cards += `
      <div class="stat-card ${supplierDebt > 0 ? 'warn' : ''}">
        <div class="label">Công nợ nhà cung cấp</div>
        <div class="value">${formatVND(supplierDebt)}</div>
      </div>
      <div class="stat-card accent">
        <div class="label">Quỹ tiền mặt</div>
        <div class="value">${formatVND(cashBalance)}</div>
      </div>
      <div class="stat-card ${profitMonth >= 0 ? 'accent' : 'danger-card'}">
        <div class="label">Lãi gộp ${monthLabel}</div>
        <div class="value">${formatVND(profitMonth)}</div>
        <div class="delta text-mute" style="font-size:11px;">*Tính theo giá vốn tại thời điểm bán</div>
      </div>
      <div class="stat-card" id="expenseToggleCard" style="cursor:pointer;">
        <div class="label">Chi phí ${monthLabel} ▾</div>
        <div class="value">${formatVND(totalOperatingCost)}</div>
        <div class="delta text-mute" style="font-size:11px;">Bấm để xem chi tiết</div>
      </div>`;

    window.__EXPENSE_DATA__ = { fixedCostTotal, fixedByCategory, zeroOrders, zeroOrderItems, writeOffs, variableCostTotal, variableByGroup };
  }

  statGrid.innerHTML = cards;

  if (isOwner) {
    const expensePanel = document.getElementById("expenseDetailPanel");
    const expenseBody = document.getElementById("expenseDetailBody");
    const { fixedCostTotal, fixedByCategory, zeroOrders, zeroOrderItems, writeOffs, variableCostTotal, variableByGroup } = window.__EXPENSE_DATA__ || {};
    document.getElementById("expenseToggleCard").addEventListener("click", () => {
      expensePanel.style.display = expensePanel.style.display === "none" ? "block" : "none";
    });

    const REASON_LABEL = { hao_hut_sinh_vat: "🐟 Sinh vật chết", su_dung_noi_bo: "🧪 Dùng cho bể shop", hong_hoc: "🔧 Hỏng hóc", khac: "Khác" };
    const variableRows = [
      ...(zeroOrders || []).map(o => ({ date: o.created_at, label: `Đơn 0đ · ${o.order_code}`, value: (zeroOrderItems || []).filter(i => i.order_id === o.id).reduce((s, i) => s + Number(i.quantity) * Number(i.cost_price_at_sale || 0), 0) })),
      ...(writeOffs || []).map(w => ({ date: w.created_at, label: `${REASON_LABEL[w.reason] || w.reason} · ${w.products?.name || '—'}`, value: Number(w.cost_value || 0) }))
    ].sort((a, b) => new Date(b.date) - new Date(a.date));

    expenseBody.innerHTML = `
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
        <div>
          <h3 style="font-size:14px; margin-bottom:4px;">Chi phí cố định</h3>
          <div class="text-mute" style="font-size:11.5px; margin-bottom:10px;">Điện nước, lương, thuê nhà... (ghi ở Quỹ tiền mặt)</div>
          <div class="summary-row total"><span>Tổng</span><span>${formatVND(fixedCostTotal)}</span></div>
          ${Object.keys(fixedByCategory).length === 0 ? `<div class="empty-state" style="padding:14px;"><div class="icon">✅</div>Chưa ghi khoản nào tháng này.</div>` :
            Object.entries(fixedByCategory).map(([cat, val]) => `<div class="summary-row"><span>${cat}</span><span>${formatVND(val)}</span></div>`).join("")}
        </div>
        <div>
          <h3 style="font-size:14px; margin-bottom:4px;">Chi phí biến đổi</h3>
          <div class="text-mute" style="font-size:11.5px; margin-bottom:10px;">Giá vốn hàng hao hụt / dùng nội bộ (đơn 0đ + ghi ở Kho hàng)</div>
          <div class="summary-row total"><span>Tổng</span><span>${formatVND(variableCostTotal)}</span></div>
          <div style="margin-top:10px; margin-bottom:10px; padding:10px; background:#f8fafc; border-radius:8px;">
            <div style="font-size:11.5px; font-weight:600; color:var(--text-mute); margin-bottom:6px;">Theo nhóm hàng</div>
            ${Object.keys(variableByGroup || {}).length === 0 ? `<div class="text-mute" style="font-size:12.5px;">Chưa có dữ liệu.</div>` :
              ["🐟 Cá", "🪸 San hô", "🧪 Vi sinh & Hóa chất", "📦 Đóng gói & Vận chuyển", "Khác"]
                .filter(g => variableByGroup[g] > 0)
                .map(g => `<div class="summary-row"><span>${g}</span><span>${formatVND(variableByGroup[g])}</span></div>`).join("")}
          </div>
          <div style="font-size:11.5px; font-weight:600; color:var(--text-mute); margin-bottom:6px;">Chi tiết từng lần</div>
          ${variableRows.length === 0 ? `<div class="empty-state" style="padding:14px;"><div class="icon">✅</div>Chưa ghi khoản nào tháng này.</div>` :
            variableRows.slice(0, 20).map(r => `<div class="summary-row"><span>${formatDate(r.date)} · ${r.label}</span><span>${formatVND(r.value)}</span></div>`).join("")}
        </div>
      </div>`;
  }

  if (isOwner) {
    document.getElementById("staffStatsTitle").textContent = `Doanh số theo nhân viên (${monthLabel})`;
    const staffBody = document.getElementById("staffStatsBody");
    const stats = window.__STAFF_STATS__ || [];
    if (stats.length === 0) {
      staffBody.innerHTML = `<div class="empty-state"><div class="icon">👤</div>Chưa có đơn hàng nào trong ${monthLabel}.</div>`;
    } else {
      const maxRevenue = Math.max(...stats.map(s => s.revenue), 1);
      staffBody.innerHTML = `<table><thead><tr><th>Nhân viên</th><th>Vai trò</th><th>Số đơn</th><th>🐠 DT sinh vật (Cá/San hô)</th><th>DT còn lại</th><th>Tổng doanh thu</th></tr></thead><tbody>
        ${stats.map(s => `<tr>
          <td>${s.name}${s.revenue === maxRevenue && s.revenue > 0 ? ' <span class="vip-tag" style="font-size:11px; background:#fff7ed; color:#c2410c; padding:2px 8px; border-radius:10px; margin-left:6px; font-weight:600;">🏆 Top</span>' : ''}</td>
          <td>${s.role === 'owner' ? 'Chủ' : 'Nhân viên'}</td>
          <td>${s.orderCount}</td>
          <td style="color:var(--teal-deep); font-weight:600;">${formatVND(s.livestockRevenue)}</td>
          <td>${formatVND(s.otherRevenue)}</td>
          <td style="font-weight:600;">${formatVND(s.revenue)}</td>
        </tr>`).join("")}
      </tbody></table>
      <p class="text-mute" style="font-size:11.5px; margin-top:10px;">*Doanh thu sinh vật/còn lại tính theo giá trị THỰC TẾ khách thanh toán (đã trừ giảm giá, theo giá bán đã sửa nếu có), phân bổ giảm giá theo đúng tỷ lệ trong từng đơn.</p>`;
    }
  }

  // Biểu đồ doanh thu 7 ngày
  const chartBody = document.getElementById("chartBody");
  const maxDay = Math.max(...dayBuckets.map(b => b.total), 1);
  chartBody.innerHTML = `<div style="display:flex; align-items:flex-end; gap:10px; height:160px; padding-top:10px;">
    ${dayBuckets.map(b => {
      const heightPct = Math.max((b.total / maxDay) * 100, b.total > 0 ? 4 : 0);
      return `<div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
        <div style="font-size:11px; color:var(--text-mute); margin-bottom:4px;">${b.total > 0 ? formatVND(b.total).replace('₫','') : ''}</div>
        <div style="width:100%; max-width:36px; height:${heightPct}%; background:${b.total > 0 ? 'var(--teal-deep)' : 'var(--border)'}; border-radius:5px 5px 0 0; min-height:2px;"></div>
        <div style="font-size:11.5px; color:var(--text-mute); margin-top:6px; text-transform:capitalize;">${b.label}</div>
      </div>`;
    }).join("")}
  </div>`;

  function renderExpandableTable(bodyEl, headerHtml, rows, rowFn, emptyHtml, limit = 3) {
    if (!rows || rows.length === 0) {
      bodyEl.innerHTML = emptyHtml;
      return;
    }
    const remaining = rows.length - limit;
    bodyEl.innerHTML = `<table><thead><tr>${headerHtml}</tr></thead><tbody>
      ${rows.slice(0, limit).map(rowFn).join("")}
    </tbody></table>
    ${remaining > 0 ? `<div class="show-more-row">▼ Xem thêm ${remaining} dòng</div>` : ""}`;

    const moreBtn = bodyEl.querySelector(".show-more-row");
    if (moreBtn) {
      moreBtn.addEventListener("click", () => {
        bodyEl.querySelector("tbody").innerHTML = rows.map(rowFn).join("");
        moreBtn.remove();
      });
    }
  }

  // Bảng tồn kho thấp
  const lowStockBody = document.getElementById("lowStockBody");
  renderExpandableTable(
    lowStockBody,
    `<th>Sản phẩm</th><th>Tồn kho</th><th>Ngưỡng cảnh báo</th>`,
    lowStock,
    p => `<tr><td>${p.name}</td><td>${p.quantity} ${p.unit||''}</td><td>${p.low_stock_threshold}</td></tr>`,
    `<div class="empty-state"><div class="icon">✅</div>Chưa có sản phẩm nào sắp hết hàng.</div>`
  );

  // Đơn hàng trong tháng đang xem
  document.getElementById("recentOrdersTitle").textContent = isCurrentMonth ? "Đơn hàng gần đây" : `Đơn hàng ${monthLabel}`;
  const { data: recent } = await sb
    .from("orders")
    .select("order_code, type, total_amount, paid_amount, status, created_at, customers(name)")
    .gte("created_at", monthStart.toISOString())
    .lte("created_at", monthEnd.toISOString())
    .order("created_at", { ascending: false })
    .limit(500);

  const recentBody = document.getElementById("recentOrdersBody");
  renderExpandableTable(
    recentBody,
    `<th>Mã đơn</th><th>Khách hàng</th><th>Loại</th><th>Tổng tiền</th><th>Trạng thái</th>`,
    recent,
    o => {
      const debt = Number(o.total_amount) - Number(o.paid_amount);
      return `<tr>
        <td>${o.order_code}</td>
        <td>${o.customers?.name || "Khách lẻ"}</td>
        <td><span class="badge ${o.type}">${o.type === 'wholesale' ? 'Bán buôn' : 'Bán lẻ'}</span></td>
        <td>${formatVND(o.total_amount)}</td>
        <td><span class="badge ${debt > 0 ? 'debt' : 'paid'}">${debt > 0 ? 'Còn nợ ' + formatVND(debt) : 'Đã thanh toán'}</span></td>
      </tr>`;
    },
    `<div class="empty-state"><div class="icon">🧾</div>Chưa có đơn hàng nào. <br>Hãy tạo đơn hàng đầu tiên ở mục "Đơn hàng".</div>`
  );
}
</script>
</body>
</html>
