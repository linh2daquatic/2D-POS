<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kho hàng — 2D Aquatic POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(10,22,40,0.5); z-index:100; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.open { display:flex; }
.modal-box { background:#fff; border-radius:14px; width:100%; max-width:480px; max-height:88vh; overflow-y:auto; }
.modal-header { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.modal-header h3 { font-family:var(--font-display); font-size:18px; }
.modal-body { padding:20px 22px; }
.modal-close { cursor:pointer; font-size:20px; color:var(--text-mute); }
.row-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.search-bar { max-width:320px; margin-bottom:16px; }
.qty-low { color:var(--danger); font-weight:700; }
.chip-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.chip { padding:6px 14px; border-radius:20px; font-size:13px; border:1px solid var(--border); cursor:pointer; background:#fff; color:var(--text-mute); }
.chip.active { background:var(--ink); color:#fff; border-color:var(--ink); }
.row-actions { display:flex; gap:6px; }
.btn-mini { padding:5px 10px; font-size:12px; }
.tabs-row { display:flex; gap:8px; margin-bottom:16px; border-bottom:1px solid var(--border); }
.tab-btn { padding:10px 4px; margin-right:16px; font-size:14px; font-weight:600; color:var(--text-mute); cursor:pointer; border-bottom:2px solid transparent; }
.tab-btn.active { color:var(--ink); border-bottom-color:var(--teal-deep); }
.autocomplete-wrap { position:relative; max-width:420px; }
.autocomplete-list { position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid var(--border); border-radius:8px; max-height:220px; overflow-y:auto; box-shadow:var(--shadow); z-index:10; margin-top:4px; display:none; }
.autocomplete-list.open { display:block; }
.autocomplete-item { padding:10px 12px; cursor:pointer; font-size:13.5px; border-bottom:1px solid var(--border); }
.autocomplete-item:last-child { border-bottom:none; }
.autocomplete-item:hover { background:#f8fafc; }
.autocomplete-item .sub { font-size:11.5px; color:var(--text-mute); }
.rc-line { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
.rc-line:last-child { border-bottom:none; }
.rc-line .rc-name { font-size:13.5px; font-weight:600; flex:1; min-width:120px; }
.rc-line input { width:100px; }
.rc-line .rc-remove { color:var(--danger); cursor:pointer; font-size:17px; padding:0 4px; }
.pay-quick-row { display:flex; gap:8px; margin-top:8px; max-width:420px; }
.pay-quick-btn { flex:1; padding:11px 8px; text-align:center; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-weight:600; font-size:13px; color:var(--text-mute); background:#fff; }
.pay-quick-btn.active.cash { border-color:var(--teal-deep); color:var(--teal-deep); background:#ecfdf5; }
.pay-quick-btn.active.transfer { border-color:#4338ca; color:#4338ca; background:#eef2ff; }
.pay-custom-link { font-size:12px; color:var(--text-mute); text-decoration:underline; cursor:pointer; margin-top:8px; display:inline-block; }
.summary-row { display:flex; justify-content:space-between; padding:6px 0; font-size:14px; max-width:420px; }
.summary-row.total { font-weight:700; font-size:16px; border-top:1px solid var(--border); margin-top:6px; padding-top:12px; }
.rc-product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  margin-top: 12px;
}
.rc-product-card {
  border: 1.5px solid var(--border); border-radius: 10px; padding: 12px;
  cursor: pointer; background: #fff; position: relative; transition: border-color .12s, transform .08s;
  user-select: none;
}
.rc-product-card:hover { border-color: var(--teal); }
.rc-product-card:active { transform: scale(0.97); }
.rc-product-card .rpname { font-weight: 600; font-size: 13px; line-height: 1.3; margin-bottom: 6px; min-height: 34px; }
.rc-product-card .rpstock { font-size: 11.5px; color: var(--text-mute); }
.rc-product-card .rpcost { font-size: 12px; color: var(--teal-deep); font-weight: 600; margin-top: 2px; }
.rc-product-card .rc-in-cart-badge {
  position: absolute; top: -8px; right: -8px; background: var(--coral); color: #fff;
  border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center;
  justify-content: center; font-size: 11px; font-weight: 700; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<script src="js/supabase-client.js"></script>
<script src="js/layout.js"></script>
<script>
let CURRENT_PROFILE = null;
let ALL_PRODUCTS = [];
let EDIT_ID = null;
let ALL_SUPPLIERS_RC = [];
let RC_SUPPLIER = null;
let RC_CART = [];
let RC_PAY_MODE = "quick";
let RC_PAY_METHOD = "cash";
let RC_ACTIVE_CATEGORY = "";

(async () => {
  const auth = await requireAuth();
  if (!auth) return;
  CURRENT_PROFILE = auth.profile;
  const isOwner = CURRENT_PROFILE.role === "owner";

  renderLayout({
    activePage: "products",
    profile: CURRENT_PROFILE,
    title: "Kho hàng",
    subtitle: "Danh sách sản phẩm và tồn kho hiện tại"
  });

  document.getElementById("pageContent").innerHTML = `
    ${isOwner ? `
    <div class="tabs-row">
      <div class="tab-btn active" data-tab="list">Danh sách sản phẩm</div>
      <div class="tab-btn" data-tab="receive">Nhập hàng</div>
    </div>` : ""}

    <div id="listTab">
      <div class="flex" style="justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:10px;">
        <input class="search-bar" id="searchInput" placeholder="🔍 Tìm theo tên hoặc mã SKU..." style="margin-bottom:0;">
        ${isOwner ? `<button class="btn btn-primary" id="addBtn">+ Thêm sản phẩm</button>` : ""}
      </div>
      ${isOwner ? `
      <div class="panel" style="margin-bottom:16px; border-left:3px solid var(--teal);">
        <div class="panel-header"><h2>🏷️ Theo dõi riêng — MAXSPECT</h2></div>
        <div class="panel-body">
          <div class="stat-grid" id="maxspectValueGrid"></div>
        </div>
      </div>
      <div class="stat-grid" id="inventoryValueGrid" style="margin-bottom:16px;"></div>
      ` : ""}
      <div class="chip-row" id="categoryChips"></div>
      <div class="chip-row" id="brandChips"></div>
      <div class="panel">
        <div class="panel-body" id="productTableWrap">
          <div class="empty-state"><div class="icon">⏳</div>Đang tải...</div>
        </div>
      </div>
    </div>

    ${isOwner ? `
    <div id="receiveTab" style="display:none;">
      <div class="panel">
        <div class="panel-header"><h2>Ghi nhận nhập hàng</h2></div>
        <div class="panel-body">
          <div class="field"><label>Nhà cung cấp *</label>
            <div class="autocomplete-wrap">
              <input id="rc_supplierSearch" placeholder="Tìm nhà cung cấp...">
              <div class="autocomplete-list" id="rc_supplierList"></div>
            </div>
          </div>
          <div class="field" style="margin-top:14px;"><label>Thêm sản phẩm</label>
            <input id="rc_productSearch" placeholder="🔍 Tìm sản phẩm theo tên hoặc SKU..." style="max-width:100%;">
          </div>
          <div class="chip-row" id="rc_categoryChips"></div>
          <div class="rc-product-grid" id="rc_productGrid"></div>

          <div id="rc_cartItems" style="margin-top:14px;"></div>

          <div class="summary-row total"><span>Tổng tiền nhập</span><span id="rc_sumTotal">0₫</span></div>

          <div style="margin-top:14px;">
            <label style="display:block; font-size:12.5px; font-weight:600; color:var(--text-mute); margin-bottom:6px;">Đã thanh toán</label>
            <div class="pay-quick-row" id="rc_payQuickRow">
              <div class="pay-quick-btn cash active" id="rc_quickCashBtn">💵 Tiền mặt<br><span style="font-weight:400; font-size:11px;">(thanh toán đủ)</span></div>
              <div class="pay-quick-btn transfer" id="rc_quickTransferBtn">🏦 Chuyển khoản<br><span style="font-weight:400; font-size:11px;">(thanh toán đủ)</span></div>
            </div>
            <span class="pay-custom-link" id="rc_toggleCustomPay">Trả một phần / chia 2 hình thức / ghi nợ →</span>
            <div id="rc_customPayFields" style="display:none; max-width:420px;">
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:8px;">
                <div class="field" style="margin-bottom:0;"><label>Tiền mặt</label><input id="rc_payCash" type="number" step="any" value="0"></div>
                <div class="field" style="margin-bottom:0;"><label>Chuyển khoản</label><input id="rc_payTransfer" type="number" step="any" value="0"></div>
              </div>
              <span class="pay-custom-link" id="rc_toggleQuickPay">← Quay lại thanh toán đủ</span>
            </div>
          </div>

          <div class="summary-row total"><span>Còn nợ NCC</span><span id="rc_sumDebt">0₫</span></div>
          <button class="btn btn-primary" id="rc_submitBtn" style="width:100%; max-width:420px; justify-content:center; padding:12px; margin-top:14px;">Ghi nhận nhập hàng</button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header"><h2>Lịch sử nhập hàng</h2></div>
        <div class="panel-body" id="rcHistoryWrap">
          <div class="empty-state"><div class="icon">⏳</div>Đang tải...</div>
        </div>
      </div>
    </div>` : ""}

    <div class="modal-overlay" id="poDetailModal">
      <div class="modal-box" style="max-width:560px;">
        <div class="modal-header">
          <h3 id="poDetailTitle">Chi tiết phiếu nhập</h3>
          <span class="modal-close" id="poDetailClose">✕</span>
        </div>
        <div class="modal-body" id="poDetailBody"></div>
      </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-box">
        <div class="modal-header">
          <h3 id="modalTitle">Thêm sản phẩm</h3>
          <span class="modal-close" id="modalClose">✕</span>
        </div>
        <div class="modal-body">
          <form id="productForm">
            <div class="field"><label>Tên sản phẩm *</label><input id="f_name" required></div>
            <div class="row-2">
              <div class="field"><label>Mã SKU</label><input id="f_sku" placeholder="VD: CA-NEMO-01"></div>
              <div class="field"><label>Danh mục</label><input id="f_category" list="categoryDatalist" placeholder="Bấm để chọn từ danh mục đã có, hoặc gõ mới" autocomplete="off"></div>
            </div>
            <div class="field"><label>Hãng / Thương hiệu</label><input id="f_brand" list="brandDatalist" placeholder="Bấm để chọn hãng đã có, hoặc gõ mới (không bắt buộc)" autocomplete="off"></div>
            <datalist id="categoryDatalist"></datalist>
            <datalist id="brandDatalist"></datalist>
            <div class="row-2">
              <div class="field"><label>Đơn vị</label><input id="f_unit" value="cái"></div>
              <div class="field"><label>Tồn kho *</label><input id="f_quantity" type="number" step="any" value="0" required></div>
            </div>
            <div class="field"><label>Ngưỡng cảnh báo hết hàng</label><input id="f_threshold" type="number" step="any" value="5"></div>
            <div class="row-2">
              <div class="field"><label>Giá vốn</label><input id="f_cost" type="number" step="any" value="0"></div>
              <div class="field"><label>Giá bán lẻ</label><input id="f_retail" type="number" step="any" value="0"></div>
            </div>
            <div class="field"><label>Giá bán buôn</label><input id="f_wholesale" type="number" step="any" value="0"></div>
            <div class="flex gap-8" style="margin-top:18px; justify-content:flex-end;">
              <button type="button" class="btn btn-secondary" id="cancelBtn">Hủy</button>
              <button type="submit" class="btn btn-primary" id="saveBtn">Lưu sản phẩm</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  `;

  await loadProducts();

  document.getElementById("searchInput").addEventListener("input", (e) => renderTable(e.target.value));

  if (isOwner) {
    document.getElementById("addBtn").addEventListener("click", () => openModal());
  }
  document.getElementById("modalClose").addEventListener("click", closeModal);
  document.getElementById("cancelBtn").addEventListener("click", closeModal);
  document.getElementById("productForm").addEventListener("submit", saveProduct);

  if (isOwner) {
    document.querySelectorAll(".tab-btn").forEach(el => {
      el.addEventListener("click", () => switchTab(el.dataset.tab));
    });
    await loadSuppliersForReceive();
    bindReceiveEvents();
    resetReceiveForm();
    await loadReceiveHistory();
    document.getElementById("poDetailClose").addEventListener("click", () => document.getElementById("poDetailModal").classList.remove("open"));
  }
})();

function switchTab(tab) {
  document.querySelectorAll(".tab-btn").forEach(el => el.classList.toggle("active", el.dataset.tab === tab));
  document.getElementById("listTab").style.display = tab === "list" ? "block" : "none";
  document.getElementById("receiveTab").style.display = tab === "receive" ? "block" : "none";
}

let ACTIVE_CATEGORY = "";
let ACTIVE_BRAND = "";

async function loadProducts() {
  const { data, error } = await sb.from("products").select("*").order("name", { ascending: true });
  if (error) { console.error(error); return; }
  ALL_PRODUCTS = data || [];
  renderCategoryChips();
  renderBrandChips();
  renderCategoryBrandDatalists();
  if (CURRENT_PROFILE.role === "owner") renderMaxspectValue();
  renderTable(document.getElementById("searchInput")?.value || "");
}

function renderCategoryChips() {
  const cats = [...new Set(ALL_PRODUCTS.map(p => p.category).filter(Boolean))];
  const chipWrap = document.getElementById("categoryChips");
  if (cats.length === 0) { chipWrap.innerHTML = ""; return; }
  chipWrap.innerHTML = [`<div class="chip ${ACTIVE_CATEGORY === '' ? 'active' : ''}" data-cat="">Tất cả danh mục</div>`]
    .concat(cats.map(c => `<div class="chip ${ACTIVE_CATEGORY === c ? 'active' : ''}" data-cat="${c}">${c}</div>`))
    .join("");
  chipWrap.querySelectorAll(".chip").forEach(el => {
    el.addEventListener("click", () => {
      ACTIVE_CATEGORY = el.dataset.cat;
      renderCategoryChips();
      renderTable(document.getElementById("searchInput").value);
    });
  });
}

function renderBrandChips() {
  const brands = [...new Set(ALL_PRODUCTS.map(p => p.brand).filter(Boolean))];
  const chipWrap = document.getElementById("brandChips");
  if (!chipWrap) return;
  if (brands.length === 0) { chipWrap.innerHTML = ""; return; }
  chipWrap.innerHTML = [`<div class="chip ${ACTIVE_BRAND === '' ? 'active' : ''}" data-brand="">Tất cả hãng</div>`]
    .concat(brands.map(b => `<div class="chip ${ACTIVE_BRAND === b ? 'active' : ''}" data-brand="${b}">🏷️ ${b}</div>`))
    .join("");
  chipWrap.querySelectorAll(".chip").forEach(el => {
    el.addEventListener("click", () => {
      ACTIVE_BRAND = el.dataset.brand;
      renderBrandChips();
      renderTable(document.getElementById("searchInput").value);
    });
  });
}

function renderCategoryBrandDatalists() {
  const cats = [...new Set(ALL_PRODUCTS.map(p => p.category).filter(Boolean))].sort();
  const brands = [...new Set(ALL_PRODUCTS.map(p => p.brand).filter(Boolean))].sort();
  const catList = document.getElementById("categoryDatalist");
  const brandList = document.getElementById("brandDatalist");
  if (catList) catList.innerHTML = cats.map(c => `<option value="${c}">`).join("");
  if (brandList) brandList.innerHTML = brands.map(b => `<option value="${b}">`).join("");
}

function renderMaxspectValue() {
  const grid = document.getElementById("maxspectValueGrid");
  if (!grid) return;

  const isMaxspect = (p) => (p.brand || "").toLowerCase().includes("maxspect");
  const maxspectList = ALL_PRODUCTS.filter(isMaxspect);
  const otherList = ALL_PRODUCTS.filter(p => !isMaxspect(p));

  const maxspectValue = maxspectList.reduce((s, p) => s + (Number(p.quantity) * Number(p.cost_price || 0)), 0);
  const otherValue = otherList.reduce((s, p) => s + (Number(p.quantity) * Number(p.cost_price || 0)), 0);
  const totalValue = maxspectValue + otherValue;

  grid.innerHTML = `
    <div class="stat-card accent">
      <div class="label">Giá trị hàng Maxspect</div>
      <div class="value">${formatVND(maxspectValue)}</div>
      <div class="delta text-mute" style="font-size:11px;">${maxspectList.length} sản phẩm</div>
    </div>
    <div class="stat-card">
      <div class="label">Giá trị hàng còn lại</div>
      <div class="value">${formatVND(otherValue)}</div>
      <div class="delta text-mute" style="font-size:11px;">${otherList.length} sản phẩm</div>
    </div>
    <div class="stat-card">
      <div class="label">Tổng giá trị toàn kho</div>
      <div class="value">${formatVND(totalValue)}</div>
    </div>
  `;
}

function renderInventoryValue(filteredList) {
  const grid = document.getElementById("inventoryValueGrid");
  if (!grid) return;

  const totalCostValue = filteredList.reduce((s, p) => s + (Number(p.quantity) * Number(p.cost_price || 0)), 0);
  const totalRetailValue = filteredList.reduce((s, p) => s + (Number(p.quantity) * Number(p.retail_price || 0)), 0);
  const totalItems = filteredList.reduce((s, p) => s + Number(p.quantity), 0);

  const filterLabel = [ACTIVE_CATEGORY, ACTIVE_BRAND].filter(Boolean).join(" · ") || "Toàn bộ kho";

  grid.innerHTML = `
    <div class="stat-card accent">
      <div class="label">Giá trị tồn kho (giá vốn) — ${filterLabel}</div>
      <div class="value">${formatVND(totalCostValue)}</div>
    </div>
    <div class="stat-card">
      <div class="label">Giá trị nếu bán hết (giá lẻ)</div>
      <div class="value">${formatVND(totalRetailValue)}</div>
    </div>
    <div class="stat-card">
      <div class="label">Tổng số lượng tồn</div>
      <div class="value">${totalItems}</div>
    </div>
  `;
}

function renderTable(filter) {
  const wrap = document.getElementById("productTableWrap");
  const isOwner = CURRENT_PROFILE.role === "owner";
  const f = (filter || "").trim().toLowerCase();
  let list = ALL_PRODUCTS.filter(p =>
    !f || p.name.toLowerCase().includes(f) || (p.sku || "").toLowerCase().includes(f)
  );
  if (ACTIVE_CATEGORY) list = list.filter(p => p.category === ACTIVE_CATEGORY);
  if (ACTIVE_BRAND) list = list.filter(p => p.brand === ACTIVE_BRAND);

  if (isOwner) renderInventoryValue(list);

  if (list.length === 0) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">📦</div>
      ${ALL_PRODUCTS.length === 0 ? 'Chưa có sản phẩm nào. Hãy thêm sản phẩm đầu tiên.' : 'Không tìm thấy sản phẩm phù hợp.'}
    </div>`;
    return;
  }

  wrap.innerHTML = `<table>
    <thead><tr>
      <th>Sản phẩm</th><th>SKU</th><th>Danh mục</th><th>Tồn kho</th>
      <th>Giá lẻ</th><th>Giá buôn</th><th></th>
    </tr></thead>
    <tbody>
      ${list.map(p => {
        const low = Number(p.quantity) <= Number(p.low_stock_threshold);
        return `<tr>
          <td>${p.name}</td>
          <td>${p.sku || "—"}</td>
          <td>${p.category || "—"}${p.brand ? ` · <span style="color:var(--teal-deep); font-weight:600;">${p.brand}</span>` : ""}</td>
          <td class="${low ? 'qty-low' : ''}">${p.quantity} ${p.unit || ''} ${low ? '⚠️' : ''}</td>
          <td>${formatVND(p.retail_price)}</td>
          <td>${formatVND(p.wholesale_price)}</td>
          <td><div class="row-actions">
            <span class="btn btn-secondary btn-mini" onclick="quickAdjust('${p.id}')" title="Nhập/Xuất kho nhanh">±Kho</span>
            <span class="btn btn-secondary btn-mini" onclick="openModal('${p.id}')">Sửa</span>
            ${isOwner ? `<span class="btn btn-danger btn-mini" onclick="deleteProduct('${p.id}','${p.name.replace(/'/g,"\\'")}')">Xóa</span>` : ""}
          </div></td>
        </tr>`;
      }).join("")}
    </tbody>
  </table>`;
}

async function quickAdjust(id) {
  const p = ALL_PRODUCTS.find(x => x.id === id);
  const input = window.prompt(
    `Điều chỉnh tồn kho "${p.name}"\nTồn kho hiện tại: ${p.quantity} ${p.unit || ''}\n\nNhập số lượng thay đổi (VD: 10 để nhập thêm 10, -3 để xuất bớt 3):`,
    ""
  );
  if (input === null || input.trim() === "") return;
  const delta = Number(input);
  if (isNaN(delta) || delta === 0) { alert("Số lượng không hợp lệ."); return; }

  const newQty = Number(p.quantity) + delta;
  if (newQty < 0) { alert("Tồn kho không thể âm."); return; }

  const { error: e1 } = await sb.from("products").update({ quantity: newQty }).eq("id", id);
  if (e1) { alert("Lỗi: " + e1.message); return; }

  await sb.from("inventory_log").insert({
    product_id: id,
    change_qty: delta,
    reason: "adjustment",
    created_by: CURRENT_PROFILE.id
  });

  await loadProducts();
}

async function deleteProduct(id, name) {
  if (!window.confirm(`Xóa sản phẩm "${name}"? Hành động này không thể hoàn tác.`)) return;
  const { error } = await sb.from("products").delete().eq("id", id);
  if (error) { alert("Lỗi khi xóa: " + error.message + "\n(Có thể sản phẩm này đã có trong đơn hàng, không xóa được.)"); return; }
  await loadProducts();
}

function openModal(id) {
  EDIT_ID = id || null;
  const p = id ? ALL_PRODUCTS.find(x => x.id === id) : null;
  document.getElementById("modalTitle").textContent = p ? "Sửa sản phẩm" : "Thêm sản phẩm";
  document.getElementById("f_name").value = p?.name || "";
  document.getElementById("f_sku").value = p?.sku || "";
  document.getElementById("f_category").value = p?.category || "";
  document.getElementById("f_brand").value = p?.brand || "";
  document.getElementById("f_unit").value = p?.unit || "cái";
  document.getElementById("f_quantity").value = p?.quantity ?? 0;
  document.getElementById("f_threshold").value = p?.low_stock_threshold ?? 5;
  document.getElementById("f_cost").value = p?.cost_price ?? 0;
  document.getElementById("f_retail").value = p?.retail_price ?? 0;
  document.getElementById("f_wholesale").value = p?.wholesale_price ?? 0;
  document.getElementById("modalOverlay").classList.add("open");
}
function closeModal() { document.getElementById("modalOverlay").classList.remove("open"); }

async function saveProduct(e) {
  e.preventDefault();
  const saveBtn = document.getElementById("saveBtn");
  saveBtn.disabled = true;
  saveBtn.textContent = "Đang lưu...";

  const payload = {
    name: document.getElementById("f_name").value.trim(),
    sku: document.getElementById("f_sku").value.trim() || null,
    category: document.getElementById("f_category").value.trim() || null,
    brand: document.getElementById("f_brand").value.trim() || null,
    unit: document.getElementById("f_unit").value.trim() || "cái",
    quantity: Number(document.getElementById("f_quantity").value || 0),
    low_stock_threshold: Number(document.getElementById("f_threshold").value || 5),
    cost_price: Number(document.getElementById("f_cost").value || 0),
    retail_price: Number(document.getElementById("f_retail").value || 0),
    wholesale_price: Number(document.getElementById("f_wholesale").value || 0),
  };

  let error;
  if (EDIT_ID) {
    ({ error } = await sb.from("products").update(payload).eq("id", EDIT_ID));
  } else {
    ({ error } = await sb.from("products").insert(payload));
  }

  saveBtn.disabled = false;
  saveBtn.textContent = "Lưu sản phẩm";

  if (error) {
    alert("Lỗi khi lưu: " + error.message);
    return;
  }
  closeModal();
  await loadProducts();
}

/* ============================================================
   TAB NHẬP HÀNG — chọn NCC, chọn sản phẩm, ghi nhận nhập kho
   ============================================================ */
async function loadSuppliersForReceive() {
  const { data } = await sb.from("suppliers").select("*").order("name");
  ALL_SUPPLIERS_RC = data || [];
}

function resetReceiveForm() {
  RC_SUPPLIER = null;
  RC_CART = [];
  RC_PAY_MODE = "quick";
  RC_PAY_METHOD = "cash";
  RC_ACTIVE_CATEGORY = "";
  renderSupplierPicker();
  renderReceiveCart();
  renderRcCategoryChips();
  renderRcProductGrid("");
  document.getElementById("rc_productSearch").value = "";
  const quickRow = document.getElementById("rc_payQuickRow");
  const customFields = document.getElementById("rc_customPayFields");
  const toggleLink = document.getElementById("rc_toggleCustomPay");
  if (quickRow) quickRow.style.display = "flex";
  if (customFields) customFields.style.display = "none";
  if (toggleLink) toggleLink.style.display = "inline-block";
  document.getElementById("rc_quickCashBtn")?.classList.add("active");
  document.getElementById("rc_quickTransferBtn")?.classList.remove("active");
}

function bindReceiveEvents() {
  const prodInput = document.getElementById("rc_productSearch");
  prodInput.addEventListener("input", () => renderRcProductGrid(prodInput.value));

  document.getElementById("rc_quickCashBtn").addEventListener("click", () => setRcPayMethod("cash"));
  document.getElementById("rc_quickTransferBtn").addEventListener("click", () => setRcPayMethod("transfer"));
  document.getElementById("rc_toggleCustomPay").addEventListener("click", () => {
    RC_PAY_MODE = "custom";
    document.getElementById("rc_payQuickRow").style.display = "none";
    document.getElementById("rc_toggleCustomPay").style.display = "none";
    document.getElementById("rc_customPayFields").style.display = "block";
    document.getElementById("rc_payCash").value = 0;
    document.getElementById("rc_payTransfer").value = 0;
    updateReceiveSummary();
  });
  document.getElementById("rc_toggleQuickPay").addEventListener("click", () => {
    RC_PAY_MODE = "quick";
    document.getElementById("rc_payQuickRow").style.display = "flex";
    document.getElementById("rc_toggleCustomPay").style.display = "inline-block";
    document.getElementById("rc_customPayFields").style.display = "none";
    updateReceiveSummary();
  });
  document.getElementById("rc_payCash").addEventListener("input", updateReceiveSummary);
  document.getElementById("rc_payTransfer").addEventListener("input", updateReceiveSummary);
  document.getElementById("rc_submitBtn").addEventListener("click", submitReceive);

  document.addEventListener("click", (e) => {
    if (!e.target.closest("#rc_supplierSearch") && !e.target.closest("#rc_supplierList")) {
      document.getElementById("rc_supplierList")?.classList.remove("open");
    }
  });
}

function setRcPayMethod(method) {
  RC_PAY_METHOD = method;
  document.getElementById("rc_quickCashBtn").classList.toggle("active", method === "cash");
  document.getElementById("rc_quickTransferBtn").classList.toggle("active", method === "transfer");
  updateReceiveSummary();
}

/* ---------- Chọn nhà cung cấp ---------- */
function renderSupplierPicker() {
  const input = document.getElementById("rc_supplierSearch");
  if (RC_SUPPLIER) {
    input.value = RC_SUPPLIER.name;
    input.disabled = true;
    input.style.background = "#f8fafc";
  } else {
    input.value = "";
    input.disabled = false;
    input.style.background = "";
    input.oninput = () => renderRcSupplierList(input.value);
    input.onfocus = () => renderRcSupplierList(input.value);
  }
}

function renderRcSupplierList(filter) {
  const list = document.getElementById("rc_supplierList");
  const f = (filter || "").trim().toLowerCase();
  const matches = ALL_SUPPLIERS_RC.filter(s => !f || s.name.toLowerCase().includes(f));
  if (matches.length === 0) {
    list.innerHTML = `<div class="autocomplete-item text-mute">Chưa có nhà cung cấp. Vào mục Nhà cung cấp để thêm.</div>`;
  } else {
    list.innerHTML = matches.slice(0, 8).map(s => `<div class="autocomplete-item" data-id="${s.id}">${s.name} <span class="sub">${s.phone || ''}</span></div>`).join("");
    list.querySelectorAll(".autocomplete-item[data-id]").forEach(el => {
      el.addEventListener("click", () => {
        RC_SUPPLIER = ALL_SUPPLIERS_RC.find(s => s.id === el.dataset.id);
        renderSupplierPicker();
        list.classList.remove("open");
      });
    });
  }
  list.classList.add("open");
}

/* ---------- Chọn sản phẩm ---------- */
function renderRcCategoryChips() {
  const cats = [...new Set(ALL_PRODUCTS.map(p => p.category).filter(Boolean))];
  const wrap = document.getElementById("rc_categoryChips");
  if (!wrap) return;
  if (cats.length === 0) { wrap.innerHTML = ""; return; }
  wrap.innerHTML = [`<div class="chip ${RC_ACTIVE_CATEGORY === '' ? 'active' : ''}" data-cat="">Tất cả</div>`]
    .concat(cats.map(c => `<div class="chip ${RC_ACTIVE_CATEGORY === c ? 'active' : ''}" data-cat="${c}">${c}</div>`)).join("");
  wrap.querySelectorAll(".chip").forEach(el => {
    el.addEventListener("click", () => {
      RC_ACTIVE_CATEGORY = el.dataset.cat;
      renderRcCategoryChips();
      renderRcProductGrid(document.getElementById("rc_productSearch").value);
    });
  });
}

function renderRcProductGrid(filter) {
  const grid = document.getElementById("rc_productGrid");
  if (!grid) return;
  const f = (filter || "").trim().toLowerCase();
  let list = ALL_PRODUCTS.filter(p => !f || p.name.toLowerCase().includes(f) || (p.sku || "").toLowerCase().includes(f));
  if (RC_ACTIVE_CATEGORY) list = list.filter(p => p.category === RC_ACTIVE_CATEGORY);

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">📦</div>Không tìm thấy sản phẩm.</div>`;
    return;
  }

  grid.innerHTML = list.map(p => {
    const inCart = RC_CART.find(i => i.product_id === p.id);
    return `<div class="rc-product-card" data-id="${p.id}">
      ${inCart ? `<div class="rc-in-cart-badge">${inCart.quantity}</div>` : ""}
      <div class="rpname">${p.name}</div>
      <div class="rpstock">Tồn: ${p.quantity} ${p.unit || ''}</div>
      <div class="rpcost">Giá vốn: ${formatVND(p.cost_price)}</div>
    </div>`;
  }).join("");

  grid.querySelectorAll(".rc-product-card").forEach(el => {
    el.addEventListener("click", () => {
      addToReceiveCart(el.dataset.id);
      renderRcProductGrid(document.getElementById("rc_productSearch").value);
    });
  });
}

function addToReceiveCart(productId) {
  const p = ALL_PRODUCTS.find(x => x.id === productId);
  if (!p) return;
  const existing = RC_CART.find(i => i.product_id === productId);
  if (existing) {
    existing.quantity += 1;
  } else {
    RC_CART.push({ product_id: p.id, name: p.name, unit: p.unit, quantity: 1, unit_cost: Number(p.cost_price || 0) });
  }
  renderReceiveCart();
  renderRcProductGrid(document.getElementById("rc_productSearch").value);
}

function renderReceiveCart() {
  const wrap = document.getElementById("rc_cartItems");
  if (!wrap) return;
  if (RC_CART.length === 0) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">📦</div>Chưa có sản phẩm nào. Tìm và thêm sản phẩm nhập ở trên.</div>`;
  } else {
    wrap.innerHTML = `<table><thead><tr><th>Sản phẩm</th><th>SL nhập</th><th>Đơn giá nhập</th><th>Thành tiền</th><th></th></tr></thead><tbody>
      ${RC_CART.map((item, idx) => `<tr>
        <td>${item.name}</td>
        <td><input type="number" min="1" value="${item.quantity}" data-idx="${idx}" data-field="quantity"></td>
        <td><input type="number" min="0" value="${item.unit_cost}" data-idx="${idx}" data-field="unit_cost"></td>
        <td>${formatVND(item.quantity * item.unit_cost)}</td>
        <td><span class="rc-remove" data-idx="${idx}">✕</span></td>
      </tr>`).join("")}
    </tbody></table>`;

    wrap.querySelectorAll("input[data-field]").forEach(el => {
      el.addEventListener("input", () => {
        const idx = Number(el.dataset.idx);
        RC_CART[idx][el.dataset.field] = Number(el.value || 0);
        renderReceiveCart();
      });
    });
    wrap.querySelectorAll(".rc-remove").forEach(el => {
      el.addEventListener("click", () => {
        RC_CART.splice(Number(el.dataset.idx), 1);
        renderReceiveCart();
        renderRcProductGrid(document.getElementById("rc_productSearch").value);
      });
    });
  }
  updateReceiveSummary();
}

function updateReceiveSummary() {
  const total = RC_CART.reduce((s, i) => s + (i.quantity * i.unit_cost), 0);
  let cash, transfer;
  if (RC_PAY_MODE === "quick") {
    cash = RC_PAY_METHOD === "cash" ? total : 0;
    transfer = RC_PAY_METHOD === "transfer" ? total : 0;
  } else {
    cash = Number(document.getElementById("rc_payCash")?.value || 0);
    transfer = Number(document.getElementById("rc_payTransfer")?.value || 0);
  }
  const paid = cash + transfer;
  const debt = Math.max(total - paid, 0);
  document.getElementById("rc_sumTotal").textContent = formatVND(total);
  document.getElementById("rc_sumDebt").textContent = formatVND(debt);
}

async function submitReceive() {
  if (!RC_SUPPLIER) { alert("Vui lòng chọn nhà cung cấp."); return; }
  if (RC_CART.length === 0) { alert("Vui lòng thêm ít nhất 1 sản phẩm nhập."); return; }

  const btn = document.getElementById("rc_submitBtn");
  btn.disabled = true;
  btn.textContent = "Đang lưu...";

  const total = RC_CART.reduce((s, i) => s + (i.quantity * i.unit_cost), 0);
  let cash, transfer;
  if (RC_PAY_MODE === "quick") {
    cash = RC_PAY_METHOD === "cash" ? total : 0;
    transfer = RC_PAY_METHOD === "transfer" ? total : 0;
  } else {
    cash = Number(document.getElementById("rc_payCash").value || 0);
    transfer = Number(document.getElementById("rc_payTransfer").value || 0);
  }
  const paid = cash + transfer;
  const poCode = "NH" + Date.now().toString().slice(-8);

  const { data: po, error } = await sb.from("purchase_orders").insert({
    po_code: poCode, supplier_id: RC_SUPPLIER.id, status: "completed",
    total_amount: total, paid_amount: paid, created_by: CURRENT_PROFILE.id
  }).select().single();

  if (error) {
    alert("Lỗi khi tạo phiếu nhập: " + error.message);
    btn.disabled = false; btn.textContent = "Ghi nhận nhập hàng";
    return;
  }

  const itemRows = RC_CART.map(i => ({ purchase_order_id: po.id, product_id: i.product_id, quantity: i.quantity, unit_cost: i.unit_cost }));
  await sb.from("purchase_order_items").insert(itemRows);

  for (const item of RC_CART) {
    const p = ALL_PRODUCTS.find(x => x.id === item.product_id);
    const newQty = Number(p.quantity) + item.quantity;
    await sb.from("products").update({ quantity: newQty, cost_price: item.unit_cost }).eq("id", item.product_id);
    await sb.from("inventory_log").insert({
      product_id: item.product_id, change_qty: item.quantity, reason: "purchase",
      reference_id: po.id, created_by: CURRENT_PROFILE.id
    });
  }

  if (cash > 0) {
    await sb.from("supplier_payments").insert({ supplier_id: RC_SUPPLIER.id, purchase_order_id: po.id, amount: cash, method: "cash", note: "Thanh toán lúc nhập hàng", created_by: CURRENT_PROFILE.id });
    await sb.from("cash_transactions").insert({ type: "expense", method: "cash", category: "Nhập hàng", amount: cash, note: `Trả NCC đơn ${poCode}`, created_by: CURRENT_PROFILE.id });
  }
  if (transfer > 0) {
    await sb.from("supplier_payments").insert({ supplier_id: RC_SUPPLIER.id, purchase_order_id: po.id, amount: transfer, method: "transfer", note: "Thanh toán lúc nhập hàng", created_by: CURRENT_PROFILE.id });
    await sb.from("cash_transactions").insert({ type: "expense", method: "transfer", category: "Nhập hàng", amount: transfer, note: `Chuyển khoản NCC đơn ${poCode}`, created_by: CURRENT_PROFILE.id });
  }

  btn.disabled = false;
  btn.textContent = "Ghi nhận nhập hàng";

  await loadProducts();
  resetReceiveForm();
  await loadReceiveHistory();
  alert(`Đã ghi nhận nhập hàng ${poCode} thành công! Tồn kho đã được cập nhật.`);
}

/* ---------- Lịch sử nhập hàng ---------- */
async function loadReceiveHistory() {
  const wrap = document.getElementById("rcHistoryWrap");
  const { data, error } = await sb
    .from("purchase_orders")
    .select("id, po_code, total_amount, paid_amount, created_at, suppliers(name)")
    .order("created_at", { ascending: false })
    .limit(100);

  if (error) { wrap.innerHTML = `<div class="empty-state">Lỗi: ${error.message}</div>`; return; }
  if (!data || data.length === 0) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">📦</div>Chưa có phiếu nhập hàng nào.</div>`;
    return;
  }

  wrap.innerHTML = `<table><thead><tr>
      <th>Mã phiếu</th><th>Ngày giờ</th><th>Nhà cung cấp</th><th>Tổng tiền</th><th>Đã trả</th><th>Trạng thái</th>
    </tr></thead><tbody>
    ${data.map(po => {
      const debt = Number(po.total_amount) - Number(po.paid_amount);
      return `<tr class="order-row-clickable" data-po-id="${po.id}" style="cursor:pointer;">
        <td>${po.po_code}</td>
        <td>${formatDateTime(po.created_at)}</td>
        <td>${po.suppliers?.name || '—'}</td>
        <td>${formatVND(po.total_amount)}</td>
        <td>${formatVND(po.paid_amount)}</td>
        <td><span class="badge ${debt > 0 ? 'debt' : 'paid'}">${debt > 0 ? 'Còn nợ ' + formatVND(debt) : 'Đã thanh toán'}</span></td>
      </tr>`;
    }).join("")}
  </tbody></table>`;

  wrap.querySelectorAll(".order-row-clickable").forEach(row => {
    row.addEventListener("click", () => showPODetail(row.dataset.poId));
  });
}

async function showPODetail(poId) {
  const modal = document.getElementById("poDetailModal");
  const body = document.getElementById("poDetailBody");
  document.getElementById("poDetailTitle").textContent = "Chi tiết phiếu nhập";
  body.innerHTML = `<div class="empty-state"><div class="icon">⏳</div>Đang tải...</div>`;
  modal.classList.add("open");

  const { data: po, error } = await sb
    .from("purchase_orders")
    .select("po_code, total_amount, paid_amount, created_at, suppliers(name, phone)")
    .eq("id", poId)
    .single();

  const { data: items } = await sb
    .from("purchase_order_items")
    .select("quantity, unit_cost, subtotal, products(name, unit)")
    .eq("purchase_order_id", poId);

  const { data: payments } = await sb
    .from("supplier_payments")
    .select("amount, method")
    .eq("purchase_order_id", poId);

  if (error || !po) { body.innerHTML = `<div class="empty-state">Không tải được phiếu nhập.</div>`; return; }

  const cashPaid = (payments || []).filter(p => p.method === "cash").reduce((s, p) => s + Number(p.amount), 0);
  const transferPaid = (payments || []).filter(p => p.method === "transfer").reduce((s, p) => s + Number(p.amount), 0);
  const debt = Number(po.total_amount) - Number(po.paid_amount);

  document.getElementById("poDetailTitle").textContent = po.po_code;
  body.innerHTML = `
    <div class="summary-row"><span>Nhà cung cấp</span><span>${po.suppliers?.name || '—'}</span></div>
    ${po.suppliers?.phone ? `<div class="summary-row"><span>SĐT</span><span>${po.suppliers.phone}</span></div>` : ""}
    <div class="summary-row"><span>Ngày giờ</span><span>${formatDateTime(po.created_at)}</span></div>

    <table style="margin-top:12px;"><thead><tr><th>Sản phẩm</th><th>SL nhập</th><th>Đơn giá</th><th>Thành tiền</th></tr></thead>
    <tbody>
      ${(items || []).map(i => `<tr>
        <td>${i.products?.name || '—'}</td>
        <td>${i.quantity} ${i.products?.unit || ''}</td>
        <td>${formatVND(i.unit_cost)}</td>
        <td>${formatVND(i.subtotal)}</td>
      </tr>`).join("")}
    </tbody></table>

    <div style="margin-top:14px;">
      <div class="summary-row"><span>Tổng tiền</span><span>${formatVND(po.total_amount)}</span></div>
      ${cashPaid > 0 ? `<div class="summary-row"><span>💵 Đã trả tiền mặt</span><span>${formatVND(cashPaid)}</span></div>` : ""}
      ${transferPaid > 0 ? `<div class="summary-row"><span>🏦 Đã trả chuyển khoản</span><span>${formatVND(transferPaid)}</span></div>` : ""}
      <div class="summary-row total"><span>${debt > 0 ? 'Còn nợ' : 'Trạng thái'}</span><span>${debt > 0 ? formatVND(debt) : 'Đã thanh toán đủ'}</span></div>
    </div>
  `;
}
</script>
