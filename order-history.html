<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lịch sử đơn — 2D Aquatic POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(10,22,40,0.5); z-index:100; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.open { display:flex; }
.modal-box { background:#fff; border-radius:14px; width:100%; max-width:560px; max-height:88vh; overflow-y:auto; }
.modal-header { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.modal-header h3 { font-family:var(--font-display); font-size:18px; }
.modal-body { padding:20px 22px; }
.modal-close { cursor:pointer; font-size:20px; color:var(--text-mute); }
.search-bar { max-width:320px; margin-bottom:16px; }
.summary-row { display:flex; justify-content:space-between; padding:5px 0; font-size:13.5px; }
.settings-link { font-size:12px; color:var(--teal-deep); text-decoration:underline; cursor:pointer; font-weight:600; }
.summary-row.total { font-weight:700; font-size:15.5px; border-top:1px solid var(--border); margin-top:6px; padding-top:10px; }
.pay-method-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.order-row-clickable { cursor:pointer; }
.order-row-clickable:hover { background:#f8fafc; }
</style>
</head>
<body>

<script src="js/supabase-client.js"></script>
<script src="js/layout.js"></script>
<script>
let CURRENT_PROFILE = null;
let ALL_ORDERS = [];
let PAYMENT_BREAKDOWN = {};

(async () => {
  const auth = await requireAuth();
  if (!auth) return;
  CURRENT_PROFILE = auth.profile;

  renderLayout({
    activePage: "order-history",
    profile: CURRENT_PROFILE,
    title: "Lịch sử đơn",
    subtitle: "Toàn bộ đơn hàng đã bán"
  });

  document.getElementById("pageContent").innerHTML = `
    <div class="flex gap-8" style="flex-wrap:wrap; align-items:flex-end; margin-bottom:12px;">
      <div class="field" style="margin-bottom:0; max-width:170px;"><label>Từ ngày</label><input id="filterFromDate" type="date"></div>
      <div class="field" style="margin-bottom:0; max-width:170px;"><label>Đến ngày</label><input id="filterToDate" type="date"></div>
      <select id="quickMonthPicker" style="max-width:190px;"></select>
      <span class="btn btn-secondary btn-mini" id="applyDateFilterBtn">Lọc</span>
      <span class="btn btn-secondary btn-mini" id="resetDateFilterBtn">Xem tất cả (200 gần nhất)</span>
    </div>
    <input class="search-bar" id="searchInput" placeholder="🔍 Tìm theo mã đơn hoặc tên khách...">
    <div class="panel">
      <div class="panel-body" id="orderListWrap">
        <div class="empty-state"><div class="icon">⏳</div>Đang tải...</div>
      </div>
    </div>

    <div class="modal-overlay" id="orderDetailModal">
      <div class="modal-box">
        <div class="modal-header">
          <h3 id="orderDetailTitle">Chi tiết đơn hàng</h3>
          <span class="modal-close" id="orderDetailClose">✕</span>
        </div>
        <div class="modal-body" id="orderDetailBody"></div>
      </div>
    </div>

    <div class="modal-overlay" id="cancelOrderModal">
      <div class="modal-box">
        <div class="modal-header">
          <h3>Xác nhận hủy đơn hàng</h3>
          <span class="modal-close" id="cancelOrderModalClose">✕</span>
        </div>
        <div class="modal-body">
          <p style="font-size:13.5px; color:var(--text-mute); margin-bottom:14px;">
            Đơn <strong id="cancelOrderCode"></strong> đã thu <strong id="cancelOriginalTotal"></strong>.
            Chọn cách hoàn tiền cho khách (mặc định theo đúng phương thức đã thu, có thể sửa nếu hoàn khác cách — VD: thu tiền mặt nhưng hoàn qua chuyển khoản).
          </p>
          <div class="pay-method-row">
            <div class="field"><label>Hoàn tiền mặt</label><input id="refund_cash" type="number" step="any" value="0"></div>
            <div class="field"><label>Hoàn chuyển khoản</label><input id="refund_transfer" type="number" step="any" value="0"></div>
          </div>
          <div class="summary-row" id="refundMismatchWarning" style="display:none; color:var(--danger); font-weight:600;">
            <span>⚠️ Tổng hoàn chưa khớp số tiền đã thu</span>
          </div>
          <p style="font-size:12px; color:var(--text-mute); margin-top:10px;">
            Ngoài việc hoàn tiền, hủy đơn sẽ tự hoàn lại tồn kho và loại đơn khỏi doanh thu/công nợ. Không thể hoàn tác.
          </p>
          <div class="flex gap-8" style="margin-top:16px; justify-content:flex-end;">
            <button type="button" class="btn btn-secondary" id="cancelOrderModalCancelBtn">Không hủy</button>
            <button type="button" class="btn btn-danger" id="cancelOrderConfirmBtn">Xác nhận hủy đơn</button>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="editCustomerModal">
      <div class="modal-box">
        <div class="modal-header">
          <h3>Sửa thông tin khách hàng</h3>
          <span class="modal-close" id="editCustomerModalClose">✕</span>
        </div>
        <div class="modal-body">
          <p class="text-mute" style="font-size:12px; margin-bottom:14px;">Sửa ở đây sẽ cập nhật cho khách này ở mọi nơi trong hệ thống (không chỉ riêng đơn này).</p>
          <div class="field"><label>Tên khách hàng *</label><input id="ec_name" required></div>
          <div class="field"><label>Số điện thoại</label><input id="ec_phone"></div>
          <div class="field"><label>Địa chỉ</label><input id="ec_address"></div>
          <div class="flex gap-8" style="margin-top:16px; justify-content:flex-end;">
            <button type="button" class="btn btn-secondary" id="editCustomerCancelBtn">Hủy</button>
            <button type="button" class="btn btn-primary" id="editCustomerSaveBtn">Lưu</button>
          </div>
        </div>
      </div>
    </div>
  `;

  await loadOrders();

  buildQuickMonthPicker();
  document.getElementById("searchInput").addEventListener("input", (e) => renderList(e.target.value));
  document.getElementById("applyDateFilterBtn").addEventListener("click", () => {
    const from = document.getElementById("filterFromDate").value;
    const to = document.getElementById("filterToDate").value;
    loadOrders(from ? new Date(from).toISOString() : null, to ? new Date(to + "T23:59:59").toISOString() : null);
  });
  document.getElementById("resetDateFilterBtn").addEventListener("click", () => {
    document.getElementById("filterFromDate").value = "";
    document.getElementById("filterToDate").value = "";
    document.getElementById("quickMonthPicker").value = "";
    loadOrders();
  });
  document.getElementById("quickMonthPicker").addEventListener("change", (e) => {
    if (!e.target.value) return;
    const [y, m] = e.target.value.split("-").map(Number);
    const from = new Date(y, m - 1, 1);
    const to = new Date(y, m, 0, 23, 59, 59);
    document.getElementById("filterFromDate").value = from.toISOString().slice(0, 10);
    document.getElementById("filterToDate").value = to.toISOString().slice(0, 10);
    loadOrders(from.toISOString(), to.toISOString());
  });
  document.getElementById("orderDetailClose").addEventListener("click", () => document.getElementById("orderDetailModal").classList.remove("open"));

  document.getElementById("cancelOrderModalClose").addEventListener("click", () => document.getElementById("cancelOrderModal").classList.remove("open"));
  document.getElementById("cancelOrderModalCancelBtn").addEventListener("click", () => document.getElementById("cancelOrderModal").classList.remove("open"));
  document.getElementById("editCustomerModalClose").addEventListener("click", () => document.getElementById("editCustomerModal").classList.remove("open"));
  document.getElementById("editCustomerCancelBtn").addEventListener("click", () => document.getElementById("editCustomerModal").classList.remove("open"));
  document.getElementById("editCustomerSaveBtn").addEventListener("click", saveEditedCustomer);
  document.getElementById("refund_cash").addEventListener("input", checkRefundMismatch);
  document.getElementById("refund_transfer").addEventListener("input", checkRefundMismatch);
  document.getElementById("cancelOrderConfirmBtn").addEventListener("click", async () => {
    if (!CANCEL_CONTEXT) return;
    const rc = Number(document.getElementById("refund_cash").value || 0);
    const rt = Number(document.getElementById("refund_transfer").value || 0);
    if (rc < 0 || rt < 0) { alert("Số tiền hoàn không thể âm."); return; }
    const btn = document.getElementById("cancelOrderConfirmBtn");
    btn.disabled = true; btn.textContent = "Đang hủy...";
    await performCancelOrder(CANCEL_CONTEXT.orderId, CANCEL_CONTEXT.orderCode, rc, rt);
    btn.disabled = false; btn.textContent = "Xác nhận hủy đơn";
  });
})();

function buildQuickMonthPicker() {
  const sel = document.getElementById("quickMonthPicker");
  const now = new Date();
  let options = `<option value="">— Chọn nhanh theo tháng —</option>`;
  for (let i = 0; i < 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const val = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
    const label = i === 0 ? `Tháng này (${d.getMonth() + 1}/${d.getFullYear()})` : `Tháng ${d.getMonth() + 1}/${d.getFullYear()}`;
    options += `<option value="${val}">${label}</option>`;
  }
  sel.innerHTML = options;
}

async function loadOrders(fromDate, toDate) {
  document.getElementById("orderListWrap").innerHTML = `<div class="empty-state"><div class="icon">⏳</div>Đang tải...</div>`;

  let query = sb
    .from("orders")
    .select("id, order_code, type, total_amount, paid_amount, status, created_at, customers(name)")
    .order("created_at", { ascending: false });

  if (fromDate) query = query.gte("created_at", fromDate);
  if (toDate) query = query.lte("created_at", toDate);
  if (!fromDate && !toDate) query = query.limit(200); // Không lọc gì -> chỉ lấy 200 đơn gần nhất cho nhẹ

  const { data, error } = await query;

  if (error) {
    document.getElementById("orderListWrap").innerHTML = `<div class="empty-state">Lỗi tải đơn hàng: ${error.message}</div>`;
    return;
  }
  ALL_ORDERS = data || [];

  // Lấy breakdown tiền mặt/chuyển khoản cho tất cả đơn trong danh sách (1 lần truy vấn, gộp theo order_id)
  const orderIds = ALL_ORDERS.map(o => o.id);
  PAYMENT_BREAKDOWN = {};
  if (orderIds.length > 0) {
    const { data: payments } = await sb
      .from("customer_payments")
      .select("order_id, amount, method")
      .in("order_id", orderIds);
    (payments || []).forEach(p => {
      if (!PAYMENT_BREAKDOWN[p.order_id]) PAYMENT_BREAKDOWN[p.order_id] = { cash: 0, transfer: 0 };
      PAYMENT_BREAKDOWN[p.order_id][p.method === "transfer" ? "transfer" : "cash"] += Number(p.amount);
    });
  }

  renderList("");
}

function renderList(filter) {
  const wrap = document.getElementById("orderListWrap");
  const f = (filter || "").trim().toLowerCase();
  const list = ALL_ORDERS.filter(o =>
    !f || o.order_code.toLowerCase().includes(f) || (o.customers?.name || "khách lẻ").toLowerCase().includes(f)
  );

  if (list.length === 0) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">🧾</div>${ALL_ORDERS.length === 0 ? 'Chưa có đơn hàng nào.' : 'Không tìm thấy đơn hàng phù hợp.'}</div>`;
    return;
  }

  wrap.innerHTML = `<table><thead><tr>
      <th>Mã đơn</th><th>Ngày</th><th>Khách hàng</th><th>Loại</th><th>Tổng tiền</th><th>💵 Tiền mặt</th><th>🏦 Chuyển khoản</th><th>Trạng thái</th>
    </tr></thead><tbody>
    ${list.map(o => {
      const debt = Number(o.total_amount) - Number(o.paid_amount);
      const bd = PAYMENT_BREAKDOWN[o.id] || { cash: 0, transfer: 0 };
      const isCancelled = o.status === "cancelled";
      return `<tr class="order-row-clickable" data-order-id="${o.id}" style="${isCancelled ? 'opacity:0.5;' : ''}">
        <td>${o.order_code}</td>
        <td>${formatDateTime(o.created_at)}</td>
        <td>${o.customers?.name || "Khách lẻ"}</td>
        <td><span class="badge ${o.type}">${o.type === 'wholesale' ? 'Bán buôn' : 'Bán lẻ'}</span></td>
        <td>${formatVND(o.total_amount)}</td>
        <td>${bd.cash > 0 ? formatVND(bd.cash) : '—'}</td>
        <td>${bd.transfer > 0 ? formatVND(bd.transfer) : '—'}</td>
        <td>${isCancelled ? '<span class="badge debt" style="background:#f1f5f9; color:var(--text-mute);">Đã hủy</span>' : `<span class="badge ${debt > 0 ? 'debt' : 'paid'}">${debt > 0 ? 'Còn nợ ' + formatVND(debt) : 'Đã thanh toán'}</span>`}</td>
      </tr>`;
    }).join("")}
  </tbody></table>`;

  wrap.querySelectorAll(".order-row-clickable").forEach(row => {
    row.addEventListener("click", () => showOrderDetail(row.dataset.orderId));
  });
}

let CURRENT_DETAIL_ORDER = null;
let CURRENT_DETAIL_ITEMS = [];
let EDIT_PRICE_MODE = false;
let EDIT_DISCOUNT_TYPE = "percent";

async function showOrderDetail(orderId) {
  const modal = document.getElementById("orderDetailModal");
  const body = document.getElementById("orderDetailBody");
  document.getElementById("orderDetailTitle").textContent = "Chi tiết đơn hàng";
  body.innerHTML = `<div class="empty-state"><div class="icon">⏳</div>Đang tải...</div>`;
  modal.classList.add("open");
  EDIT_PRICE_MODE = false;

  const { data: order, error: orderErr } = await sb
    .from("orders")
    .select("order_code, type, status, total_amount, paid_amount, discount_amount, created_at, customer_id, customers(id, name, phone, address)")
    .eq("id", orderId)
    .single();

  const { data: items } = await sb
    .from("order_items")
    .select("id, quantity, unit_price, subtotal, products(name, unit)")
    .eq("order_id", orderId);

  const { data: payments } = await sb
    .from("customer_payments")
    .select("amount, method")
    .eq("order_id", orderId);

  if (orderErr || !order) { body.innerHTML = `<div class="empty-state">Không tải được đơn hàng.</div>`; return; }

  CURRENT_DETAIL_ORDER = { id: orderId, ...order };
  CURRENT_DETAIL_ITEMS = items || [];

  renderOrderDetailBody(payments || []);
}

function openEditCustomerModal(customer) {
  if (!customer?.id) return;
  document.getElementById("ec_name").value = customer.name || "";
  document.getElementById("ec_phone").value = customer.phone || "";
  document.getElementById("ec_address").value = customer.address || "";
  document.getElementById("editCustomerModal").dataset.customerId = customer.id;
  document.getElementById("editCustomerModal").classList.add("open");
}

async function saveEditedCustomer() {
  const customerId = document.getElementById("editCustomerModal").dataset.customerId;
  const name = document.getElementById("ec_name").value.trim();
  if (!name) { alert("Vui lòng nhập tên khách hàng."); return; }

  const btn = document.getElementById("editCustomerSaveBtn");
  btn.disabled = true; btn.textContent = "Đang lưu...";

  const { error } = await sb.from("customers").update({
    name,
    phone: document.getElementById("ec_phone").value.trim() || null,
    address: document.getElementById("ec_address").value.trim() || null,
  }).eq("id", customerId);

  btn.disabled = false; btn.textContent = "Lưu";
  if (error) { alert("Lỗi: " + error.message); return; }

  document.getElementById("editCustomerModal").classList.remove("open");
  await loadOrders();
  if (CURRENT_DETAIL_ORDER) await showOrderDetail(CURRENT_DETAIL_ORDER.id);
}

function renderOrderDetailBody(payments) {
  const order = CURRENT_DETAIL_ORDER;
  const items = CURRENT_DETAIL_ITEMS;
  const body = document.getElementById("orderDetailBody");

  const cashPaid = payments.filter(p => p.method === "cash").reduce((s, p) => s + Number(p.amount), 0);
  const transferPaid = payments.filter(p => p.method === "transfer").reduce((s, p) => s + Number(p.amount), 0);
  const debt = Number(order.total_amount) - Number(order.paid_amount);
  const isCancelled = order.status === "cancelled";
  const isOwner = CURRENT_PROFILE.role === "owner";

  document.getElementById("orderDetailTitle").textContent = order.order_code + (isCancelled ? " (Đã hủy)" : "");
  body.innerHTML = `
    ${isCancelled ? `<div class="empty-state" style="padding:14px; margin-bottom:14px; background:#fef2f2; border-radius:8px;"><div style="color:var(--danger); font-weight:600;">⚠️ Đơn hàng này đã bị hủy — không tính vào doanh thu, kho và quỹ.</div></div>` : ""}
    <div class="summary-row"><span>Khách hàng</span><span>${order.customers?.name || "Khách lẻ"} ${order.customers?.id ? `<span class="settings-link" id="editOrderCustomerBtn" style="margin-left:8px;">✎ Sửa</span>` : ""}</span></div>
    ${order.customers?.phone ? `<div class="summary-row"><span>SĐT</span><span>${order.customers.phone}</span></div>` : ""}
    ${order.customers?.address ? `<div class="summary-row"><span>Địa chỉ</span><span>${order.customers.address}</span></div>` : ""}
    <div class="summary-row"><span>Ngày</span><span>${formatDateTime(order.created_at)}</span></div>
    <div class="summary-row"><span>Loại đơn</span><span class="badge ${order.type}">${order.type === 'wholesale' ? 'Bán buôn' : 'Bán lẻ'}</span></div>

    <div class="flex" style="justify-content:space-between; align-items:center; margin-top:12px;">
      <strong style="font-size:13.5px;">Sản phẩm</strong>
      ${!isCancelled && isOwner ? (EDIT_PRICE_MODE
        ? `<span class="btn btn-secondary btn-mini" id="cancelEditPriceBtn">Hủy sửa</span>`
        : `<span class="btn btn-secondary btn-mini" id="editPriceBtn">✎ Sửa giá bán</span>`
      ) : ""}
    </div>
    <table style="margin-top:8px;"><thead><tr><th>Sản phẩm</th><th>SL</th><th>Đơn giá</th><th>Thành tiền</th></tr></thead>
    <tbody id="editItemsTbody">
      ${items.map(i => `<tr>
        <td>${i.products?.name || '—'}</td>
        <td>${i.quantity} ${i.products?.unit || ''}</td>
        <td>${EDIT_PRICE_MODE
          ? `<input type="number" step="any" value="${i.unit_price}" data-item-id="${i.id}" class="edit-price-input" style="width:110px;">`
          : formatVND(i.unit_price)}</td>
        <td class="edit-item-subtotal" data-item-id="${i.id}">${formatVND(i.subtotal)}</td>
      </tr>`).join("")}
    </tbody></table>

    ${EDIT_PRICE_MODE ? `
    <div style="margin-top:14px; padding:12px; background:#f8fafc; border-radius:8px;">
      <label style="display:block; font-size:12.5px; font-weight:600; color:var(--text-mute); margin-bottom:6px;">Giảm giá trên tổng đơn</label>
      <div class="discount-row" style="display:flex; gap:8px; align-items:center;">
        <div class="discount-type-toggle" style="display:flex; border:1.5px solid var(--border); border-radius:8px; overflow:hidden; flex-shrink:0;">
          <div class="discount-type-btn ${EDIT_DISCOUNT_TYPE === 'percent' ? 'active' : ''}" id="editDiscPercentBtn" style="padding:8px 12px; font-size:13px; font-weight:700; cursor:pointer; ${EDIT_DISCOUNT_TYPE === 'percent' ? 'background:var(--ink); color:#fff;' : 'background:#fff; color:var(--text-mute);'}">%</div>
          <div class="discount-type-btn ${EDIT_DISCOUNT_TYPE === 'amount' ? 'active' : ''}" id="editDiscAmountBtn" style="padding:8px 12px; font-size:13px; font-weight:700; cursor:pointer; ${EDIT_DISCOUNT_TYPE === 'amount' ? 'background:var(--ink); color:#fff;' : 'background:#fff; color:var(--text-mute);'}">₫</div>
        </div>
        <input id="editDiscountValue" type="number" step="any" value="${order.discount_value || 0}" style="flex:1;">
      </div>
    </div>
    <div class="summary-row" style="margin-top:10px;"><span>Tạm tính</span><span id="editSumSubtotal">0₫</span></div>
    <div class="summary-row"><span>Giảm giá</span><span id="editSumDiscount">-0₫</span></div>
    <div class="summary-row total"><span>Tổng tiền mới</span><span id="editSumTotal">0₫</span></div>
    ` : ""}

    <div style="margin-top:14px;">
      ${!EDIT_PRICE_MODE && Number(order.discount_amount) > 0 ? `<div class="summary-row"><span>Giảm giá</span><span>-${formatVND(order.discount_amount)}</span></div>` : ""}
      ${!EDIT_PRICE_MODE ? `<div class="summary-row"><span>Tổng tiền</span><span>${formatVND(order.total_amount)}</span></div>` : ""}
      ${cashPaid > 0 ? `<div class="summary-row"><span>💵 Đã trả tiền mặt</span><span>${formatVND(cashPaid)}</span></div>` : ""}
      ${transferPaid > 0 ? `<div class="summary-row"><span>🏦 Đã trả chuyển khoản</span><span>${formatVND(transferPaid)}</span></div>` : ""}
      <div class="summary-row total"><span>${isCancelled ? 'Trạng thái' : (debt > 0 ? 'Còn nợ' : (debt < 0 ? 'Khách trả dư' : 'Trạng thái'))}</span><span>${isCancelled ? 'Đã hủy' : (debt !== 0 ? formatVND(Math.abs(debt)) : 'Đã thanh toán đủ')}</span></div>
    </div>

    ${EDIT_PRICE_MODE ? `<button class="btn btn-primary" id="savePriceBtn" style="width:100%; justify-content:center; padding:11px; margin-top:16px;">💾 Lưu giá đã sửa</button>` : ""}
    ${!isCancelled && isOwner ? `<button class="btn btn-danger" id="cancelOrderBtn" style="width:100%; justify-content:center; padding:11px; margin-top:10px;" onclick="cancelOrder('${order.id}','${order.order_code}')">🗑️ Hủy đơn hàng này</button>` : ""}
  `;

  const editCustomerBtn = document.getElementById("editOrderCustomerBtn");
  if (editCustomerBtn) editCustomerBtn.addEventListener("click", () => openEditCustomerModal(order.customers));

  const editBtn = document.getElementById("editPriceBtn");
  if (editBtn) editBtn.addEventListener("click", () => {
    EDIT_PRICE_MODE = true;
    EDIT_DISCOUNT_TYPE = order.discount_type || "percent";
    renderOrderDetailBody(payments);
  });
  const cancelEditBtn = document.getElementById("cancelEditPriceBtn");
  if (cancelEditBtn) cancelEditBtn.addEventListener("click", () => { EDIT_PRICE_MODE = false; renderOrderDetailBody(payments); });
  const saveBtn = document.getElementById("savePriceBtn");
  if (saveBtn) saveBtn.addEventListener("click", () => saveEditedPrices(payments));

  if (EDIT_PRICE_MODE) {
    document.querySelectorAll(".edit-price-input").forEach(el => el.addEventListener("input", updateEditPreview));
    document.getElementById("editDiscountValue").addEventListener("input", updateEditPreview);
    document.getElementById("editDiscPercentBtn").addEventListener("click", () => { EDIT_DISCOUNT_TYPE = "percent"; renderOrderDetailBody(payments); });
    document.getElementById("editDiscAmountBtn").addEventListener("click", () => { EDIT_DISCOUNT_TYPE = "amount"; renderOrderDetailBody(payments); });
    updateEditPreview();
  }
}

function calcEditDiscount(subtotal) {
  const val = Number(document.getElementById("editDiscountValue")?.value || 0);
  if (val <= 0) return 0;
  const discount = EDIT_DISCOUNT_TYPE === "percent" ? subtotal * (val / 100) : val;
  return Math.min(discount, subtotal);
}

function updateEditPreview() {
  document.querySelectorAll(".edit-price-input").forEach(el => {
    const item = CURRENT_DETAIL_ITEMS.find(i => i.id === el.dataset.itemId);
    if (!item) return;
    const cell = document.querySelector(`.edit-item-subtotal[data-item-id="${el.dataset.itemId}"]`);
    if (cell) cell.textContent = formatVND(Number(el.value || 0) * item.quantity);
  });

  const subtotal = CURRENT_DETAIL_ITEMS.reduce((s, i) => {
    const input = document.querySelector(`.edit-price-input[data-item-id="${i.id}"]`);
    const price = input ? Number(input.value || 0) : Number(i.unit_price);
    return s + price * i.quantity;
  }, 0);
  const discount = calcEditDiscount(subtotal);
  const total = subtotal - discount;

  document.getElementById("editSumSubtotal").textContent = formatVND(subtotal);
  document.getElementById("editSumDiscount").textContent = "-" + formatVND(discount);
  document.getElementById("editSumTotal").textContent = formatVND(total);
}

async function saveEditedPrices(payments) {
  const saveBtn = document.getElementById("savePriceBtn");
  saveBtn.disabled = true;
  saveBtn.textContent = "Đang lưu...";

  const inputs = document.querySelectorAll(".edit-price-input");
  for (const input of inputs) {
    const newPrice = Number(input.value || 0);
    if (newPrice < 0) continue;
    const item = CURRENT_DETAIL_ITEMS.find(i => i.id === input.dataset.itemId);
    if (item && Number(item.unit_price) !== newPrice) {
      await sb.from("order_items").update({ unit_price: newPrice }).eq("id", item.id);
      item.unit_price = newPrice;
    }
  }

  const newSubtotal = CURRENT_DETAIL_ITEMS.reduce((s, i) => s + Number(i.quantity) * Number(i.unit_price), 0);
  const discountValue = Number(document.getElementById("editDiscountValue").value || 0);
  const discountAmount = calcEditDiscount(newSubtotal);
  const newTotal = newSubtotal - discountAmount;

  await sb.from("orders").update({
    total_amount: newTotal,
    discount_type: discountAmount > 0 ? EDIT_DISCOUNT_TYPE : null,
    discount_value: discountAmount > 0 ? discountValue : 0,
    discount_amount: discountAmount
  }).eq("id", CURRENT_DETAIL_ORDER.id);

  CURRENT_DETAIL_ORDER.total_amount = newTotal;
  CURRENT_DETAIL_ORDER.discount_amount = discountAmount;

  EDIT_PRICE_MODE = false;
  await loadOrders();
  await showOrderDetail(CURRENT_DETAIL_ORDER.id);
  alert("Đã cập nhật giá bán và giảm giá cho đơn hàng.");
}

let CANCEL_CONTEXT = null;

async function cancelOrder(orderId, orderCode) {
  const { data: payments } = await sb.from("customer_payments").select("amount, method").eq("order_id", orderId);
  const cashPaid = (payments || []).filter(p => p.method === "cash").reduce((s, p) => s + Number(p.amount), 0);
  const transferPaid = (payments || []).filter(p => p.method === "transfer").reduce((s, p) => s + Number(p.amount), 0);
  const totalPaid = cashPaid + transferPaid;

  CANCEL_CONTEXT = { orderId, orderCode, totalPaid };

  if (totalPaid <= 0) {
    // Đơn chưa thu tiền gì (toàn bộ là nợ) — không cần chọn hoàn tiền, hủy thẳng luôn
    if (!window.confirm(`Hủy đơn hàng ${orderCode}?\n\nĐơn này chưa thu tiền nên không cần hoàn tiền. Tồn kho sẽ được hoàn lại và đơn sẽ bị loại khỏi công nợ.\n\nKhông thể hoàn tác. Tiếp tục?`)) return;
    await performCancelOrder(orderId, orderCode, 0, 0);
    return;
  }

  document.getElementById("cancelOrderCode").textContent = orderCode;
  document.getElementById("cancelOriginalTotal").textContent = formatVND(totalPaid);
  document.getElementById("refund_cash").value = cashPaid;
  document.getElementById("refund_transfer").value = transferPaid;
  document.getElementById("refundMismatchWarning").style.display = "none";
  document.getElementById("cancelOrderModal").classList.add("open");
}

function checkRefundMismatch() {
  if (!CANCEL_CONTEXT) return;
  const rc = Number(document.getElementById("refund_cash").value || 0);
  const rt = Number(document.getElementById("refund_transfer").value || 0);
  const mismatch = Math.abs((rc + rt) - CANCEL_CONTEXT.totalPaid) > 0.01;
  document.getElementById("refundMismatchWarning").style.display = mismatch ? "flex" : "none";
}

async function performCancelOrder(orderId, orderCode, refundCash, refundTransfer) {
  // 1. Hoàn lại tồn kho cho từng sản phẩm trong đơn
  const { data: items } = await sb.from("order_items").select("product_id, quantity").eq("order_id", orderId);
  for (const item of items || []) {
    const { data: product } = await sb.from("products").select("quantity").eq("id", item.product_id).single();
    if (product) {
      await sb.from("products").update({ quantity: Number(product.quantity) + Number(item.quantity) }).eq("id", item.product_id);
    }
    await sb.from("inventory_log").insert({
      product_id: item.product_id, change_qty: Number(item.quantity), reason: "cancel",
      reference_id: orderId, created_by: CURRENT_PROFILE.id
    });
  }

  // 2. Ghi bút toán hoàn tiền theo đúng phương thức người dùng chọn (có thể khác phương thức đã thu ban đầu)
  if (refundCash > 0) {
    await sb.from("cash_transactions").insert({
      type: "expense", method: "cash", category: "Hủy đơn hàng", amount: refundCash,
      note: `Hoàn tiền mặt đơn ${orderCode} (đã hủy)`, created_by: CURRENT_PROFILE.id
    });
  }
  if (refundTransfer > 0) {
    await sb.from("cash_transactions").insert({
      type: "expense", method: "transfer", category: "Hủy đơn hàng", amount: refundTransfer,
      note: `Hoàn chuyển khoản đơn ${orderCode} (đã hủy)`, created_by: CURRENT_PROFILE.id
    });
  }

  // 3. Đánh dấu đơn là đã hủy — tự động loại khỏi mọi thống kê doanh thu/công nợ (vì các truy vấn đều lọc status='completed')
  await sb.from("orders").update({ status: "cancelled" }).eq("id", orderId);

  await loadOrders();
  document.getElementById("cancelOrderModal").classList.remove("open");
  showOrderDetail(orderId);
  alert(`Đã hủy đơn hàng ${orderCode}. Tồn kho và quỹ tiền đã được cập nhật.`);
}
</script>
