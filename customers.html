<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khách hàng — 2D Aquatic POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(10,22,40,0.5); z-index:100; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.open { display:flex; }
.modal-box { background:#fff; border-radius:14px; width:100%; max-width:460px; max-height:88vh; overflow-y:auto; }
.modal-box.wide { max-width:560px; }
.summary-row { display:flex; justify-content:space-between; padding:5px 0; font-size:13.5px; }
.summary-row.total { font-weight:700; font-size:15.5px; border-top:1px solid var(--border); margin-top:6px; padding-top:10px; }
.order-row-clickable { cursor:pointer; }
.order-row-clickable:hover { background:#f8fafc; }
.modal-header { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.modal-header h3 { font-family:var(--font-display); font-size:18px; }
.modal-body { padding:20px 22px; }
.modal-close { cursor:pointer; font-size:20px; color:var(--text-mute); }
.row-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.search-bar { max-width:320px; margin-bottom:0; }
.btn-mini { padding:5px 10px; font-size:12px; }
.row-actions { display:flex; gap:6px; }
.type-toggle { display:flex; gap:6px; }
.type-btn { flex:1; padding:9px; text-align:center; border:1.5px solid var(--border); border-radius:8px; cursor:pointer; font-weight:600; font-size:13px; color:var(--text-mute); background:#fff; }
.type-btn.active.retail { border-color:var(--teal-deep); color:var(--teal-deep); background:#ecfdf5; }
.type-btn.active.wholesale { border-color:#4338ca; color:#4338ca; background:#eef2ff; }
.sort-chips { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; }
.sort-chip { padding:6px 14px; border-radius:20px; font-size:12.5px; border:1px solid var(--border); cursor:pointer; background:#fff; color:var(--text-mute); }
.sort-chip.active { background:var(--ink); color:#fff; border-color:var(--ink); }
.no-purchase { color:var(--text-mute); font-style:italic; }
.vip-tag { font-size:11px; background:#fff7ed; color:#c2410c; padding:2px 8px; border-radius:10px; margin-left:6px; font-weight:600; }
</style>
</head>
<body>

<script src="js/supabase-client.js"></script>
<script src="js/layout.js"></script>
<script>
let CURRENT_PROFILE = null;
let ALL_CUSTOMERS = [];
let CUSTOMER_STATS = {}; // { customer_id: { orderCount, totalSpent, lastOrderDate } }
let EDIT_ID = null;
let FORM_TYPE = "retail";
let SORT_MODE = "name";

(async () => {
  const auth = await requireAuth();
  if (!auth) return;
  CURRENT_PROFILE = auth.profile;

  renderLayout({
    activePage: "customers",
    profile: CURRENT_PROFILE,
    title: "Khách hàng",
    subtitle: "Danh sách khách hàng buôn/lẻ"
  });

  document.getElementById("pageContent").innerHTML = `
    <div class="flex" style="justify-content:space-between; margin-bottom:16px;">
      <input class="search-bar" id="searchInput" placeholder="🔍 Tìm theo tên hoặc số điện thoại...">
      <button class="btn btn-primary" id="addBtn">+ Thêm khách hàng</button>
    </div>
    <div class="sort-chips" id="sortChips">
      <div class="sort-chip active" data-sort="name">Tên A-Z</div>
      <div class="sort-chip" data-sort="spend">Chi tiêu cao nhất</div>
      <div class="sort-chip" data-sort="recent">Mua gần đây nhất</div>
    </div>
    <div class="panel">
      <div class="panel-body" id="tableWrap">
        <div class="empty-state"><div class="icon">⏳</div>Đang tải...</div>
      </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
      <div class="modal-box">
        <div class="modal-header">
          <h3 id="modalTitle">Thêm khách hàng</h3>
          <span class="modal-close" id="modalClose">✕</span>
        </div>
        <div class="modal-body">
          <form id="custForm">
            <div class="field"><label>Loại khách hàng</label>
              <div class="type-toggle">
                <div class="type-btn retail active" id="typeRetailBtn">Bán lẻ</div>
                <div class="type-btn wholesale" id="typeWholesaleBtn">Bán buôn</div>
              </div>
            </div>
            <div class="field"><label>Tên khách hàng *</label><input id="f_name" required></div>
            <div class="row-2">
              <div class="field"><label>Số điện thoại</label><input id="f_phone"></div>
              <div class="field"><label>Hạn mức nợ (₫)</label><input id="f_debt_limit" type="number" step="any" value="0"></div>
            </div>
            <div class="field"><label>Địa chỉ</label><input id="f_address"></div>
            <div class="field"><label>Ghi chú</label><textarea id="f_notes" rows="2"></textarea></div>
            <div class="flex gap-8" style="margin-top:16px; justify-content:flex-end;">
              <button type="button" class="btn btn-secondary" id="cancelBtn">Hủy</button>
              <button type="submit" class="btn btn-primary" id="saveBtn">Lưu khách hàng</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="ordersHistoryModal">
      <div class="modal-box wide">
        <div class="modal-header">
          <h3 id="ordersHistoryTitle">Lịch sử mua hàng</h3>
          <span class="modal-close" id="ordersHistoryClose">✕</span>
        </div>
        <div class="modal-body" id="ordersHistoryBody"></div>
      </div>
    </div>

    <div class="modal-overlay" id="orderDetailModal">
      <div class="modal-box wide">
        <div class="modal-header">
          <h3 id="orderDetailTitle">Chi tiết đơn hàng</h3>
          <span class="modal-close" id="orderDetailClose">✕</span>
        </div>
        <div class="modal-body" id="orderDetailBody"></div>
      </div>
    </div>
  `;

  await loadCustomers();

  document.getElementById("searchInput").addEventListener("input", (e) => renderTable(e.target.value));
  document.getElementById("addBtn").addEventListener("click", () => openModal());
  document.getElementById("modalClose").addEventListener("click", closeModal);
  document.getElementById("cancelBtn").addEventListener("click", closeModal);
  document.getElementById("custForm").addEventListener("submit", saveCustomer);
  document.getElementById("typeRetailBtn").addEventListener("click", () => setFormType("retail"));
  document.getElementById("typeWholesaleBtn").addEventListener("click", () => setFormType("wholesale"));

  document.querySelectorAll("#sortChips .sort-chip").forEach(el => {
    el.addEventListener("click", () => {
      document.querySelectorAll("#sortChips .sort-chip").forEach(x => x.classList.remove("active"));
      el.classList.add("active");
      SORT_MODE = el.dataset.sort;
      renderTable(document.getElementById("searchInput").value);
    });
  });

  document.getElementById("ordersHistoryClose").addEventListener("click", () => document.getElementById("ordersHistoryModal").classList.remove("open"));
  document.getElementById("orderDetailClose").addEventListener("click", () => document.getElementById("orderDetailModal").classList.remove("open"));
})();

function setFormType(t) {
  FORM_TYPE = t;
  document.getElementById("typeRetailBtn").classList.toggle("active", t === "retail");
  document.getElementById("typeWholesaleBtn").classList.toggle("active", t === "wholesale");
}

async function loadCustomers() {
  const { data, error } = await sb.from("customers").select("*").order("name");
  if (error) { console.error(error); return; }
  ALL_CUSTOMERS = data || [];

  const { data: orders } = await sb
    .from("orders")
    .select("customer_id, total_amount, created_at")
    .eq("status", "completed")
    .not("customer_id", "is", null);

  CUSTOMER_STATS = {};
  (orders || []).forEach(o => {
    if (!CUSTOMER_STATS[o.customer_id]) {
      CUSTOMER_STATS[o.customer_id] = { orderCount: 0, totalSpent: 0, lastOrderDate: null };
    }
    const s = CUSTOMER_STATS[o.customer_id];
    s.orderCount += 1;
    s.totalSpent += Number(o.total_amount);
    if (!s.lastOrderDate || new Date(o.created_at) > new Date(s.lastOrderDate)) {
      s.lastOrderDate = o.created_at;
    }
  });

  renderTable(document.getElementById("searchInput")?.value || "");
}

function renderTable(filter) {
  const wrap = document.getElementById("tableWrap");
  const f = (filter || "").trim().toLowerCase();
  let list = ALL_CUSTOMERS.filter(c => !f || c.name.toLowerCase().includes(f) || (c.phone || "").includes(f));

  const statsOf = (id) => CUSTOMER_STATS[id] || { orderCount: 0, totalSpent: 0, lastOrderDate: null };

  if (SORT_MODE === "spend") {
    list = [...list].sort((a, b) => statsOf(b.id).totalSpent - statsOf(a.id).totalSpent);
  } else if (SORT_MODE === "recent") {
    list = [...list].sort((a, b) => {
      const da = statsOf(a.id).lastOrderDate, db = statsOf(b.id).lastOrderDate;
      if (!da && !db) return 0;
      if (!da) return 1;
      if (!db) return -1;
      return new Date(db) - new Date(da);
    });
  }

  if (list.length === 0) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">👤</div>
      ${ALL_CUSTOMERS.length === 0 ? 'Chưa có khách hàng nào.' : 'Không tìm thấy khách hàng phù hợp.'}
    </div>`;
    return;
  }

  const maxSpent = Math.max(...list.map(c => statsOf(c.id).totalSpent), 0);

  wrap.innerHTML = `<table><thead><tr>
      <th>Tên khách hàng</th><th>SĐT</th><th>Loại</th><th>Số đơn</th><th>Tổng chi tiêu</th><th>Mua gần nhất</th><th></th>
    </tr></thead><tbody>
    ${list.map(c => {
      const s = statsOf(c.id);
      const isVip = maxSpent > 0 && s.totalSpent === maxSpent && s.totalSpent > 0;
      return `<tr>
        <td class="order-row-clickable" onclick="openOrdersHistory('${c.id}')" style="font-weight:600; color:var(--ink);">${c.name}${isVip ? '<span class="vip-tag">⭐ VIP</span>' : ''}</td>
        <td>${c.phone || "—"}</td>
        <td><span class="badge ${c.type}">${c.type === 'wholesale' ? 'Bán buôn' : 'Bán lẻ'}</span></td>
        <td>${s.orderCount}</td>
        <td>${s.totalSpent > 0 ? formatVND(s.totalSpent) : '—'}</td>
        <td>${s.lastOrderDate ? formatDate(s.lastOrderDate) : '<span class="no-purchase">Chưa mua</span>'}</td>
        <td><span class="btn btn-secondary btn-mini" onclick="event.stopPropagation(); openModal('${c.id}')">Sửa</span></td>
      </tr>`;
    }).join("")}
  </tbody></table>`;
}

function openModal(id) {
  EDIT_ID = id || null;
  const c = id ? ALL_CUSTOMERS.find(x => x.id === id) : null;
  document.getElementById("modalTitle").textContent = c ? "Sửa khách hàng" : "Thêm khách hàng";
  setFormType(c?.type || "retail");
  document.getElementById("f_name").value = c?.name || "";
  document.getElementById("f_phone").value = c?.phone || "";
  document.getElementById("f_debt_limit").value = c?.debt_limit ?? 0;
  document.getElementById("f_address").value = c?.address || "";
  document.getElementById("f_notes").value = c?.notes || "";
  document.getElementById("modalOverlay").classList.add("open");
}
function closeModal() { document.getElementById("modalOverlay").classList.remove("open"); }

async function saveCustomer(e) {
  e.preventDefault();
  const saveBtn = document.getElementById("saveBtn");
  saveBtn.disabled = true;
  saveBtn.textContent = "Đang lưu...";

  const payload = {
    name: document.getElementById("f_name").value.trim(),
    phone: document.getElementById("f_phone").value.trim() || null,
    type: FORM_TYPE,
    debt_limit: Number(document.getElementById("f_debt_limit").value || 0),
    address: document.getElementById("f_address").value.trim() || null,
    notes: document.getElementById("f_notes").value.trim() || null,
  };

  let error;
  if (EDIT_ID) {
    ({ error } = await sb.from("customers").update(payload).eq("id", EDIT_ID));
  } else {
    ({ error } = await sb.from("customers").insert(payload));
  }

  saveBtn.disabled = false;
  saveBtn.textContent = "Lưu khách hàng";

  if (error) { alert("Lỗi khi lưu: " + error.message); return; }
  closeModal();
  await loadCustomers();
}

/* ---------- Lịch sử đơn hàng của khách ---------- */
async function openOrdersHistory(customerId) {
  const customer = ALL_CUSTOMERS.find(c => c.id === customerId);
  if (!customer) return;

  const modal = document.getElementById("ordersHistoryModal");
  const body = document.getElementById("ordersHistoryBody");
  document.getElementById("ordersHistoryTitle").textContent = "Lịch sử mua hàng — " + customer.name;
  body.innerHTML = `<div class="empty-state"><div class="icon">⏳</div>Đang tải...</div>`;
  modal.classList.add("open");

  const { data: orders, error } = await sb
    .from("orders")
    .select("id, order_code, type, total_amount, paid_amount, created_at")
    .eq("customer_id", customerId)
    .order("created_at", { ascending: false });

  if (error || !orders || orders.length === 0) {
    body.innerHTML = `<div class="empty-state"><div class="icon">🧾</div>Khách hàng này chưa có đơn hàng nào.</div>`;
    return;
  }

  body.innerHTML = `<table><thead><tr>
      <th>Mã đơn</th><th>Ngày</th><th>Loại</th><th>Tổng tiền</th><th>Trạng thái</th>
    </tr></thead><tbody>
    ${orders.map(o => {
      const debt = Number(o.total_amount) - Number(o.paid_amount);
      return `<tr class="order-row-clickable" data-order-id="${o.id}">
        <td>${o.order_code}</td>
        <td>${formatDate(o.created_at)}</td>
        <td><span class="badge ${o.type}">${o.type === 'wholesale' ? 'Bán buôn' : 'Bán lẻ'}</span></td>
        <td>${formatVND(o.total_amount)}</td>
        <td><span class="badge ${debt > 0 ? 'debt' : 'paid'}">${debt > 0 ? 'Còn nợ ' + formatVND(debt) : 'Đã thanh toán'}</span></td>
      </tr>`;
    }).join("")}
  </tbody></table>`;

  body.querySelectorAll(".order-row-clickable").forEach(row => {
    row.addEventListener("click", () => showOrderDetail(row.dataset.orderId));
  });
}

async function showOrderDetail(orderId) {
  const modal = document.getElementById("orderDetailModal");
  const body = document.getElementById("orderDetailBody");
  document.getElementById("orderDetailTitle").textContent = "Chi tiết đơn hàng";
  body.innerHTML = `<div class="empty-state"><div class="icon">⏳</div>Đang tải...</div>`;
  modal.classList.add("open");

  const { data: order, error: orderErr } = await sb
    .from("orders")
    .select("order_code, type, total_amount, paid_amount, created_at, customers(name, phone, address)")
    .eq("id", orderId)
    .single();

  const { data: items } = await sb
    .from("order_items")
    .select("quantity, unit_price, subtotal, products(name, unit)")
    .eq("order_id", orderId);

  const { data: payments } = await sb
    .from("customer_payments")
    .select("amount, method")
    .eq("order_id", orderId);

  if (orderErr || !order) { body.innerHTML = `<div class="empty-state">Không tải được đơn hàng.</div>`; return; }

  const cashPaid = (payments || []).filter(p => p.method === "cash").reduce((s, p) => s + Number(p.amount), 0);
  const transferPaid = (payments || []).filter(p => p.method === "transfer").reduce((s, p) => s + Number(p.amount), 0);
  const debt = Number(order.total_amount) - Number(order.paid_amount);

  document.getElementById("orderDetailTitle").textContent = order.order_code;
  body.innerHTML = `
    <div class="summary-row"><span>Khách hàng</span><span>${order.customers?.name || "Khách lẻ"}</span></div>
    <div class="summary-row"><span>Ngày</span><span>${formatDate(order.created_at)}</span></div>
    <div class="summary-row"><span>Loại đơn</span><span class="badge ${order.type}">${order.type === 'wholesale' ? 'Bán buôn' : 'Bán lẻ'}</span></div>

    <table style="margin-top:12px;"><thead><tr><th>Sản phẩm</th><th>SL</th><th>Đơn giá</th><th>Thành tiền</th></tr></thead>
    <tbody>
      ${(items || []).map(i => `<tr>
        <td>${i.products?.name || '—'}</td>
        <td>${i.quantity} ${i.products?.unit || ''}</td>
        <td>${formatVND(i.unit_price)}</td>
        <td>${formatVND(i.subtotal)}</td>
      </tr>`).join("")}
    </tbody></table>

    <div style="margin-top:14px;">
      <div class="summary-row"><span>Tổng tiền</span><span>${formatVND(order.total_amount)}</span></div>
      ${cashPaid > 0 ? `<div class="summary-row"><span>💵 Đã trả tiền mặt</span><span>${formatVND(cashPaid)}</span></div>` : ""}
      ${transferPaid > 0 ? `<div class="summary-row"><span>🏦 Đã trả chuyển khoản</span><span>${formatVND(transferPaid)}</span></div>` : ""}
      <div class="summary-row total"><span>${debt > 0 ? 'Còn nợ' : 'Trạng thái'}</span><span>${debt > 0 ? formatVND(debt) : 'Đã thanh toán đủ'}</span></div>
    </div>
  `;
}
</script>
</body>
</html>
