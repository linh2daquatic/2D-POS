<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản lý bể — 2D Aquatic POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<style>
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(10,22,40,0.5); z-index:100; align-items:center; justify-content:center; padding:20px; }
.modal-overlay.open { display:flex; }
.modal-box { background:#fff; border-radius:14px; width:100%; max-width:440px; max-height:88vh; overflow-y:auto; }
.modal-box.wide { max-width:640px; }
.modal-header { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.modal-header h3 { font-family:var(--font-display); font-size:18px; }
.modal-body { padding:20px 22px; }
.modal-close { cursor:pointer; font-size:20px; color:var(--text-mute); }
.summary-row { display:flex; justify-content:space-between; padding:6px 0; font-size:14px; }
.summary-row.total { font-weight:700; font-size:16px; border-top:1px solid var(--border); margin-top:6px; padding-top:12px; }
.param-row, .chem-row, .sched-row { display:flex; align-items:center; justify-content:space-between; padding:9px 0; border-bottom:1px solid var(--border); font-size:13.5px; }
.param-row:last-child, .chem-row:last-child, .sched-row:last-child { border-bottom:none; }
.param-row .p-remove, .chem-row .c-remove, .sched-row .s-remove { color:var(--danger); cursor:pointer; font-size:15px; }
.chart-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:16px; }
.chart-card { border:1px solid var(--border); border-radius:10px; padding:14px; background:#fff; }
.chart-card h4 { font-size:13.5px; font-weight:600; margin-bottom:8px; color:var(--ink); }
.chart-card canvas { max-height:200px; }
.reading-input-row { display:grid; grid-template-columns:1fr 100px; gap:10px; align-items:center; padding:6px 0; }
.back-link { font-size:13.5px; color:var(--text-mute); cursor:pointer; display:inline-flex; align-items:center; gap:6px; margin-bottom:14px; }
.back-link:hover { color:var(--ink); }

.sched-table-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:14px; background:#fff; box-shadow:var(--shadow); }
.sched-table { width:100%; border-collapse:collapse; min-width:760px; }
.sched-table th, .sched-table td { border:1px solid #eef1f5; vertical-align:top; }
.sched-table thead th {
  background:var(--ink); color:#fff; font-size:12.5px; font-weight:600;
  padding:12px 8px; text-align:center; letter-spacing:0.02em;
}
.sched-table thead th:first-child { background:var(--ink); }
.sched-table thead th.weekend { background:#1b3a5c; }
.sched-table .slot-label-cell {
  font-weight:700; font-size:13px; text-align:center; padding:16px 8px; width:90px;
}
.sched-table .slot-label-cell.sang { background:#fff7ed; color:#c2410c; }
.sched-table .slot-label-cell.chieu { background:#eff6ff; color:#1d4ed8; }
.sched-cell { padding:10px; min-width:120px; background:#fff; transition:background .12s; }
.sched-cell.weekend { background:#fbfcfe; }
.sched-cell:hover { background:#f6fdfb; }
.name-chip {
  display:block; font-weight:600; font-size:12.5px; padding:6px 10px; border-radius:8px;
  margin-bottom:6px; cursor:pointer; border-left:3px solid var(--teal-deep);
  background:#ecfdf5; color:#0f5e52; transition:transform .08s, box-shadow .12s;
}
.name-chip:hover { background:#d1fae5; transform:translateX(2px); box-shadow:0 2px 6px rgba(0,168,150,0.18); }
.task-chip {
  display:block; font-weight:600; font-size:12.5px; padding:6px 10px; border-radius:8px;
  margin-bottom:6px; cursor:pointer; border-left:3px solid #c2410c;
  background:#fff7ed; color:#9a3412; transition:transform .08s, box-shadow .12s;
}
.task-chip:hover { background:#ffedd5; transform:translateX(2px); box-shadow:0 2px 6px rgba(194,65,12,0.18); }
.cell-add-btn {
  font-size:11px; color:#b8c0cc; cursor:pointer; text-align:center; padding:5px; border-radius:6px;
  border:1px dashed transparent;
}
.cell-add-btn:hover { background:#f0fdfa; color:var(--teal-deep); border-color:var(--teal); }
.unscheduled-grid { display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }
.unscheduled-chip { background:#fff; border:1px dashed var(--border); color:var(--text-mute); font-size:12.5px; padding:6px 12px; border-radius:20px; cursor:pointer; }
.unscheduled-chip:hover { border-color:var(--teal); color:var(--teal-deep); }
.type-btn.active { background:var(--ink); color:#fff; border-color:var(--ink) !important; }
.week-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; gap:10px; flex-wrap:wrap; }
.settings-link { font-size:11.5px; color:var(--teal-deep); text-decoration:underline; cursor:pointer; }

let WEEK_TASKS = [];
let WEEK_OFFSET = 0; // 0 = tuần này, +1 = tuần sau, -1 = tuần trước...

function getMondayOfWeek(offset) {
  const now = new Date();
  const day = now.getDay();
  const diffToMonday = day === 0 ? -6 : 1 - day;
  const monday = new Date(now);
  monday.setDate(now.getDate() + diffToMonday + offset * 7);
  monday.setHours(0, 0, 0, 0);
  return monday;
}
function getDateForWeekday(dayIdx) {
  const monday = getMondayOfWeek(WEEK_OFFSET);
  const d = new Date(monday);
  d.setDate(monday.getDate() + dayIdx);
  return d;
}
function toDateKey(d) {
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, "0"), day = String(d.getDate()).padStart(2, "0");
  return `${y}-${m}-${day}`;
}
async function loadWeekTasks() {
  const monday = getMondayOfWeek(WEEK_OFFSET);
  const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
  const { data } = await sb.from("tank_tasks").select("*, tanks(name)")
    .gte("task_date", toDateKey(monday)).lte("task_date", toDateKey(sunday))
    .order("task_date");
  WEEK_TASKS = data || [];
}

function nowLocalDatetime() {
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 16);
}

async function loadTanks() {
  const { data } = await sb.from("tanks").select("*, customers(name)").order("name");
  ALL_TANKS = data || [];
}
async function loadCustomersForTank() {
  const { data } = await sb.from("customers").select("id, name").order("name");
  ALL_CUSTOMERS_TK = data || [];
}
async function loadCareSchedule() {
  const { data } = await sb.from("tank_care_schedule").select("*, tanks(name)").order("day_of_week").order("time_slot");
  ALL_CARE_SCHEDULE = data || [];
}

async function renderGridView() {
  document.getElementById("gridView").style.display = "block";
  document.getElementById("tankDetailView").style.display = "none";

  await loadWeekTasks();

  const scheduledTankIds = new Set(ALL_CARE_SCHEDULE.map(s => s.tank_id));
  const unscheduled = ALL_TANKS.filter(t => !scheduledTankIds.has(t.id));

  const wrap = document.getElementById("gridView");
  const weekDates = [getDateForWeekday(0), getDateForWeekday(6)];
  const weekRangeLabel = `${weekDates[0].toLocaleDateString("vi-VN")} — ${weekDates[1].toLocaleDateString("vi-VN")}`;
  const weekTitleLabel = WEEK_OFFSET === 0 ? "Tuần này" : WEEK_OFFSET === 1 ? "Tuần sau" : WEEK_OFFSET === -1 ? "Tuần trước"
    : (WEEK_OFFSET > 0 ? WEEK_OFFSET + " tuần sau" : Math.abs(WEEK_OFFSET) + " tuần trước");

  wrap.innerHTML = `
    <div class="week-nav">
      <button class="btn btn-secondary btn-mini" id="weekPrevBtn">← Tuần trước</button>
      <div style="text-align:center;">
        <div style="font-family:var(--font-display); font-size:16px; font-weight:600; color:var(--ink);">${weekTitleLabel}</div>
        <div class="text-mute" style="font-size:12px;">${weekRangeLabel}</div>
        ${WEEK_OFFSET !== 0 ? `<span class="settings-link" id="weekTodayBtn">Về tuần này</span>` : ""}
      </div>
      <button class="btn btn-secondary btn-mini" id="weekNextBtn">Tuần sau →</button>
    </div>

let ADD_SLOT_TYPE = "care";
let ADD_SLOT_TASK_TYPE = "setup";

function openAddSlotModal(dayOfWeek, timeSlot) {
  ADD_SLOT_DAY = dayOfWeek;
  ADD_SLOT_TIME = timeSlot;
  ADD_SLOT_TYPE = "care";
  ADD_SLOT_TASK_TYPE = "setup";
  const slotLabel = SLOTS.find(s => s.key === timeSlot)?.label;
  const dateLabel = getDateForWeekday(dayOfWeek).toLocaleDateString("vi-VN");
  document.getElementById("addSlotTitle").textContent = `Thêm vào lịch — ${DAY_NAMES[dayOfWeek]} (${dateLabel}), buổi ${slotLabel}`;

  document.querySelectorAll("#addSlotModal [data-addtype]").forEach(el => el.classList.toggle("active", el.dataset.addtype === "care"));
  document.getElementById("addSlotCareFields").style.display = "block";
  document.getElementById("addSlotTaskFields").style.display = "none";

  document.getElementById("as_existingTank").innerHTML = `<option value="">— Hoặc tạo bể mới bên dưới —</option>` +
    ALL_TANKS.map(t => `<option value="${t.id}">${t.name}</option>`).join("");
  document.getElementById("as_newTankName").value = "";
  document.getElementById("as_customer").innerHTML = `<option value="">— Không liên kết —</option>` +
    ALL_CUSTOMERS_TK.map(c => `<option value="${c.id}">${c.name}</option>`).join("");

  document.querySelectorAll("#addSlotModal [data-slottasktype]").forEach(el => el.classList.toggle("active", el.dataset.slottasktype === "setup"));
  document.getElementById("as_taskTitle").value = "";
  document.getElementById("as_taskDeposit").value = "";
  document.getElementById("as_taskTotal").value = "";
  document.getElementById("as_taskTank").innerHTML = `<option value="">— Không liên kết —</option>` +
    ALL_TANKS.map(t => `<option value="${t.id}">${t.name}</option>`).join("");
  document.getElementById("as_taskNote").value = "";

  document.getElementById("addSlotModal").classList.add("open");
}

async function saveAddSlot() {
  const btn = document.getElementById("addSlotSaveBtn");

  if (ADD_SLOT_TYPE === "task") {
    const title = document.getElementById("as_taskTitle").value.trim();
    if (!title) { alert("Vui lòng nhập tiêu đề công việc."); return; }

    btn.disabled = true; btn.textContent = "Đang lưu...";
    const { error } = await sb.from("tank_tasks").insert({
      title, task_type: ADD_SLOT_TASK_TYPE,
      task_date: toDateKey(getDateForWeekday(ADD_SLOT_DAY)),
      time_slot: ADD_SLOT_TIME,
      tank_id: document.getElementById("as_taskTank").value || null,
      deposit_amount: Number(document.getElementById("as_taskDeposit").value || 0),
      expected_total: Number(document.getElementById("as_taskTotal").value || 0),
      note: document.getElementById("as_taskNote").value.trim() || null,
      created_by: CURRENT_PROFILE.id
    });
    btn.disabled = false; btn.textContent = "Thêm vào lịch";
    if (error) { alert("Lỗi: " + error.message); return; }

    document.getElementById("addSlotModal").classList.remove("open");
    renderGridView();
    return;
  }

  const existingTankId = document.getElementById("as_existingTank").value;
  const newName = document.getElementById("as_newTankName").value.trim();

  if (!existingTankId && !newName) { alert("Vui lòng chọn bể có sẵn hoặc nhập tên bể mới."); return; }

  btn.disabled = true; btn.textContent = "Đang lưu...";

  let tankId = existingTankId;
  if (!tankId) {
    const customerId = document.getElementById("as_customer").value || null;
    const { data: newTank, error: tankErr } = await sb.from("tanks").insert({
      name: newName, customer_id: customerId, created_by: CURRENT_PROFILE.id
    }).select().single();
    if (tankErr) { alert("Lỗi khi tạo bể: " + tankErr.message); btn.disabled = false; btn.textContent = "Thêm vào lịch"; return; }
    tankId = newTank.id;
  }

  const { error } = await sb.from("tank_care_schedule").insert({
    tank_id: tankId, day_of_week: ADD_SLOT_DAY, time_slot: ADD_SLOT_TIME, created_by: CURRENT_PROFILE.id
  });

  btn.disabled = false; btn.textContent = "Thêm vào lịch";
  if (error) { alert("Lỗi: " + error.message); return; }

  document.getElementById("addSlotModal").classList.remove("open");
  await Promise.all([loadTanks(), loadCareSchedule()]);
  renderGridView();
}

function openTankModal(id) {
  EDIT_TANK_ID = id || null;
  const t = id ? ALL_TANKS.find(x => x.id === id) : null;
  document.getElementById("tankModalTitle").textContent = t ? "Sửa bể" : "Thêm bể mới";
  document.getElementById("tk_name").value = t?.name || "";
  document.getElementById("tk_customer").innerHTML = `<option value="">— Bể của shop —</option>` +
    ALL_CUSTOMERS_TK.map(c => `<option value="${c.id}" ${c.id === t?.customer_id ? 'selected' : ''}>${c.name}</option>`).join("");
  document.getElementById("tk_notes").value = t?.notes || "";
  document.getElementById("tankModal").classList.add("open");
}

async function saveTank(e) {
  e.preventDefault();
  const payload = {
    name: document.getElementById("tk_name").value.trim(),
    customer_id: document.getElementById("tk_customer").value || null,
    notes: document.getElementById("tk_notes").value.trim() || null,
  };
  const btn = document.getElementById("tankSaveBtn");
  btn.disabled = true; btn.textContent = "Đang lưu...";

  let error, savedId = EDIT_TANK_ID;
  if (EDIT_TANK_ID) {
    ({ error } = await sb.from("tanks").update(payload).eq("id", EDIT_TANK_ID));
  } else {
    const { data, error: insErr } = await sb.from("tanks").insert({ ...payload, created_by: CURRENT_PROFILE.id }).select().single();
    error = insErr;
    savedId = data?.id;
  }

  btn.disabled = false; btn.textContent = "Lưu";
  if (error) { alert("Lỗi: " + error.message); return; }
  document.getElementById("tankModal").classList.remove("open");
  await loadTanks();

  if (document.getElementById("tankDetailView").style.display !== "none" && CURRENT_TANK) {
    await openTankDetail(CURRENT_TANK.id);
  } else {
    renderGridView();
  }
}

async function openTankDetail(tankId) {
  CURRENT_TANK = ALL_TANKS.find(t => t.id === tankId);
  if (!CURRENT_TANK) return;

  document.getElementById("gridView").style.display = "none";
  document.getElementById("tankDetailView").style.display = "block";

  await Promise.all([loadTankParams(tankId), loadTankChemicals(tankId), loadTankReadings(tankId), loadTankDosing(tankId)]);
  CURRENT_TANK_SCHEDULE = ALL_CARE_SCHEDULE.filter(s => s.tank_id === tankId);
  renderTankDetailView();
}

async function loadTankParams(tankId) {
  const { data } = await sb.from("tank_parameters").select("*").eq("tank_id", tankId).order("display_order").order("created_at");
  CURRENT_PARAMS = data || [];
}
async function loadTankChemicals(tankId) {
  const { data } = await sb.from("tank_chemicals").select("*").eq("tank_id", tankId).order("created_at");
  CURRENT_CHEMICALS = data || [];
}
async function loadTankReadings(tankId) {
  const { data: readings } = await sb.from("tank_readings").select("*").eq("tank_id", tankId).order("reading_date", { ascending: true });
  const readingIds = (readings || []).map(r => r.id);
  let values = [];
  if (readingIds.length > 0) {
    const { data } = await sb.from("tank_reading_values").select("*").in("reading_id", readingIds);
    values = data || [];
  }
  CURRENT_READINGS = (readings || []).map(r => {
    const valMap = {};
    values.filter(v => v.reading_id === r.id).forEach(v => { valMap[v.parameter_id] = v.value; });
    return { ...r, values: valMap };
  });
}
async function loadTankDosing(tankId) {
  const { data } = await sb.from("tank_dosing_log").select("*, tank_chemicals(name, unit)").eq("tank_id", tankId).order("dose_date", { ascending: false }).limit(50);
  CURRENT_DOSING = data || [];
}

function bindDetailEvents() {

  document.getElementById("addParamBtn").addEventListener("click", () => {
    document.getElementById("pm_name").value = "";
    document.getElementById("pm_unit").value = "";
    document.getElementById("paramModal").classList.add("open");
  });
  document.getElementById("addChemBtn").addEventListener("click", () => {
    document.getElementById("cm_name").value = "";
    document.getElementById("cm_unit").value = "";
    document.getElementById("chemModal").classList.add("open");
  });
  const addReadingBtn = document.getElementById("addReadingBtn");
  if (addReadingBtn) addReadingBtn.addEventListener("click", openReadingModal);
  const addDosingBtn = document.getElementById("addDosingBtn");

  document.querySelectorAll(".p-remove").forEach(el => el.addEventListener("click", () => removeParam(el.dataset.id)));

async function addTankScheduleSlot() {
  const day = Number(document.getElementById("quickAddDay").value);
  const slot = document.getElementById("quickAddSlot").value;

  const dup = CURRENT_TANK_SCHEDULE.find(s => s.day_of_week === day && s.time_slot === slot);
  if (dup) { alert("Bể này đã có lịch vào đúng ngày/buổi này rồi."); return; }

  const { error } = await sb.from("tank_care_schedule").insert({
    tank_id: CURRENT_TANK.id, day_of_week: day, time_slot: slot, created_by: CURRENT_PROFILE.id
  });
  if (error) { alert("Lỗi: " + error.message); return; }
  await loadCareSchedule();
  CURRENT_TANK_SCHEDULE = ALL_CARE_SCHEDULE.filter(s => s.tank_id === CURRENT_TANK.id);
  renderTankDetailView();
}

async function removeTankScheduleSlot(id) {
  if (!window.confirm("Bỏ lịch cố định này?")) return;
  await sb.from("tank_care_schedule").delete().eq("id", id);
  await loadCareSchedule();
  CURRENT_TANK_SCHEDULE = ALL_CARE_SCHEDULE.filter(s => s.tank_id === CURRENT_TANK.id);
  renderTankDetailView();
}

async function saveParam() {
  const name = document.getElementById("pm_name").value.trim();
  if (!name) { alert("Vui lòng nhập tên chỉ số."); return; }
  const unit = document.getElementById("pm_unit").value.trim() || null;
  const { error } = await sb.from("tank_parameters").insert({ tank_id: CURRENT_TANK.id, name, unit, display_order: CURRENT_PARAMS.length });
  if (error) { alert("Lỗi: " + error.message); return; }
  document.getElementById("paramModal").classList.remove("open");
  await loadTankParams(CURRENT_TANK.id);
  await loadTankReadings(CURRENT_TANK.id);
  renderTankDetailView();
}
async function removeParam(paramId) {
  if (!window.confirm("Xóa chỉ số này? Toàn bộ dữ liệu đo đã ghi cho chỉ số này cũng sẽ bị xóa.")) return;
  await sb.from("tank_parameters").delete().eq("id", paramId);
  await loadTankParams(CURRENT_TANK.id);
  await loadTankReadings(CURRENT_TANK.id);
  renderTankDetailView();
}

async function saveChemical() {
  const name = document.getElementById("cm_name").value.trim();
  if (!name) { alert("Vui lòng nhập tên hóa chất."); return; }
  const unit = document.getElementById("cm_unit").value.trim() || null;
  const { error } = await sb.from("tank_chemicals").insert({ tank_id: CURRENT_TANK.id, name, unit });
  if (error) { alert("Lỗi: " + error.message); return; }
  document.getElementById("chemModal").classList.remove("open");
  await loadTankChemicals(CURRENT_TANK.id);
  renderTankDetailView();
}
async function removeChemical(chemId) {
  if (!window.confirm("Xóa hóa chất này? Lịch sử châm của hóa chất này cũng sẽ bị xóa.")) return;
  await sb.from("tank_chemicals").delete().eq("id", chemId);
  await loadTankChemicals(CURRENT_TANK.id);
  await loadTankDosing(CURRENT_TANK.id);
  renderTankDetailView();
}

function openReadingModal() {
  document.getElementById("rd_date").value = nowLocalDatetime();
  document.getElementById("rd_note").value = "";
  document.getElementById("rd_paramInputs").innerHTML = CURRENT_PARAMS.map(p => `
    <div class="reading-input-row">
      <label style="margin-bottom:0;">${p.name}${p.unit ? ` (${p.unit})` : ''}</label>
      <input type="number" step="any" data-param-id="${p.id}" id="rdval-${p.id}">
    </div>
  `).join("");
  document.getElementById("readingModal").classList.add("open");
}

async function saveReading() {
  const btn = document.getElementById("readingSaveBtn");
  btn.disabled = true; btn.textContent = "Đang lưu...";

  const dateVal = document.getElementById("rd_date").value;
  const note = document.getElementById("rd_note").value.trim() || null;

  const { data: reading, error } = await sb.from("tank_readings").insert({
    tank_id: CURRENT_TANK.id,
    reading_date: dateVal ? new Date(dateVal).toISOString() : new Date().toISOString(),
    note, created_by: CURRENT_PROFILE.id
  }).select().single();

  if (error) { alert("Lỗi: " + error.message); btn.disabled = false; btn.textContent = "Lưu kết quả đo"; return; }

  const valueRows = CURRENT_PARAMS
    .map(p => ({ reading_id: reading.id, parameter_id: p.id, value: document.getElementById(`rdval-${p.id}`).value }))
    .filter(v => v.value !== "")
    .map(v => ({ ...v, value: Number(v.value) }));

  if (valueRows.length > 0) await sb.from("tank_reading_values").insert(valueRows);

  btn.disabled = false; btn.textContent = "Lưu kết quả đo";
  document.getElementById("readingModal").classList.remove("open");
  await loadTankReadings(CURRENT_TANK.id);
  renderTankDetailView();
}

function openDosingModal() {
  document.getElementById("ds_chemical").innerHTML = CURRENT_CHEMICALS.map(c => `<option value="${c.id}">${c.name}</option>`).join("");
  document.getElementById("ds_amount").value = "";
  document.getElementById("ds_date").value = nowLocalDatetime();
  document.getElementById("ds_note").value = "";
  document.getElementById("dosingModal").classList.add("open");
}

async function saveDosing() {
  const chemicalId = document.getElementById("ds_chemical").value;
  const amount = Number(document.getElementById("ds_amount").value || 0);
  if (!chemicalId || amount <= 0) { alert("Vui lòng chọn hóa chất và nhập liều lượng hợp lệ."); return; }
  const dateVal = document.getElementById("ds_date").value;
  const note = document.getElementById("ds_note").value.trim() || null;

  const btn = document.getElementById("dosingSaveBtn");
  btn.disabled = true; btn.textContent = "Đang lưu...";

  const { error } = await sb.from("tank_dosing_log").insert({
    tank_id: CURRENT_TANK.id, chemical_id: chemicalId, dose_amount: amount,
    dose_date: dateVal ? new Date(dateVal).toISOString() : new Date().toISOString(),
    note, created_by: CURRENT_PROFILE.id
  });

  btn.disabled = false; btn.textContent = "Lưu";
  if (error) { alert("Lỗi: " + error.message); return; }
  document.getElementById("dosingModal").classList.remove("open");
  await loadTankDosing(CURRENT_TANK.id);
  renderTankDetailView();
}

function destroyCharts() {
  Object.values(CHART_INSTANCES).forEach(c => c.destroy());
  CHART_INSTANCES = {};
}

function renderCharts() {
  destroyCharts();
  CURRENT_PARAMS.forEach(p => {
    const canvas = document.getElementById(`chart-${p.id}`);
    if (!canvas) return;
    const filtered = CURRENT_READINGS.filter(r => r.values[p.id] !== undefined);
    if (filtered.length < 2) {
      const ctx = canvas.getContext("2d");
      ctx.font = "12px sans-serif";
      ctx.fillStyle = "#94a3b8";
      ctx.fillText("Chưa đủ dữ liệu cho chỉ số này", 10, 20);
      return;
    }
    const labels = filtered.map(r => formatDate(r.reading_date));
    const data = filtered.map(r => r.values[p.id]);

    CHART_INSTANCES[p.id] = new Chart(canvas, {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: p.name,
          data,
          borderColor: "#16a085",
          backgroundColor: "rgba(0,168,150,0.1)",
          tension: 0.25,
          pointRadius: 3,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { font: { size: 10 } } },
          y: { ticks: { font: { size: 10 } } }
        }
      }
    });
  });
}

/* ============================================================
   CÔNG VIỆC (Setup, Bàn giao...) — ghi theo ngày thực tế,
   không lặp lại như lịch chăm sóc, kèm báo giá/bảng kê
   ============================================================ */
let ALL_TASKS = [];
let TASK_TYPE = "setup";
let EDIT_TASK_ID = null;
let CURRENT_TASK = null;
let CURRENT_QUOTE_ITEMS = [];
const TASK_TYPE_LABEL = { setup: "🔧 Setup bể", ban_giao: "📦 Bàn giao", khac: "Khác" };
const TASK_TYPE_ICON = { setup: "🔧", ban_giao: "📦", khac: "🧾" };

async function loadTasks() {
  const { data } = await sb.from("tank_tasks").select("*, tanks(name)").limit(200);
  ALL_TASKS = (data || []).sort((a, b) => {
    if (a.status !== b.status) return a.status === "done" ? 1 : -1;
    return new Date(a.task_date) - new Date(b.task_date);
  });
}

async function renderTaskList() {
  await loadTasks();
  const wrap = document.getElementById("taskListWrap");
  if (!wrap) return;

  document.getElementById("addTaskBtn").addEventListener("click", openTaskModal);

  if (ALL_TASKS.length === 0) {
    wrap.innerHTML = `<div class="empty-state"><div class="icon">🧾</div>Chưa có công việc nào. Bấm "+ Thêm công việc" để bắt đầu ghi (VD: Setup bể mới, Bàn giao bể cho khách...).</div>`;
    return;
  }

  wrap.innerHTML = `<div style="overflow-x:auto;"><table><thead><tr>
      <th>Khách hàng</th><th>Ngày đặt</th><th>Ngày giao dự kiến</th><th>Loại</th><th>Tiêu đề</th>
      <th>Tiền cọc</th><th>Tổng tiền</th><th>Trạng thái</th>
    </tr></thead><tbody>
    ${ALL_TASKS.map(t => `<tr class="order-row-clickable" data-task-id="${t.id}" style="cursor:pointer;">
      <td>${t.tanks?.name || t.customer_name || '—'}</td>
      <td>${formatDate(t.created_at)}</td>
      <td>${formatDate(t.task_date)}</td>
      <td>${TASK_TYPE_LABEL[t.task_type] || t.task_type}</td>
      <td>${t.title}</td>
      <td style="${Number(t.deposit_amount) > 0 ? 'color:var(--teal-deep); font-weight:600;' : ''}">${Number(t.deposit_amount) > 0 ? formatVND(t.deposit_amount) : '—'}</td>
      <td>${Number(t.expected_total) > 0 ? formatVND(t.expected_total) : '—'}</td>
      <td><span class="badge ${t.status === 'done' ? 'paid' : 'debt'}">${t.status === 'done' ? 'Đã xong' : 'Đang chờ'}</span></td>
    </tr>`).join("")}
  </tbody></table></div>`;

  wrap.querySelectorAll("[data-task-id]").forEach(el => {
    el.addEventListener("click", () => openTaskDetail(el.dataset.taskId));
  });
}

function openTaskModal(taskId) {
  EDIT_TASK_ID = taskId || null;
  const t = taskId ? (ALL_TASKS.find(x => x.id === taskId) || WEEK_TASKS.find(x => x.id === taskId)) : null;

  document.getElementById("taskModalTitle").textContent = t ? "Sửa công việc" : "Thêm công việc";
  TASK_TYPE = t?.task_type || "setup";
  document.querySelectorAll("#taskModal [data-tasktype]").forEach(el => el.classList.toggle("active", el.dataset.tasktype === TASK_TYPE));
  document.getElementById("tk_task_title").value = t?.title || "";
  document.getElementById("tk_task_date").value = t?.task_date || new Date().toISOString().slice(0, 10);
  document.getElementById("tk_task_tank").innerHTML = `<option value="">— Không liên kết —</option>` + ALL_TANKS.map(x => `<option value="${x.id}" ${x.id === t?.tank_id ? 'selected' : ''}>${x.name}</option>`).join("");
  document.getElementById("tk_task_customer").value = t?.customer_name || "";
  document.getElementById("tk_task_deposit").value = t?.deposit_amount || "";
  document.getElementById("tk_task_total").value = t?.expected_total || "";
  document.getElementById("tk_task_note").value = t?.note || "";
  document.getElementById("taskModal").classList.add("open");
}

async function saveTask() {
  const title = document.getElementById("tk_task_title").value.trim();
  const date = document.getElementById("tk_task_date").value;
  if (!title || !date) { alert("Vui lòng nhập tiêu đề và ngày thực hiện."); return; }

  const payload = {
    title, task_type: TASK_TYPE, task_date: date,
    tank_id: document.getElementById("tk_task_tank").value || null,
    customer_name: document.getElementById("tk_task_customer").value.trim() || null,
    deposit_amount: Number(document.getElementById("tk_task_deposit").value || 0),
    expected_total: Number(document.getElementById("tk_task_total").value || 0),
    note: document.getElementById("tk_task_note").value.trim() || null,
  };

  const btn = document.getElementById("taskSaveBtn");
  btn.disabled = true; btn.textContent = "Đang lưu...";

  let error;
  if (EDIT_TASK_ID) {
    ({ error } = await sb.from("tank_tasks").update(payload).eq("id", EDIT_TASK_ID));
  } else {
    ({ error } = await sb.from("tank_tasks").insert({ ...payload, created_by: CURRENT_PROFILE.id }));
  }

  btn.disabled = false; btn.textContent = "Lưu";

  if (error) { alert("Lỗi: " + error.message); return; }
  document.getElementById("taskModal").classList.remove("open");
  await renderGridView();
}

async function openTaskDetail(taskId) {
  CURRENT_TASK = ALL_TASKS.find(t => t.id === taskId) || WEEK_TASKS.find(t => t.id === taskId);
  if (!CURRENT_TASK) return;

  document.getElementById("taskDetailTitle").textContent = CURRENT_TASK.title;
  document.getElementById("taskDetailInfo").innerHTML = `
    <div class="summary-row"><span>Loại</span><span>${TASK_TYPE_LABEL[CURRENT_TASK.task_type] || CURRENT_TASK.task_type}</span></div>
    <div class="summary-row"><span>Ngày thực hiện</span><span>${formatDate(CURRENT_TASK.task_date)}</span></div>
    ${CURRENT_TASK.tanks?.name ? `<div class="summary-row"><span>Bể liên quan</span><span>${CURRENT_TASK.tanks.name}</span></div>` : ""}
    ${CURRENT_TASK.customer_name ? `<div class="summary-row"><span>Khách hàng</span><span>${CURRENT_TASK.customer_name}</span></div>` : ""}
    ${Number(CURRENT_TASK.expected_total) > 0 ? `<div class="summary-row"><span>Tổng tiền dự kiến</span><span>${formatVND(CURRENT_TASK.expected_total)}</span></div>` : ""}
    ${Number(CURRENT_TASK.deposit_amount) > 0 ? `<div class="summary-row"><span>💰 Tiền đã cọc</span><span style="color:var(--teal-deep);">${formatVND(CURRENT_TASK.deposit_amount)}</span></div>` : ""}
    ${Number(CURRENT_TASK.expected_total) > 0 && Number(CURRENT_TASK.deposit_amount) > 0 ? `<div class="summary-row total"><span>Còn lại khi bàn giao</span><span>${formatVND(CURRENT_TASK.expected_total - CURRENT_TASK.deposit_amount)}</span></div>` : ""}
    ${CURRENT_TASK.note ? `<div class="summary-row"><span>Ghi chú</span><span>${CURRENT_TASK.note}</span></div>` : ""}
    <div class="summary-row"><span>Trạng thái</span><span class="badge ${CURRENT_TASK.status === 'done' ? 'paid' : 'debt'}">${CURRENT_TASK.status === 'done' ? 'Đã hoàn thành' : 'Đang chờ'}</span></div>
    ${CURRENT_TASK.status === 'done' && CURRENT_TASK.completed_at ? `<div class="summary-row"><span>Hoàn thành lúc</span><span>${formatDateTime(CURRENT_TASK.completed_at)}</span></div>` : ""}
    ${Number(CURRENT_TASK.deposit_amount) > 0 && CURRENT_TASK.status !== 'done' ? `<div class="empty-state" style="padding:12px; margin-top:10px; background:#fff7ed; border-radius:8px;"><div style="color:#c2410c; font-size:12.5px;">⚠️ Khi bàn giao xong, nhớ tạo đơn đầy đủ ở <strong>Bán hàng</strong> (thanh toán = tổng tiền − đã cọc ${formatVND(CURRENT_TASK.deposit_amount)}) để ghi nhận doanh thu chính thức.</div></div>` : ""}
  `;

  const markBtn = document.getElementById("markTaskDoneBtn");
  markBtn.textContent = CURRENT_TASK.status === 'done' ? "↺ Bỏ đánh dấu hoàn thành" : "✅ Đánh dấu đã hoàn thành";

  await loadQuoteItems(taskId);
  document.getElementById("taskDetailModal").classList.add("open");
}

async function loadQuoteItems(taskId) {
  const { data } = await sb.from("tank_task_quote_items").select("*").eq("task_id", taskId).order("created_at");
  CURRENT_QUOTE_ITEMS = data || [];
  renderQuoteItems();
}

function renderQuoteItems() {
  const tbody = document.getElementById("quoteItemsTbody");
  if (CURRENT_QUOTE_ITEMS.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" class="text-mute" style="text-align:center; padding:14px;">Chưa có dòng báo giá nào.</td></tr>`;
  } else {
    tbody.innerHTML = CURRENT_QUOTE_ITEMS.map(i => `<tr>
      <td>${i.item_name}</td>
      <td>${i.quantity}</td>
      <td>${formatVND(i.unit_price)}</td>
      <td>${formatVND(i.quantity * i.unit_price)}</td>
      <td><span class="p-remove" data-qid="${i.id}">✕</span></td>
    </tr>`).join("");
    tbody.querySelectorAll(".p-remove").forEach(el => el.addEventListener("click", () => removeQuoteItem(el.dataset.qid)));
  }
  const total = CURRENT_QUOTE_ITEMS.reduce((s, i) => s + Number(i.quantity) * Number(i.unit_price), 0);
  document.getElementById("quoteTotal").textContent = formatVND(total);
}

async function addQuoteItemRow() {
  const name = window.prompt("Tên mục (VD: Bể kính 60x40x40, San hô SPS, Công lắp đặt...):");
  if (!name || !name.trim()) return;
  const qtyStr = window.prompt("Số lượng:", "1");
  const qty = Number(qtyStr);
  if (isNaN(qty) || qty <= 0) { alert("Số lượng không hợp lệ."); return; }
  const priceStr = window.prompt("Đơn giá (đ):", "0");
  const price = Number(priceStr);
  if (isNaN(price) || price < 0) { alert("Đơn giá không hợp lệ."); return; }

  const { error } = await sb.from("tank_task_quote_items").insert({
    task_id: CURRENT_TASK.id, item_name: name.trim(), quantity: qty, unit_price: price
  });
  if (error) { alert("Lỗi: " + error.message); return; }
  await loadQuoteItems(CURRENT_TASK.id);
}

async function removeQuoteItem(id) {
  if (!window.confirm("Xóa dòng này khỏi báo giá?")) return;
  await sb.from("tank_task_quote_items").delete().eq("id", id);
  await loadQuoteItems(CURRENT_TASK.id);
}

async function toggleTaskDone() {
  if (!CURRENT_TASK) return;
  const newStatus = CURRENT_TASK.status === 'done' ? 'planned' : 'done';
  const payload = { status: newStatus, completed_at: newStatus === 'done' ? new Date().toISOString() : null };
  await sb.from("tank_tasks").update(payload).eq("id", CURRENT_TASK.id);
  CURRENT_TASK = { ...CURRENT_TASK, ...payload };
  await renderGridView();
  openTaskDetail(CURRENT_TASK.id);
}

async function deleteCurrentTask() {
  if (!CURRENT_TASK) return;
  if (!window.confirm(`Xóa công việc "${CURRENT_TASK.title}"? Toàn bộ báo giá đính kèm cũng sẽ bị xóa.`)) return;
  await sb.from("tank_tasks").delete().eq("id", CURRENT_TASK.id);
  document.getElementById("taskDetailModal").classList.remove("open");
  await renderGridView();
}

/* Bind sự kiện cho khối modal Công việc — gọi 1 lần khi trang khởi tạo */
function bindTaskEvents() {
  document.querySelectorAll("#taskModal [data-tasktype]").forEach(el => {
    el.addEventListener("click", () => {
      TASK_TYPE = el.dataset.tasktype;
      document.querySelectorAll("#taskModal [data-tasktype]").forEach(x => x.classList.remove("active"));
      el.classList.add("active");
    });
  });
  document.getElementById("taskModalClose").addEventListener("click", () => document.getElementById("taskModal").classList.remove("open"));
  document.getElementById("taskCancelBtn").addEventListener("click", () => document.getElementById("taskModal").classList.remove("open"));
  document.getElementById("taskSaveBtn").addEventListener("click", saveTask);

  document.getElementById("taskDetailClose").addEventListener("click", () => document.getElementById("taskDetailModal").classList.remove("open"));
  document.getElementById("addQuoteItemBtn").addEventListener("click", addQuoteItemRow);
  document.getElementById("markTaskDoneBtn").addEventListener("click", toggleTaskDone);
  document.getElementById("editTaskBtn").addEventListener("click", () => {
    document.getElementById("taskDetailModal").classList.remove("open");
    openTaskModal(CURRENT_TASK.id);
  });
  document.getElementById("deleteTaskBtn").addEventListener("click", deleteCurrentTask);
}
</script>
</body>
</html>
